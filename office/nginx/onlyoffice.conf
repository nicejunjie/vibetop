# vibetop-office: OnlyOffice Document Server (web editor) at /onlyoffice/ ->
# 127.0.0.1:@ONLYOFFICE_PORT@ (docker, loopback). The X-Forwarded-Host carries
# the sub-path so the editor rewrites its asset/websocket URLs under /onlyoffice/.
# Drops in via the include in /etc/nginx/sites-available/vibetop.

location /onlyoffice/ {
    proxy_pass http://127.0.0.1:@ONLYOFFICE_PORT@/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $host/onlyoffice;
    # Honor the EXTERNAL scheme (cloudflared sends X-Forwarded-Proto: https), NOT
    # this hop's $scheme: over the tunnel cloudflared->nginx is plain http, so
    # $scheme=http. OnlyOffice builds ABSOLUTE cache/download URLs (Editor.bin)
    # from X-Forwarded-Proto; an http:// URL on the https page is blocked by the
    # browser as mixed content -> the doc download never leaves the browser ->
    # "Download failed" (tunnel only; the http LAN page is same-scheme, so fine).
    # Empty on a direct LAN request -> the DS's own nginx falls back to http.
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
}
