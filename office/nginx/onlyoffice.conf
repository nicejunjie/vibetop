# claude-office: OnlyOffice Document Server (web editor) at /onlyoffice/ ->
# 127.0.0.1:@ONLYOFFICE_PORT@ (docker, loopback). The X-Forwarded-Host carries
# the sub-path so the editor rewrites its asset/websocket URLs under /onlyoffice/.
# Drops in via the include in /etc/nginx/sites-available/claude-web.

location /onlyoffice/ {
    proxy_pass http://127.0.0.1:@ONLYOFFICE_PORT@/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $host/onlyoffice;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
}
