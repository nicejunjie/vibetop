# FileBrowser at /files/ -> 127.0.0.1:8085
# SPA entry point — fix Content-Type (FileBrowser sends text/plain for HTML)
location = /files/ {
    # Gate on a valid Linux session, and route to the PER-USER FileBrowser (run as
    # that user, rooted at their home). authcheck returns the user's port in
    # X-App-Port; auth_request/@login are defined in the main site.
    auth_request /internal/authcheck;
    auth_request_set $fbport $upstream_http_x_app_port;
    error_page 401 = @login;
    proxy_pass http://127.0.0.1:$fbport;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    proxy_buffering off;
    proxy_hide_header Content-Type;
    proxy_hide_header X-Content-Type-Options;
    add_header Content-Type "text/html; charset=utf-8" always;
    add_header Cache-Control "no-cache, no-store" always;

    gzip on;
    gzip_proxied any;
    gzip_types text/html;
    gzip_min_length 1024;

    # Hide FileBrowser's login view in the HEAD (before the SPA renders) so the
    # noauth auto-login doesn't flash a login form. The end-of-body patches.js
    # also sets this, but only after the SPA has already mounted #login — too
    # late to prevent the flash; this inline style is parsed first.
    sub_filter '</head>' '<style>#login{display:none!important}</style></head>';
    sub_filter '</body>' '<script src="/filebrowser-patches.js?v=@PATCH_VER@"></script></body>';
    sub_filter_types *;
    sub_filter_once on;
}

# All other /files/* requests (static assets, API, SPA sub-routes)
location /files/ {
    auth_request /internal/authcheck;
    auth_request_set $fbport $upstream_http_x_app_port;
    error_page 401 = @login;
    proxy_pass http://127.0.0.1:$fbport;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    proxy_buffering off;
    client_max_body_size 1G;

    # Upstream is served uncompressed (Accept-Encoding stripped for
    # sub_filter); re-gzip the SPA bundle and API JSON to the client.
    gzip on;
    gzip_proxied any;
    gzip_types text/html text/javascript application/javascript text/css application/json image/svg+xml;
    gzip_min_length 1024;

    # Hide the login view before the SPA renders it (see the = /files/ block).
    sub_filter '</head>' '<style>#login{display:none!important}</style></head>';
    sub_filter '</body>' '<script src="/filebrowser-patches.js?v=@PATCH_VER@"></script></body>';
    sub_filter_types text/html;
    sub_filter_once on;
}

# Serve raw files for the embedded browser to open ("Open in Browser"). Aliases /
# and serves raw bytes as the nginx worker user, so it MUST be gated — otherwise an
# unauthenticated LAN client could read any file the worker can (arbitrary file
# read). Multi-user: this is still a shared/APP_USER-scoped serve (the embedded
# Browser is APP_USER's), so require a valid session AND the operator (admin) —
# per-user /fileview/ arrives with the per-user Browser (Phase 3c). The dotfile
# 403 (regex, takes precedence) stays as defense-in-depth.
location ~ "^/fileview/(.*/)?\." { return 403; }

location /fileview/ {
    # authcheck requires a valid session AND restricts /fileview/ to the operator
    # (it 403s a non-admin, 401s the unauthenticated) — so the raw alias can't leak
    # APP_USER's tree to another user or an anonymous client.
    auth_request /internal/authcheck;
    error_page 401 = @login;
    alias /;
    autoindex off;
    add_header Cache-Control 'no-cache' always;
}
