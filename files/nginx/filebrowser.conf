# FileBrowser at /files/ -> 127.0.0.1:8085
# SPA entry point — fix Content-Type (FileBrowser sends text/plain for HTML)
location = /files/ {
    proxy_pass http://127.0.0.1:8085;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    proxy_buffering off;
    proxy_hide_header Content-Type;
    proxy_hide_header X-Content-Type-Options;
    add_header Content-Type "text/html; charset=utf-8" always;
    add_header Cache-Control "no-cache, no-store" always;

    gzip on;
    gzip_proxied any;
    gzip_types text/html;
    gzip_min_length 1024;

    # Hide FileBrowser's login view in the HEAD (before the SPA renders) so the
    # noauth auto-login doesn't flash a login form. The end-of-body patches.js
    # also sets this, but only after the SPA has already mounted #login — too
    # late to prevent the flash; this inline style is parsed first.
    sub_filter '</head>' '<style>#login{display:none!important}</style></head>';
    sub_filter '</body>' '<script src="/filebrowser-patches.js?v=@PATCH_VER@"></script></body>';
    sub_filter_types *;
    sub_filter_once on;
}

# All other /files/* requests (static assets, API, SPA sub-routes)
location /files/ {
    proxy_pass http://127.0.0.1:8085;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    proxy_buffering off;
    client_max_body_size 1G;

    # Upstream is served uncompressed (Accept-Encoding stripped for
    # sub_filter); re-gzip the SPA bundle and API JSON to the client.
    gzip on;
    gzip_proxied any;
    gzip_types text/html text/javascript application/javascript text/css application/json image/svg+xml;
    gzip_min_length 1024;

    # Hide the login view before the SPA renders it (see the = /files/ block).
    sub_filter '</head>' '<style>#login{display:none!important}</style></head>';
    sub_filter '</body>' '<script src="/filebrowser-patches.js?v=@PATCH_VER@"></script></body>';
    sub_filter_types text/html;
    sub_filter_once on;
}

# Serve raw files for the embedded browser to open. Aliased to / to match the
# FileBrowser root (so "Open in Browser" resolves a file at any path the listing
# can reach). It serves only what nginx's worker user can read.
# Defense-in-depth: even though /fileview/ sits behind Cloudflare Access, it
# aliases raw HTTP, so refuse any dotfile or dot-directory in the path (~/.ssh,
# ~/.config, ~/.local, ~/.aws, the FileBrowser DB and the OnlyOffice secret under
# ~/.config, /etc/…/.something…). Regex locations take precedence over the
# /fileview/ prefix below, so a dotted path 403s while ordinary documents serve.
location ~ "^/fileview/(.*/)?\." { return 403; }

location /fileview/ {
    alias /;
    autoindex off;
    add_header Cache-Control 'no-cache' always;
}
