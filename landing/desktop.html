<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- user-scalable=no + maximum-scale=1: iOS Safari's pinch-zoom is page-wide
     (a pinch inside any iframe zooms the entire parent), and once it sticks
     it's effectively impossible to reset programmatically. Disabling it on
     the shell keeps the desktop layout pinned at 1.0; each app handles its
     own zoom internally (xpra zooms its canvas, text apps don't need it). -->
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Vibetop</title>
<!-- PWA: installable, full-screen home-screen app. The manifest + apple-* tags
     make "Add to Home Screen" launch standalone (no Safari chrome), and sw.js
     caches the shell so cold loads are instant. -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#161b22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Vibetop">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/icons/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* --tb = taskbar height incl. the phone's bottom safe-area (home indicator). */
  :root { --tb: calc(54px + env(safe-area-inset-bottom)); }
  html, body { height: 100%; height: 100svh; height: var(--app-h, 100svh); overflow: hidden; }
  /* `100svh` is the DEFAULT (correct in Safari and normal standalone). But an
     installed iOS PWA freezes `svh` too SHORT after a Cloudflare Access login
     (black band below the taskbar) — confirmed on-device that ONLY `svh` is wrong;
     visualViewport.height / clientHeight / dvh all report the true usable height.
     So in standalone apph.js sets `--app-h` from those correct metrics (it can only
     ever equal the content area, never overshoot into the status-bar strip the way
     `100vh` did). Unset in Safari, so the `100svh` fallback rules there. */
  body {
    background: #0e1117; font-family: system-ui, sans-serif; color: #e0e0e0;
    display: flex; flex-direction: column; position: relative;
  }

  /* === Claude usage strip (opt-in) — thin full-width bar above the app area.
     A flex child before .frames, so it simply shrinks the app viewport; hidden
     unless the feature is on (and not dismissed for the session). === */
  .cu-strip {
    flex: 0 0 auto; min-height: 26px; display: flex; align-items: center;
    flex-wrap: wrap; gap: 6px 8px; box-sizing: border-box; position: relative;
    padding: 4px 30px 4px 10px; font-size: 12px; line-height: 1.3; white-space: normal;
    background: #10161f; border-bottom: 1px solid #222c3a; color: #9fb0c0;
    font-family: system-ui, sans-serif; user-select: none;
  }
  .cu-strip[hidden] { display: none; }
  .cu-strip .cu-brand { font-weight: 600; color: #c8d4e0; margin-right: 2px; }
  .cu-strip .cu-metrics { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 8px; min-width: 0; }
  /* Each metric is a self-contained chip — reads cleanly on its own whether it's
     inline (desktop, one 26px line) or wrapped onto its own line (narrow phone),
     so there are no dangling separators or misaligned columns. */
  .cu-strip .cu-seg {
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    background: rgba(255,255,255,0.04); border: 1px solid #222c3a;
    border-radius: 6px; padding: 1px 8px;
  }
  .cu-strip .cu-lbl { color: #8a9aaa; }
  .cu-strip .cu-pct { font-variant-numeric: tabular-nums; color: #dbe4ee; font-weight: 600; }
  .cu-strip .cu-bar { width: 52px; height: 7px; border-radius: 4px; background: #2a3444; overflow: hidden; }
  /* display:block so width/height apply — a bare <span> is inline and ignores
     them, which left the fill invisible (the bar looked like a flat grey track). */
  .cu-strip .cu-fill { display: block; height: 100%; width: 0; background: #34a853; transition: width .4s; }
  .cu-strip .cu-fill.warn { background: #d2902a; }
  .cu-strip .cu-fill.crit { background: #d24b3a; }
  .cu-strip .cu-dim { color: #6a7a8a; font-variant-numeric: tabular-nums; }
  /* ✕ pinned to the top-right corner (out of flow) so it never orphans onto its
     own wrapped line. */
  .cu-strip .cu-x { position: absolute; top: 3px; right: 5px; cursor: pointer; color: #6a7a8a; padding: 1px 7px; border-radius: 4px; line-height: 1.3; }
  .cu-strip .cu-x:hover { background: rgba(255,255,255,0.08); color: #c0d0e0; }
  /* Narrow screens: stack the metrics as full-width rows with the brand on its
     own line, so the two chip BOXES share a left edge (and their internal
     label→bar→% columns align via min-widths) instead of one being pushed in by
     the "Claude" label. On wider screens they stay inline on one line. */
  @media (max-width: 600px) {
    /* brand as a left column, the two metric chips stacked to its right -> the
       whole strip is 2 lines (not 3), and the chip boxes still share a left edge
       with their label/bar/% columns aligned. */
    .cu-strip { flex-wrap: nowrap; align-items: flex-start; }
    .cu-strip .cu-brand { margin: 2px 8px 0 0; flex: 0 0 auto; }
    .cu-strip .cu-metrics { flex-direction: column; align-items: stretch; gap: 4px; flex: 1 1 auto; }
    .cu-strip .cu-seg { width: 100%; box-sizing: border-box; justify-content: flex-start; }
    .cu-strip .cu-lbl { min-width: 3.6em; }
    .cu-strip .cu-pct { min-width: 2.6em; text-align: right; }
    .cu-strip .cu-asof { font-size: 11px; }
  }
  /* toggle row's On state gets a green dot, like a running app */
  .sm-item[data-id="claudeusage"].cu-on .sm-name::after {
    content: "\25CF"; color: #34a853; font-size: 9px; margin-left: 8px;
  }

  /* === Taskbar === */
  .taskbar {
    flex: 0 0 auto; height: var(--tb);
    display: flex; align-items: center;
    background: #161b22; border-top: 1px solid #2a3040;
    z-index: 100; padding: 0 8px; gap: 4px;
    padding-bottom: env(safe-area-inset-bottom);
    font-family: system-ui, sans-serif;
  }

  /* Start button — always present, like Windows' Start */
  .start-btn {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    padding: 8px 16px; height: 40px;
    border-radius: 8px; cursor: pointer; user-select: none;
    font-size: 15px; font-weight: 600; color: #e8eef5;
    background: linear-gradient(135deg, #b3540f, #d2691e);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .start-btn:hover { filter: brightness(1.12); }
  .start-btn.open { box-shadow: 0 0 0 2px rgba(210,105,30,0.5) inset; filter: brightness(1.12); }
  .start-btn .icon { font-size: 18px; line-height: 1; }

  .tb-sep { width: 1px; height: 28px; background: #2a3040; margin: 0 6px; }

  /* Open-app buttons (only present while the app is open) */
  /* The open-app buttons GROW to fill all the space between Start and the stats
     (tabs left-aligned, empty room to their right when few — the familiar look),
     and SCROLL within that region when there are too many to fit, so they never
     overflow into (and overlap) the right-hand system stats. The stats + Start +
     logout are flex-shrink:0 and stay put. */
  .task-apps { display: flex; align-items: center; gap: 2px;
    flex: 1 1 auto; min-width: 0; overflow-x: auto; overflow-y: hidden;
    scrollbar-width: none; }
  .task-apps::-webkit-scrollbar { display: none; }
  .task-app {
    position: relative; flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px 6px 12px; height: 38px;
    border-radius: 8px; cursor: pointer; user-select: none;
    font-size: 14px; color: #8a9aaa;
    border: 1px solid transparent;
    border-bottom: 2px solid transparent;
  }
  .task-app:hover { background: rgba(255,255,255,0.06); color: #c0d0e0; }
  .task-app.active { color: #fff; background: rgba(255,255,255,0.08); }
  /* drag-to-reorder: the dragged button is dimmed while it's being moved */
  .task-app.dragging { opacity: 0.4; }
  .task-app .icon { font-size: 22px; line-height: 1; display: inline-flex; }
  .task-app .close {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; margin-left: 2px; border-radius: 4px;
    font-size: 14px; line-height: 1; color: #5a6a7a;
  }
  .task-app .close:hover { background: #aa3333; color: #fff; }
  /* per-app accent on the active underline */
  .task-app.active[data-id="home"]     { border-bottom-color: #d2691e; }
  .task-app.active[data-id="terminal"] { border-bottom-color: #33aa55; }
  .task-app.active[data-id="browser"]  { border-bottom-color: #3a7adb; }
  .task-app.active[data-id="x11launcher"] { border-bottom-color: #d2569a; }
  .task-app.active[data-id="files"]    { border-bottom-color: #8a4adb; }
  .task-app.active[data-id="office"]   { border-bottom-color: #d2691e; }
  .task-app.active[data-id="notes"]    { border-bottom-color: #1ab3a6; }
  .task-app.active[data-id="monitor"]  { border-bottom-color: #d2902a; }
  .task-app.active[data-id="upload"]   { border-bottom-color: #3ab36a; }
  .task-app.active[data-id="update"]   { border-bottom-color: #8a8a9a; }

  .tb-spacer { flex: 0 0 10px; }  /* just a fixed gap between the tab strip and the stats — the tab strip itself now fills the space */

  /* Each row: [label] [num] [%] [num] [°]  [label] [num/num] [G]
     Numeric columns use fixed `ch` widths so labels don't shift sideways as
     values change digit-count (e.g. "0.3%" → "0%"). column-gap is 0 so
     digits/units touch ("0.6%", "48°", "13/60G"); spacing is added
     explicitly only between groups. tabular-nums keeps digit widths
     uniform. */
  .tb-stats {
    display: grid;
    grid-template-columns:
      auto         /* CPU/GPU label */
      3ch  auto    /* %  number + unit (integer 0..100) */
      2ch  auto    /* °  number + unit (CPU/GPU temps are 2 digits) */
      auto         /* MEM/VRAM label */
      5ch  auto;   /* used/total + G */
    column-gap: 0; row-gap: 1px; align-content: center; flex-shrink: 0;
    font-size: 12px; line-height: 1.35;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-variant-numeric: tabular-nums;
    color: #6a7a8a; white-space: nowrap;
  }
  .tb-stats .label { color: #556; padding-right: 4px; }
  .tb-stats .n     { color: #9ab; text-align: right; }
  .tb-stats .u     { color: #9ab; text-align: left; }
  /* Gap between util % and the temperature on the CPU/GPU block. */
  .tb-stats .u:nth-child(8n+3) { padding-right: 6px; }
  /* Gap between ° and the MEM/VRAM label */
  .tb-stats .u:nth-child(8n+5) { padding-right: 12px; }

  /* === System-health warning banner === */
  #sys-warn { position: fixed; top: 0; left: 0; right: 0; z-index: 9500; }
  #sys-warn:empty { display: none; }
  #sys-warn .sw-row {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    background: #d9531e; color: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.4);
    font: 600 13px system-ui, sans-serif; border-bottom: 1px solid rgba(0,0,0,.25);
  }
  #sys-warn .sw-row.sw-crit { background: #c62828; }
  #sys-warn .sw-msg { flex: 1 1 auto; min-width: 0; }
  #sys-warn .sw-x {
    flex: 0 0 auto; cursor: pointer; font: 400 20px system-ui; line-height: 1;
    padding: 0 6px; opacity: .9; -webkit-user-select: none; user-select: none;
  }
  #sys-warn .sw-x:hover { opacity: 1; }

  .tb-logout-wrap { position: relative; flex-shrink: 0; margin-left: 8px; }
  .tb-logout {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px;
    font-size: 18px; color: #aa4444; cursor: pointer;
    background: none; padding: 0; font-family: inherit;
    border: 1px solid rgba(255,60,60,0.15);
  }
  .tb-logout:hover, .tb-logout[aria-expanded="true"] {
    background: rgba(255,60,60,0.2); color: #ff6666; border-color: rgba(255,60,60,0.3);
  }
  /* Drop-UP menu (taskbar sits at the viewport bottom). position:FIXED (not
     absolute-in-.tb-logout-wrap) so it escapes the taskbar's clip box — on
     narrow screens the taskbar is `overflow-y:hidden` for horizontal scroll,
     which otherwise clipped this drop-up (it sits ABOVE the bar) and it showed
     nothing. Anchored to the viewport just above the taskbar, like the Start
     menu. No ancestor is transformed, so fixed resolves to the viewport. */
  .tb-logout-menu {
    position: fixed; bottom: calc(var(--tb) + 8px); right: 8px;
    min-width: 200px; padding: 6px; z-index: 300;
    background: #161d29; border: 1px solid #2a3342; border-radius: 11px;
    box-shadow: 0 -10px 34px rgba(0,0,0,0.55);
  }
  .tb-logout-menu[hidden] { display: none; }
  .tb-lo-item {
    display: flex; flex-direction: column; gap: 1px; width: 100%; text-align: left;
    padding: 8px 12px; border: 0; border-radius: 7px; background: none;
    color: #d6dee8; cursor: pointer; font-family: inherit;
  }
  .tb-lo-item + .tb-lo-item { margin-top: 2px; }
  .tb-lo-item:hover { background: rgba(255,255,255,0.06); }
  .tb-lo-t { font-size: 13px; font-weight: 600; }
  .tb-lo-sub { font-size: 11px; color: #7d8a99; }
  .tb-lo-danger .tb-lo-t { color: #ff7a7a; }
  .tb-lo-danger:hover { background: rgba(255,60,60,0.14); }
  /* "Signed in as …" header above the logout actions. */
  .tb-lo-who {
    display: flex; flex-direction: column; gap: 1px;
    padding: 6px 12px 9px; margin: 2px 0 5px; border-bottom: 1px solid #263041;
  }
  .tb-lo-who[hidden] { display: none; }
  .tb-lo-who-name { font-size: 13px; font-weight: 700; color: #e8eef5; }
  .tb-lo-who-login { font-size: 11px; color: #7d8a99; font-variant-numeric: tabular-nums; }

  /* === Start menu === */
  .startmenu {
    position: absolute; bottom: calc(var(--tb) + 8px); left: 8px;
    width: 280px; max-height: calc(100svh - var(--tb) - 26px); overflow-y: auto;
    background: #11161d; border: 1px solid #2a3040; border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    z-index: 110; padding: 7px;
    display: none;
  }
  /* Invisible click-catcher, shown only while the Start menu is open. Sits above
     the app iframes (z-index 99) but below the taskbar (100) and menu (110), so a
     click over an app — including the Browser, which swallows the event so
     focus/blur tricks miss it — lands on the parent document and the outside-click
     handler closes the menu. Taskbar and menu clicks stay above it and work. */
  #menu-scrim { position: fixed; inset: 0; z-index: 99; display: none; }
  .startmenu.open { display: block; }
  .startmenu .sm-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: #556; padding: 2px 8px 4px;
  }
  /* Signed-in user header — sized to MATCH the (trimmed) app rows (.sm-item:
     26px avatar, 4px 8px padding, gap 9px) so it reads as one of the family,
     not a taller or thinner odd-one-out. Single line (name · @login). */
  .sm-user {
    display: flex; align-items: center; gap: 9px;
    padding: 4px 8px; margin: 0 0 4px; border-radius: 8px;
    background: rgba(210,105,30,0.08); border: 1px solid #2a3040;
  }
  .sm-user[hidden] { display: none; }
  .sm-user-av {
    width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #b3540f, #d2691e);
  }
  .sm-user-txt { display: flex; align-items: baseline; gap: 6px; min-width: 0; }
  .sm-user-name { font-size: 13px; font-weight: 700; color: #e8eef5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sm-user-login { font-size: 11px; color: #8a9aaa; flex-shrink: 0; }
  .sm-item {
    display: flex; align-items: center; gap: 9px;
    padding: 4px 8px; border-radius: 8px; cursor: pointer; user-select: none;
    color: #c0d0e0; border: 1px solid transparent;
  }
  .sm-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); }
  .sm-item .sm-icon {
    display: flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 7px; font-size: 24px; flex-shrink: 0;
  }
  .sm-item[data-id="home"]     .sm-icon { background: #6b3510; }
  .sm-item[data-id="terminal"] .sm-icon { background: #1a5c2a; }
  .sm-item[data-id="browser"]  .sm-icon { background: #1a3a6b; }
  .sm-item[data-id="x11launcher"] .sm-icon { background: #5c1a44; }
  .sm-item[data-id="files"]    .sm-icon { background: #3a1a6b; }
  .sm-item[data-id="office"]   .sm-icon { background: #6b2a10; }
  .sm-item[data-id="notes"]    .sm-icon { background: #0a4a44; }
  .sm-item[data-id="monitor"]  .sm-icon { background: #4a3010; }
  .sm-item[data-id="upload"]   .sm-icon { background: #0f5c2e; }
  .sm-item[data-id="update"]   .sm-icon { background: #3a3a4a; }
  /* "System" subheading sits apart from the everyday apps above it */
  .sm-title-system { margin-top: 3px; border-top: 1px solid #222a36; padding-top: 7px; }
  /* Collapsible "Utilities" parent → a nested (two-level) submenu. Clicking the
     parent row expands/collapses the .sm-sub group beneath it. */
  .sm-parent {
    display: flex; align-items: center; gap: 9px;
    padding: 4px 8px; border-radius: 8px; cursor: pointer; user-select: none;
    color: #c0d0e0; border: 1px solid transparent;
  }
  .sm-parent:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); }
  .sm-parent .sm-icon {
    display: flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 7px; font-size: 22px; flex-shrink: 0;
    background: #3a3320;
  }
  .sm-parent .sm-parent-name { flex: 1; font-size: 14px; color: #e6edf3; }
  .sm-parent .sm-caret { color: #7a8a9a; font-size: 11px; transition: transform .15s ease; }
  .sm-parent.open .sm-caret { transform: rotate(90deg); }
  .sm-sub { display: none; margin: 1px 0 2px 14px; padding-left: 8px; border-left: 1px solid #222a36; }
  .sm-sub.open { display: block; }
  .sm-parent.has-active .sm-parent-name::after {
    content: "\25CF"; color: #34a853; font-size: 9px; margin-left: 8px; vertical-align: middle;
  }
  .sm-item[data-id="claudeusage"] .sm-icon { background: #234a2f; }
  .sm-item[data-id="tokenstats"] .sm-icon { background: #1f3350; }
  .sm-item[data-id="sysstats"] .sm-icon { background: #3a2340; }
  /* Build tag — lets you confirm whether a fresh shell loaded (vs a stale
     service-worker cache). Bump it whenever the shell changes. */
  .sm-build { text-align: center; padding: 5px 0 2px; }
  .sm-build .build-tag {
    display: inline-block; font: 600 11px ui-monospace, Menlo, monospace;
    color: #9ecbff; background: rgba(45,108,192,0.18);
    border: 1px solid rgba(80,140,220,0.45); border-radius: 999px;
    padding: 3px 11px; letter-spacing: 0.3px;
  }
  /* Build number + date together on a quiet line under the pill, so the date
     reads as the build date — not "today". */
  .sm-build .build-meta { display: block; margin-top: 4px; font: 400 10px ui-monospace, Menlo, monospace; color: #6a7a8a; letter-spacing: 0.2px; }
  .sm-item .sm-name { font-size: 14px; color: #e6edf3; display: flex; align-items: center; }
  .sm-item .sm-desc { font-size: 11px; color: #6a7a8a; margin-top: 0; line-height: 1.25; }
  /* Green dot = an active/existing session you'd resume or join. */
  .sm-item.running .sm-name::after { content: "\25CF"; color: #34a853; font-size: 9px; margin-left: 8px; }
  /* "Turn off on all devices" — only on running apps; a soft power glyph (matches
     the logout ⏻), muted by default so it never looks alarming. Tapping the row
     still opens the app; this closes it on every client (with a confirm). */
  .sm-item .sm-close {
    display: none; flex: 0 0 auto; margin-left: auto;
    width: 28px; height: 28px; border-radius: 7px; align-items: center;
    justify-content: center; color: #5d6b7e; font-size: 16px; line-height: 1;
    transition: background .12s ease, color .12s ease;
  }
  /* Quietly visible on every running row (consistent on desktop + touch); a soft
     tint on hover for affordance. */
  .sm-item.running .sm-close { display: flex; }
  .sm-item .sm-close:hover { background: rgba(255,255,255,0.08); color: #d99a9a; }
  .sm-item .sm-close:active { transform: translateY(1px); }
  /* Brief notice shown right before an auto-refresh to the latest shell. */
  .sw-updating {
    position: fixed; left: 50%; top: 18px; transform: translateX(-50%);
    z-index: 2147483647; background: #1f2937; color: #e6edf3;
    font: 13px system-ui, sans-serif; padding: 8px 15px; border-radius: 8px;
    border: 1px solid #2d6cc0; box-shadow: 0 6px 20px rgba(0,0,0,0.45);
  }

  /* === Frames === */
  .frames {
    flex: 1 1 auto; position: relative; min-height: 0;
    /* Soft radial glow behind the desktop wallpaper. The .wallpaper child holds
       the brand mark + name + blurb; any active app iframe is opaque and covers
       both. Pure-CSS gradient — no asset. */
    background: #0e1117 radial-gradient(130% 90% at 50% 42%, #1c2a44 0%, #121722 48%, #0c0f14 100%);
  }
  .frames iframe {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border: none; background: #1a1a2e; display: none;
  }
  .frames iframe.active { display: block; }

  /* Desktop wallpaper — the Vibetop brand mark, name, and a one-line "what it is"
     blurb. A static FIRST child of .frames, so any app iframe added after it
     (and set .active → opaque) paints over it; it shows on the empty/minimized
     desktop. Vector logo (crisp at any size) + real page-font text. */
  .wallpaper {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; gap: 15px;
    pointer-events: none; user-select: none;
  }

  }

  .wp-repo a {

  @media (max-width: 736px) {

    .taskbar::-webkit-scrollbar { display: none; }
    .start-btn, .task-app, .tb-stats, .tb-logout { flex-shrink: 0; }
    /* On phones the whole taskbar scrolls as one unit, so the tab strip should
       be its natural width (no grow, no nested scroll) and let the bar scroll. */
    .task-apps { flex: 0 0 auto; min-width: auto; overflow: visible; }
    .tb-spacer { flex: 0 0 8px; }
    /* Keep the menu a comfortable width on phones (was full-width via right:8px)
       — capped so it never overflows a very narrow screen. */
    .startmenu { left: 8px; right: auto; width: min(300px, calc(100vw - 16px)); }
  }

  /* === Implicit keyboard ⌨ button (touch only) ===
     Browser (xpra canvas) and Terminal (xterm) take keyboard input but have no
     DOM field of their own, and live-typing into the terminal's own textarea
     breaks under iOS dictation. So a HIDDEN <input> in the top page captures all
     input and forwards it live to the active app. iOS only raises the keyboard
     when you tap a real input, so the input is styled as this small ⌨ button
     (transparent text; the glyph is a pointer-events:none overlay so taps land
     on the input). No visible compose box — text appears straight in the app. */
  #kbd-btn {
    position: fixed; right: 8px; top: 42%; z-index: 101;   /* above #menu-scrim (99) so it stays tappable with the menu open */

  #kbd-input {

    border: 0; outline: none; background: transparent; color: transparent;
    caret-color: transparent; font-size: 16px; text-align: center; cursor: pointer; z-index: 1;
  }
  #kbd-ico {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; font: 600 22px system-ui, sans-serif; color: #fff;
  }

  /* === Document viewer (read-only office preview) === */
  .docviewer {

  .dv-edit:hover { background: #1b212b; color: #fff; }

    menuEl.querySelectorAll('.sm-item').forEach(function(it) {
      it.classList.toggle('running', isRunning(it.dataset.id));
    });

  // Refresh the live terminal-backend count so Terminal's dot reflects a running
  // session even when no Terminal window is open on any device.

  function setActive(id) {
    active = id;
    document.querySelectorAll('#frames iframe').forEach(function(f) {
      f.classList.toggle('active', f.dataset.id === id);
      // Let apps pause background work when they're not on top (e.g. Monitor
      // stops polling). Only message frames that have actually loaded — a frame
      // being opened for the first time gets its broadcast on load (see
      // notifyActiveFrame); messaging its about:blank now would be lost.
      if (f.src && f.contentWindow && f.dataset.id !== id) {
        try { f.contentWindow.postMessage({ type: 'vibetop:active', active: id }, '*'); } catch (e) {}
      }
    });
    // The wallpaper (logo + name + blurb) shows whenever no app covers it; only
    // the "Click Start" line is conditional — hide it once any app is open.
    if (hintEl) hintEl.classList.toggle('hidden', openApps.length > 0);
    renderTaskbar();
    persist();
    updateKbdBar();
    document.title = id ? (APPS[id].label + ' — Vibetop') : 'Vibetop';
    var f = id && frameOf(id);
    if (f) {
      if (!f.src) loadIfNeeded(f);     // notifyActiveFrame fires on load
      else notifyActiveFrame(f, id);   // already loaded → notify now
    }
    setTimeout(function () { if (active === id) coachForApp(id); }, 800);   // in-app tip once it settles
  }

  // Desktop-driven coach tips (shared vibeCoach helper, coach.js). Shown over the
  // active app's iframe so we teach in-app tricks without editing each app. Placed
  // above the taskbar (bottom offset) to clear the top usage/warning strips.
  function coachForApp(id) {
    if (!window.vibeCoach) return;
    var ex = document.querySelector('.vibe-coach'); if (ex) { try { ex.remove(); } catch (e) {} }   // clear the previous surface's tip
    if (id === 'files') {
      vibeCoach({ key: 'vibetop:tip:files-addr:v1', text: 'Tip: in Files, type any path in the address bar and press Enter to jump straight there' }, { bottom: 60 });
    } else if (id === 'browser') {
      vibeCoach({ key: 'vibetop:tip:browser-fit:v1', text: 'Tip: double-click (or double-tap) the Browser to fit it to your screen · tap the ⌨ button to type' }, { bottom: 60 });
    }
  }

  function launch(id) {
    if (!APPS[id]) return;
    if (openApps.indexOf(id) === -1) { openApps.push(id); ensureFrame(id); }
    setActive(id);            // relays status itself when id === 'home'
    closeMenu();
  }

  function closeApp(id) {
    var i = openApps.indexOf(id);
    if (i === -1) return;
    // Blur whatever has focus inside the closing iframe — xpra's #pasteboard
    // textarea grabs focus on touch, which keeps iOS Safari's visual viewport
    // shifted (as if a keyboard is up) even after the iframe is gone.
    try {
      var ae = document.activeElement;
      if (ae && typeof ae.blur === 'function') ae.blur();
    } catch (e) {}
    if (document.fullscreenElement) {
      try { document.exitFullscreen(); } catch (e) {}
    }

    openApps.splice(i, 1);
    var f = frameOf(id);
    if (f) f.parentNode.removeChild(f);     // fully unload the app
    if (active === id) {
      setActive(openApps.length ? openApps[Math.max(0, i - 1)] : null);
    } else {
      renderTaskbar();
      persist();
    }

    // Force a layout pass after the iframe swap so the taskbar slot and the
    // newly-active iframe both recompute against the current viewport.
    window.scrollTo(0, 0);
    framesEl.style.display = 'none';
    void framesEl.offsetHeight;
    requestAnimationFrame(function() {
      framesEl.style.display = '';
      window.dispatchEvent(new Event('resize'));
      var nf = active && frameOf(active);
      if (nf && nf.contentWindow) {
        try { nf.contentWindow.dispatchEvent(new Event('resize')); } catch (e) {}
      }
    });
  }

  // Tell the Browser iframe whether the menu is open so xpra-patches can CONSUME
  // the dismiss-click (the scrim eats it for other apps; the Browser's click
  // otherwise reaches xpra too) — keeps the dismiss behaviour consistent.
  function notifyBrowserMenu(open) {
    var bf = frameOf('browser');
    if (bf && bf.contentWindow) { try { bf.contentWindow.postMessage({ type: 'vibetop:menu-open', open: open }, '*'); } catch (e) {} }
  }
  function openMenu()  {
    menuEl.classList.add('open'); startBtn.classList.add('open'); scrimEl.style.display = 'block'; notifyBrowserMenu(true); pushDesktop();   // heartbeat refreshes the running dots + terminal badge
    // Cross-device close tip — only when something is running that ISN'T open here
    // (that's the case where the ⏻ is the only way to reach/close it).
    try {
      if (window.vibeCoach && runningGlobal.some(function (a) { return openApps.indexOf(a) === -1; })) {
        vibeCoach({ key: 'vibetop:tip:crossclose:v1', text: 'Tip: an app running on another device shows a ⏻ here — tap it to close that app on every device' }, { top: 8 });
      }
    } catch (e) {}
  }
  function closeMenu() { menuEl.classList.remove('open'); startBtn.classList.remove('open'); scrimEl.style.display = 'none'; notifyBrowserMenu(false); }
  function toggleMenu() { menuEl.classList.contains('open') ? closeMenu() : openMenu(); }

  // --- events ---
  startBtn.addEventListener('click', function(e) { e.stopPropagation(); toggleMenu(); });

  menuEl.addEventListener('click', function(e) {
    // A collapsible submenu header ("Utilities") — expand/collapse the .sm-sub
    // group right after it (two-level nested menu).
    var parent = e.target.closest('.sm-parent');
    if (parent) {
      var open = !parent.classList.contains('open');
      parent.classList.toggle('open', open);
      var sub = parent.nextElementSibling;
      if (sub && sub.classList.contains('sm-sub')) sub.classList.toggle('open', open);
      return;
    }
    var item = e.target.closest('.sm-item');
    if (!item) return;
    var id = item.dataset.id;
    if (APPS[id] && APPS[id].toggle) {   // a toggle row, not an app
      if (id === 'sysstats') { toggleSysStats(); } else { toggleClaudeUsage(); }
      return;
    }
    if (e.target.closest('.sm-close')) { closeEverywhere(id); return; }  // close-everywhere, not launch
    launch(id);
  });

  // Taskbar button = Windows-style window control: clicking a NON-active window
  // switches to it; clicking the ALREADY-active window MINIMIZES it (setActive
  // null → every app iframe hidden, app stays open in the taskbar); clicking it
  // again restores it. Switching is on pointerdown — same fix as the terminal
  // tabs: a focused app iframe makes the browser eat the first click moving focus
  // back to the parent, so click-based switching needed two clicks. Minimize is
  // decided on pointerup with a movement check so DRAGGING the active button to
  // reorder doesn't minimize it (dragstart also cancels the pending minimize).
  // Close + touch stay on click.
  var lastMouseTaskAt = -1e9;   // suppress the synthetic click that follows a mouse gesture
  var taskDown = null;          // mousedown on the active button → maybe minimize (decided on up)
  taskAppsEl.addEventListener('pointerdown', function(e) {
    if (e.pointerType !== 'mouse' || e.button) return;     // touch/pen handled on click
    var btn = e.target.closest('.task-app');
    if (!btn || e.target.closest('.close')) { taskDown = null; return; }  // close handled on click
    var id = btn.dataset.id;
    if (id !== active) { setActive(id); lastMouseTaskAt = e.timeStamp; taskDown = null; }
    else taskDown = { id: id, x: e.clientX, y: e.clientY };
  });
  window.addEventListener('pointerup', function(e) {
    if (!taskDown || e.pointerType !== 'mouse') return;
    var d = taskDown; taskDown = null;
    if (Math.abs(e.clientX - d.x) + Math.abs(e.clientY - d.y) < 6 && d.id === active) {
      setActive(null);                  // a tap (not a drag) on the active window → minimize
      lastMouseTaskAt = e.timeStamp;
    }
  });
  taskAppsEl.addEventListener('click', function(e) {
    var btn = e.target.closest('.task-app');
    if (!btn) return;
    var id = btn.dataset.id;
    if (e.target.closest('.close')) { closeApp(id); return; }
    if (e.timeStamp - lastMouseTaskAt < 700) return;        // mouse already handled (pointerdown/up)
    setActive(id === active ? null : id);                  // touch / fallback: minimize active, else switch
  });

  // --- drag-to-reorder taskbar apps (desktop; HTML5 DnD is a no-op on touch,
  // so tap/scroll behaviour is unchanged there). We reorder the DOM live during
  // dragover, then read the final order back into openApps on dragend. ---
  var dragEl = null;
  taskAppsEl.addEventListener('dragstart', function(e) {
    var btn = e.target.closest('.task-app');
    if (!btn) return;
    taskDown = null;          // a real drag-reorder cancels a pending minimize
    dragEl = btn;
    btn.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', btn.dataset.id); } catch (_) {}  // Firefox needs data set
  });
  taskAppsEl.addEventListener('dragover', function(e) {
    if (!dragEl) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var target = e.target.closest('.task-app');
    if (!target || target === dragEl) return;
    var rect = target.getBoundingClientRect();
    var after = e.clientX > rect.left + rect.width / 2;   // horizontal taskbar
    taskAppsEl.insertBefore(dragEl, after ? target.nextSibling : target);
  });
  taskAppsEl.addEventListener('drop', function(e) { e.preventDefault(); });
  taskAppsEl.addEventListener('dragend', function() {
    if (!dragEl) return;
    dragEl.classList.remove('dragging');
    dragEl = null;
    var order = [];
    taskAppsEl.querySelectorAll('.task-app').forEach(function(el) { order.push(el.dataset.id); });
    if (order.join(',') !== openApps.join(',')) {   // persist only a real change
      openApps = order;
      persist();
    }
  });

  document.addEventListener('click', function(e) {
    if (menuEl.classList.contains('open') &&
        !e.target.closest('#startmenu') && !e.target.closest('#start-btn')) {
      closeMenu();
    }
  });
  // (Clicks over an app iframe are caught by #menu-scrim — shown only while the
  // menu is open — which makes them land on this document so the handler above
  // closes the menu. This works even for the Browser, which swallows the event
  // so focus/blur-based detection missed it.)
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenu(); });

  // Messages from app iframes (e.g. terminal opening a URL in the browser).
  // All app iframes are same-origin, so reject cross-origin messages — one
  // branch triggers POST /api/browser/open with e.data.url (defense in depth;
  // the manager also validates the URL).
  window.addEventListener('message', function(e) {
    if (e.origin !== location.origin) return;
    if (!e.data) return;
    if (e.data.type === 'switch-to-browser') { launch('browser'); }
    // The Browser renders into a GPU-composited canvas, so a click there reaches
    // xpra instead of the #menu-scrim (normal-HTML apps are caught by the scrim).
    // xpra-patches posts this from inside the iframe so the menu still closes.
    if (e.data.type === 'vibetop:dismiss-menu') { if (menuEl.classList.contains('open')) closeMenu(); }
    if (e.data.type === 'open-in-browser' && e.data.url) {
      fetch('/api/browser/open', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: e.data.url })
      });
      launch('browser');
    }
    if (e.data.type === 'office-view' && e.data.path) {
      // Read-only: the manager renders the doc to PDF; show it in the viewer.
      openDoc(e.data.path);
    }
    if (e.data.type === 'office-edit' && e.data.path) {
      editDoc(e.data.path);
    }
    if (e.data.type === 'open-files-at') {
      // Deep-link Files at a path relative to ~. Files is now a tabbed wrapper
      // (files.html), so open a NEW tab there via postMessage instead of
      // overwriting its src (which would destroy the other tabs). Post a few
      // times to beat the first-load race; the wrapper dedupes repeats.
      var rel = (e.data.path || '').replace(/^\/+/, '');
      launch('files');
      var f = frameOf('files');
      if (f) {
        var post = function() { try { f.contentWindow.postMessage({ type: 'files-open-tab', path: rel }, '*'); } catch (_) {} };
        post();
        f.addEventListener('load', post, { once: true });
        setTimeout(post, 600);
      }
    }
  });

  // --- document viewer (read-only office preview) ---
  var dvEl = document.getElementById('docviewer');
  var dvBody = document.getElementById('dv-body');
  var dvDocPath = null;   // the doc currently shown (for the Edit button)
  function openDoc(path) {
    dvDocPath = path;
    var name = path.split('/').pop() || 'Document';
    document.getElementById('dv-title').textContent = name;
    dvBody.innerHTML = '<div class="dv-loading">Rendering…</div>';
    var iframe = document.createElement('iframe');
    // Document load (not fetch) → carries the Access cookie like the app frames.
    // #toolbar=0 hides the browser's native PDF toolbar (whose Download would
    // grab the PDF rendition) — the bar's Download button gets the real file.
    iframe.src = '/api/office/preview?path=' + encodeURIComponent(path) + '#toolbar=0';
    iframe.addEventListener('load', function() {
      var l = dvBody.querySelector('.dv-loading');
      if (l) l.remove();
    });
    dvBody.appendChild(iframe);
    dvEl.classList.add('open');
  }
  function closeDoc() {
    dvEl.classList.remove('open');
    dvBody.innerHTML = '';   // stop rendering / free the PDF
    dvDocPath = null;
  }
  // Open a doc in the OnlyOffice web editor (Office app) and switch to it.
  function editDoc(path) {
    if (openApps.indexOf('office') === -1) { openApps.push('office'); ensureFrame('office'); }
    var f = frameOf('office');
    var url = '/office-editor.html?path=' + encodeURIComponent(path);
    if (f) { f.src = url; f.dataset.src = url; }   // replace whatever was loaded
    setActive('office');
  }
  document.getElementById('dv-close').addEventListener('click', closeDoc);
  document.getElementById('dv-edit').addEventListener('click', function() {
    if (dvDocPath) { var p = dvDocPath; closeDoc(); editDoc(p); }
  });
  document.getElementById('dv-download').addEventListener('click', function() {
    if (!dvDocPath) return;
    // Download the ORIGINAL office file (not the PDF preview).
    var a = document.createElement('a');
    a.href = '/api/office/download?path=' + encodeURIComponent(dvDocPath);
    a.download = dvDocPath.split('/').pop();
    document.body.appendChild(a); a.click(); a.remove();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && dvEl.classList.contains('open')) closeDoc();
  });

  // --- status bar ---
  // --- Taskbar system stats (Utilities ▸ System Stats toggle) ----------------
  // SHARED across all clients: the preference lives on the server (desktop state)
  // and every client converges via the 5s desktop heartbeat (applyServerSysStats
  // from onDesktopResp). localStorage is only a fast-load cache so there's no
  // flash before the first heartbeat. When off, the CPU/GPU/MEM/VRAM readout (and
  // its separator) are hidden and the poll is skipped, freeing space for tabs.
  function sysStatsOn() { return localStorage.getItem('vibetop:sysstats') !== '0'; }  // default on
  function applySysStats() {
    var on = sysStatsOn();
    var el = document.querySelector('.tb-stats'); if (el) el.style.display = on ? '' : 'none';
    var sep = document.getElementById('tb-stats-sep'); if (sep) sep.style.display = on ? '' : 'none';
    var it = document.querySelector('.sm-item[data-id="sysstats"]');
    if (it) {
      it.classList.toggle('cu-on', on);
      var ds = it.querySelector('.sm-desc');
      if (ds) ds.textContent = on ? 'On — CPU/GPU in taskbar' : 'Off';
    }
  }
  function setSysStatsLocal(on) {
    try { localStorage.setItem('vibetop:sysstats', on ? '1' : '0'); } catch (e) {}
    applySysStats();
    // When turned on locally, the next heartbeat renders the numbers (toggleSysStats
    // kicks one right after the server agrees; a peer-driven change already rode in
    // on the heartbeat that delivered it).
  }
  // Reconcile with the shared server value (from the desktop heartbeat).
  window.applyServerSysStats = function(on) {
    if (on === sysStatsOn()) return;
    setSysStatsLocal(on);
  };
  window.toggleSysStats = function() {
    var want = !sysStatsOn();
    setSysStatsLocal(want);   // optimistic; other clients pick it up on their heartbeat
    fetch('/api/desktop/ui', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sysStats: want }) })
      .then(function() { if (want) pushDesktop(); })   // server now agrees → heartbeat returns d.system to render now
      .catch(function() {});
  };

  // Render-only: the taskbar stats now arrive on the desktop heartbeat as
  // `d.system` (see onDesktopResp) — the standalone /api/system/status poll was
  // folded onto that 5s channel. `d` is the system-status object.
  function renderSysStats(d) {
    if (!d) return;
    var set = function(id, v, unit) {
      var el = document.getElementById(id);
      if (!el) return;
      if (v == null) {
        el.textContent = '--';
        if (unit) document.getElementById(unit).style.visibility = 'hidden';
      } else {
        el.textContent = v;
        if (unit) document.getElementById(unit).style.visibility = '';
      }
    };
    // Round util to integer for the taskbar — 3-char max keeps the grid
    // tight; the Monitor app shows the precise value when needed.
    var ri = function(v) { return v != null ? Math.round(v) : null; };
    set('cpu-n',  ri(d.cpu_percent), 'cpu-u');
    set('cpu-tn', d.cpu_temp,        'cpu-tu');
    set('gpu-n',  ri(d.gpu_percent), 'gpu-u');
    set('gpu-tn', d.gpu_temp,        'gpu-tu');
    // Combine used/total into one cell so there's no whitespace around "/".
    var mem = (d.memory_used_gb != null && d.memory_total_gb != null)
      ? (Math.round(d.memory_used_gb) + '/' + Math.round(d.memory_total_gb)) : null;
    var vram = (d.gpu_vram_used_gb != null && d.gpu_vram_total_gb != null)
      ? (Math.round(d.gpu_vram_used_gb) + '/' + Math.round(d.gpu_vram_total_gb)) : null;
    set('mem-ut',  mem);
    set('vram-ut', vram);
  }

  // System-health warning banner, driven by the heartbeat's `warnings` array (see
  // `_system_warnings` server-side). Generic + extensible: each {id, level, text}
  // renders as a red row (`critical` a deeper red). Dismissal is per (id+level) for
  // the SESSION only, so a cleared-then-returning warning re-shows next session and
  // an escalation (warn → critical) re-shows immediately even if the milder one was
  // dismissed. When the condition clears (empty array) the banner hides itself
  // (#sys-warn:empty { display:none }).
  function renderWarnings(warns) {
    var host = document.getElementById('sys-warn');
    if (!host) return;
    warns = Array.isArray(warns) ? warns : [];
    var snoozed = {};
    try { snoozed = JSON.parse(sessionStorage.getItem('vibetop:warnsnooze') || '{}'); } catch (e) {}
    var show = warns.filter(function (w) { return w && w.text && snoozed[w.id] !== w.level; });
    host.innerHTML = '';
    show.forEach(function (w) {
      var row = document.createElement('div');
      row.className = 'sw-row' + (w.level === 'critical' ? ' sw-crit' : '');
      var msg = document.createElement('span');
      msg.className = 'sw-msg';
      msg.textContent = '⚠ ' + w.text;   // textContent — never trust server text as HTML
      row.appendChild(msg);
      var x = document.createElement('span');
      x.className = 'sw-x'; x.textContent = '×'; x.title = 'Dismiss for this session';
      x.addEventListener('click', function () {
        var s = {};
        try { s = JSON.parse(sessionStorage.getItem('vibetop:warnsnooze') || '{}'); } catch (e) {}
        s[w.id] = w.level;
        try { sessionStorage.setItem('vibetop:warnsnooze', JSON.stringify(s)); } catch (e) {}
        renderWarnings(warns);
      });
      row.appendChild(x);
      host.appendChild(row);
    });
  }

  applySysStats();   // apply the saved show/hide preference before the first heartbeat
  // No standalone stats/terminal polls: both fold onto the 5s desktop heartbeat
  // (renderSysStats + terminalCount in onDesktopResp). The first heartbeat fires
  // ~150ms after the restore GET (setActive → persist → pushDesktop).

  // Auto-surface terminal graphics: watch the X11 Launcher's display for NEW
  // windows (a gnuplot/matplotlib plot, xeyes, ImageMagick `display`, … started
  // in a Terminal) and pop the X11 Launcher to the front when one appears, so
  // graphics show up without manually opening the launcher. Edge-triggered on new
  // window ids — seeded on the first poll so windows already present at load don't
  // yank focus — and only switches when the launcher isn't already the active app.
  var seenXWins = null;   // null until the first poll seeds the baseline
  var xWinCount = 0;      // apps on the :98 X11 display — keeps the X11 Launcher's
                          // Start-menu row "running" (dot + ⏻ close-all) even when its
                          // window is closed, so orphaned apps stay reachable to close.
  function watchXWindows() {
    if (document.hidden) return;
    fetch('/api/x/windows').then(function(r) { return r.json(); }).then(function(d) {
      var ids = (d && Array.isArray(d.windows)) ? d.windows.map(function(w) { return w.id; }) : [];
      if (ids.length !== xWinCount) { xWinCount = ids.length; markMenuRunning(); }   // light/clear the launcher's row
      var next = {}; ids.forEach(function(id) { next[id] = 1; });
      if (seenXWins === null) { seenXWins = next; return; }   // seed, don't trigger
      var isNew = ids.some(function(id) { return !seenXWins[id]; });
      seenXWins = next;
      if (isNew && active !== 'x11launcher') launch('x11launcher');
    }).catch(function() {});
  }
  setInterval(watchXWindows, 4000);

  // Relay the auto-discovered network services to the Services app (the only app
  // that renders it). Needed because through the Cloudflare tunnel an iframe's
  // own fetch doesn't carry the Access cookie, so the parent fetches and
  // forwards. Only sent while Services ('home') is the active app.
  function post(id, msg) {
    var f = frameOf(id);
    if (f && f.contentWindow) { try { f.contentWindow.postMessage(msg, '*'); } catch (e) {} }
  }
  function relayStatus() {
    if (active !== 'home') return;   // backgrounded Services = wasted scan/relay
    fetch('/api/services/discover').then(function(r) { return r.json(); }).then(function(data) {
      post('home', { type: 'services', data: data });
    }).catch(function() {});
  }
  setInterval(relayStatus, 5000);
  setTimeout(relayStatus, 1500);

  // Start-menu version: fetched live from the manager (which reads the root
  // VERSION file) so a VERSION bump — or a `git pull` that only touched VERSION —
  // shows up with NO shell redeploy or sw bump. The @VERSION@ stamped into this
  // page at deploy time is just the offline/initial fallback.
  fetch('/api/update').then(function(r) { return r.json(); }).then(function(d) {
    var el = document.getElementById('build-ver');
    if (el && d && d.version) el.textContent = d.version;
    var de = document.getElementById('build-date');
    // build_date = when sw.js (the "build vN") was last cut — matches the build
    // number beside it. NOT version_date (the VERSION-file/release date), which
    // goes stale when a shell-only build bumps sw.js without cutting a release.
    if (de && d && d.build_date) de.textContent = ' · ' + d.build_date;   // " · <date>" after "build vN"
  }).catch(function() {});

  // --- restore THIS instance's own windows; seed the running dots ----------
  // We fetch by instance id, so each device restores only the windows IT had
  // open (no cross-instance window mirroring). `running` seeds the dots and
  // `reset_epoch` baselines the logout/reset detector.
  fetch('/api/desktop?instance=' + encodeURIComponent(INSTANCE_ID))
    .then(function(r) { return r.json(); }).then(function(state) {
    var saved = (state && Array.isArray(state.open)) ? state.open : [];
    saved.forEach(function(id) {
      if (APPS[id] && openApps.indexOf(id) === -1) { openApps.push(id); ensureFrame(id); }
    });
    runningGlobal = (state && Array.isArray(state.running)) ? state.running : [];
    lastResetEpoch = (state && typeof state.reset_epoch === 'number') ? state.reset_epoch : 0;
    var lastActive = state && state.active;
    if (!openApps.length) {
      setActive(null);
      openMenu();   // fresh desktop: show the launcher so there's an obvious next step
    } else if (lastActive === null) {
      setActive(null);   // restore a minimized desktop (apps open, none shown) — don't auto-open one
    } else {
      setActive(openApps.indexOf(lastActive) !== -1 ? lastActive : openApps[0]);
    }
    markMenuRunning();
  }).catch(function() {
    // API unreachable — boot to empty desktop instead of hanging on a spinner.
    setActive(null);
    openMenu();
  });
  // Heartbeat: keeps us in the live union, refreshes other instances' dots, and
  // catches a logout/reset that happened on another device.
  setInterval(pushDesktop, 5000);
  // Re-register the instant the tab is shown again — background tabs get their
  // timers throttled (so the 5s heartbeat stalls), and this also refreshes the
  // "running" dots immediately when you return to or switch to this machine.
  document.addEventListener('visibilitychange', function() { if (!document.hidden) pushDesktop(); });
})();

// PWA service worker — caches the shell for instant cold loads. Registered
// separately so a failure here can never affect the desktop above. When an
// updated SW takes control (e.g. after a shell change), reload once so the
// fresh shell loads immediately instead of needing a second relaunch.
// Auto-refresh on deploy. The SSE reload path uses a plain window.location.reload()
// and does NOT need a service worker — so it must run even on insecure origins
// (http://z20.local, http://<LAN-IP>) where `navigator.serviceWorker` is undefined
// (it's a secure-context-only API). Previously this whole block was nested in
// `if ('serviceWorker' in navigator)`, so LAN/HTTP sessions never subscribed to
// /api/events and never auto-updated, while the HTTPS tunnel (a secure context)
// did. The SW-specific bits (register + controllerchange) stay guarded below.
(function autoRefresh() {
  var hasSW = ('serviceWorker' in navigator);
  var swRefreshing = false;
  var loadedShellVer = null;   // shell version this page is running (from the first hello)
  // A new shell was deployed → full refresh of the WHOLE vibetop desktop. One
  // reload pulls in every app iframe too, so a deploy reaches all of vibetop with
  // no per-app update logic. A brief notice so the reload reads as intentional.
  // Persistent state survives (terminals/Browser reconnect, notes autosave,
  // Files/Notes tabs are server-side).
  function doReload() {
    if (swRefreshing) return; swRefreshing = true;
    try {
      var t = document.createElement('div'); t.className = 'sw-updating';
      t.textContent = 'Updating vibetop to the latest version…';
      document.body.appendChild(t);
    } catch (e) {}
    setTimeout(function() { window.location.reload(); }, 1200);
  }
  function updateSW() {   // no-op without a SW (insecure origin) — guarded
    try { if (hasSW) navigator.serviceWorker.getRegistration().then(function(r) { if (r) r.update().catch(function() {}); }).catch(function() {}); } catch (e) {}
  }
  function triggerRefresh() { updateSW(); doReload(); }
  function subscribeUpdates() {
    try {
      var es = new EventSource('/api/events');
      // hello fires on every (re)connect. The FIRST baselines this page's version;
      // a LATER one that differs means the shell changed while we were
      // disconnected/backgrounded → self-heal. The live `reload` event covers a
      // foreground tab during a deploy.
      es.addEventListener('hello', function(e) {
        if (loadedShellVer === null) loadedShellVer = e.data;
        else if (e.data && e.data !== loadedShellVer) triggerRefresh();
      });
      es.addEventListener('reload', triggerRefresh);
    } catch (e) {}
  }
  // SW-specific (secure context only): register the SW and reload when an *updated*
  // SW replaces an existing one. hadController is false on first install (its
  // clients.claim() also fires controllerchange — reloading then would throw away
  // the initial load), true on a later update.
  if (hasSW) {
    var hadController = !!navigator.serviceWorker.controller;
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (hadController) doReload();
    });
  }
  document.addEventListener('visibilitychange', function() { if (!document.hidden) updateSW(); });
  window.addEventListener('load', function() {
    if (hasSW) navigator.serviceWorker.register('/sw.js').catch(function() {});
    subscribeUpdates();   // always — SSE reload works without a SW
  });
})();

// Logout = full reset: close all apps, stop all terminals (and their
// background processes), reset the Browser to a blank Chromium, then log out —
// so the next login starts fresh. The href is the no-JS fallback.
(function() {
  // One ⏻ button -> a small drop-up menu with two actions:
  //  • Log out (this device): clear THIS browser's session; terminals/files keep
  //    running (you may be signed in elsewhere). -> /login.html
  //  • Log out all devices: invalidate every session for your account (server-side
  //    token-epoch bump) AND fresh-start reset, then the Cloudflare Access logout.
  var btn = document.getElementById('tb-logout');
  var menu = document.getElementById('tb-logout-menu');
  if (btn && menu) {
    var closeMenu = function() { menu.hidden = true; btn.setAttribute('aria-expanded', 'false'); };
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var willOpen = menu.hidden;
      menu.hidden = !willOpen;
      btn.setAttribute('aria-expanded', String(willOpen));
    });
    menu.addEventListener('click', function(e) { e.stopPropagation(); });
    document.addEventListener('click', function() { if (!menu.hidden) closeMenu(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenu(); });

    document.getElementById('tb-lo-this').addEventListener('click', function() {
      closeMenu();
      var go = function() { window.location.href = '/login.html'; };
      fetch('/api/logout', { method: 'POST' }).then(go, go);
    });
    document.getElementById('tb-lo-all').addEventListener('click', function() {
      closeMenu();
      vibeConfirm('Log out of ALL your devices?\nEvery browser signed in as you will be signed out, your terminals will be stopped, and the desktop reset.',
        { okText: 'Log out everywhere', danger: true }).then(function(ok) {
        if (!ok) return;
        var go = function() { window.location.href = '/cdn-cgi/access/logout'; };
        var all = function() { return fetch('/api/logout/all', { method: 'POST' }); };
        fetch('/api/reset', { method: 'POST' }).then(all, all).then(go, go);
      });
    });
  }
})();

// --- Signed-in user (Start menu + logout menu) -----------------------------
// One fetch of /api/me (username + GECOS full name) shows who's signed in. The
// full name is preferred as the display; @username is the secondary line (and
// omitted when there's no full name, since the name line already IS the login).
(function() {
  fetch('/api/me').then(function(r) { return r.json(); }).then(function(me) {
    if (!me || !me.user) return;
    var full = (me.name || '').trim(), login = me.user, display = full || login;
    var set = function(id, t) { var el = document.getElementById(id); if (el) el.textContent = t; };
    // Start-menu header
    set('sm-user-av', display.charAt(0).toUpperCase());
    set('sm-user-name', display);
    var sl = document.getElementById('sm-user-login');
    if (sl) { sl.textContent = full ? ('@' + login) : ''; sl.style.display = full ? '' : 'none'; }
    var su = document.getElementById('sm-user'); if (su) su.hidden = false;
    // Logout drop-up header
    set('tb-lo-who-name', display);
    var wl = document.getElementById('tb-lo-who-login');
    if (wl) { wl.textContent = full ? ('@' + login) : ''; wl.hidden = !full; }
    var who = document.getElementById('tb-lo-who'); if (who) who.hidden = false;
    // Wallpaper greeting (shown on the empty desktop, under the brand name)
    set('wp-greet', 'Welcome back, ' + display);
    var wg = document.getElementById('wp-greet'); if (wg) wg.hidden = false;
  }).catch(function() {});
})();

// --- Claude plan-usage strip (opt-in) --------------------------------------
// There is no API to query Max-plan usage; the numbers exist only as response
// headers on live API calls. Start ▸ System ▸ "Claude Usage" toggles a local
// pass-through proxy (POST /api/claude/usage) that Claude Code is routed through
// to capture them; GET /api/claude/usage serves the latest. The strip is a
// glanceable session/weekly % bar. The on/off state is server-side (shared), so
// the strip shows on EVERY client whenever it's enabled; the strip ✕ and the
// Start-menu toggle both turn the feature off everywhere (no per-tab hide).
(function claudeUsage() {
  var strip = document.getElementById('cu-strip');
  if (!strip) return;
  var enabled = false;
  var lastData = null;
  var localOverrideUntil = 0;   // ignore heartbeat reconcile briefly after a local toggle
  function fmtReset(ts) {
    if (!ts) return '';
    var s = Math.max(0, ts - Math.floor(Date.now() / 1000));
    var d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600),
        m = Math.floor((s % 3600) / 60);
    if (d > 0) return d + 'd ' + h + 'h';           // days out (e.g. weekly): "6d 23h"
    if (h > 0) return h + 'h ' + (m < 10 ? '0' : '') + m + 'm';
    return m + 'm';
  }
  function seg(label, pct, reset) {
    var p = Math.round((pct || 0) * 100);
    var cls = p >= 90 ? 'crit' : p >= 70 ? 'warn' : '';
    var rtxt = reset ? fmtReset(reset) : '';
    var r = rtxt ? '<span class="cu-dim">· resets ' + rtxt + '</span>' : '';
    var title = rtxt ? ' title="resets in ' + rtxt + '"' : '';
    return '<span class="cu-seg"' + title + '><span class="cu-lbl">' + label + '</span>' +
      '<span class="cu-bar"><span class="cu-fill ' + cls + '" style="width:' + p + '%"></span></span>' +
      '<span class="cu-pct">' + p + '%</span>' + r + '</span>';
  }
  function updateToggleRow() {
    // Look the row up via document (NOT the outer `menuEl` closure var — this
    // IIFE lives in a nested scope; referencing menuEl here once threw a
    // ReferenceError that a render-path .catch swallowed, silently killing every
    // render — the "toggle does nothing / strip never shows" bug).
    var it = document.querySelector('.sm-item[data-id="claudeusage"]');
    if (it) {
      it.classList.toggle('cu-on', enabled);
      var ds = it.querySelector('.sm-desc');
      if (ds) ds.textContent = enabled ? 'On — plan usage strip' : 'Off';
    }
    // Mirror the active state onto the collapsed "Utilities" parent so you can
    // see something inside is on without expanding it.
    var parent = document.getElementById('sm-util-parent');
    if (parent) parent.classList.toggle('has-active', enabled);
  }
  function render(d) {
    if (d) lastData = d;
    enabled = !!(d && d.enabled);
    updateToggleRow();
    // Show the strip whenever the (server-side, shared) feature is enabled — no
    // per-tab hide, so every client is consistent: on = shown everywhere.
    if (!enabled) { strip.hidden = true; return; }
    strip.hidden = false;
    var html = '<span class="cu-brand">Claude</span><span class="cu-metrics">';
    if (d.session && d.session.pct != null) {
      html += seg('session', d.session.pct, d.session.reset);
      if (d.weekly && d.weekly.pct != null)
        html += seg('week', d.weekly.pct, d.weekly.reset);
      if (d.stale) html += '<span class="cu-dim cu-asof">as of ' + Math.round((d.ageSec || 0) / 60) + 'm ago</span>';
    } else {
      html += '<span class="cu-dim">waiting for first API call…</span>';
    }
    html += '</span><span class="cu-x" id="cu-x" title="Turn off Claude Usage (all devices)">✕</span>';
    strip.innerHTML = html;
    var x = document.getElementById('cu-x');
    if (x) x.onclick = function() { window.toggleClaudeUsage(); };   // ✕ = turn the feature off everywhere
  }
  // Both the enabled flag AND the numbers now ride the 5s desktop heartbeat
  // (onDesktopResp → here): the manager folds `claude` (the /api/claude/usage
  // payload) onto every heartbeat when the feature is on, so this feature has NO
  // standalone poll anymore — the strip updates within ~5s of a real API call
  // instead of up to 30s. `on` is the boolean flag; `data` is the numbers
  // payload (present only when enabled). Skip briefly after a LOCAL toggle so a
  // heartbeat firing mid-`systemctl` (settings.json not yet written) can't
  // clobber the optimistic state.
  window.applyServerClaudeUsage = function(on, data) {
    if (Date.now() < localOverrideUntil) return;
    if (data) { render(data); return; }        // enabled: full payload rode in
    if (on === enabled) return;
    var opt = {}; for (var k in (lastData || {})) opt[k] = lastData[k];
    opt.enabled = on;
    render(opt);                                // disabled (or flag-only): hide
  };
  window.toggleClaudeUsage = function() {
    var want = !enabled;
    // Optimistic: reflect the new state instantly (the POST runs systemctl, so
    // it's not immediate). Guard against a mid-`systemctl` heartbeat until the
    // POST confirms; then clear the guard and kick a heartbeat to pull the real
    // (server-confirmed) state + numbers.
    localOverrideUntil = Date.now() + 8000;     // fallback if the POST never resolves
    var opt = {}; for (var k in (lastData || {})) opt[k] = lastData[k];
    opt.enabled = want;
    render(opt);
    fetch('/api/claude/usage', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: want })
    }).then(function() { localOverrideUntil = 0; pushDesktop(); })
      .catch(function() { localOverrideUntil = 0; });
  };
  // No initial poll / interval / visibilitychange handler: the restore GET and
  // the 5s heartbeat (which also re-fires on visibilitychange) drive the strip.
})();
</script>
</body>
</html>
