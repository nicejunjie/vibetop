<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- user-scalable=no + maximum-scale=1: iOS Safari's pinch-zoom is page-wide
     (a pinch inside any iframe zooms the entire parent), and once it sticks
     it's effectively impossible to reset programmatically. Disabling it on
     the shell keeps the desktop layout pinned at 1.0; each app handles its
     own zoom internally (xpra zooms its canvas, text apps don't need it). -->
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Vibetop</title>
<!-- PWA: installable, full-screen home-screen app. The manifest + apple-* tags
     make "Add to Home Screen" launch standalone (no Safari chrome), and sw.js
     caches the shell so cold loads are instant. -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#161b22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Vibetop">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/icons/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* --tb = taskbar height incl. the phone's bottom safe-area (home indicator). */
  :root { --tb: calc(54px + env(safe-area-inset-bottom)); }
  html, body { height: 100%; height: 100svh; overflow: hidden; }
  /* Flex column sized to the SMALL viewport (svh) — the portion always visible
     even when iOS Safari shows its URL/toolbar. dvh would let body exceed the
     visible area when toolbars expand, pushing the taskbar off-screen. svh
     guarantees the taskbar stays in the safe visible region; the tradeoff is
     a tiny strip of body background below the taskbar when toolbars retract. */
  body {
    background: #0e1117; font-family: system-ui, sans-serif; color: #e0e0e0;
    display: flex; flex-direction: column; position: relative;
  }

  /* === Taskbar === */
  .taskbar {
    flex: 0 0 auto; height: var(--tb);
    display: flex; align-items: center;
    background: #161b22; border-top: 1px solid #2a3040;
    z-index: 100; padding: 0 8px; gap: 4px;
    padding-bottom: env(safe-area-inset-bottom);
    font-family: system-ui, sans-serif;
  }

  /* Start button — always present, like Windows' Start */
  .start-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; height: 40px;
    border-radius: 8px; cursor: pointer; user-select: none;
    font-size: 15px; font-weight: 600; color: #e8eef5;
    background: linear-gradient(135deg, #b3540f, #d2691e);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .start-btn:hover { filter: brightness(1.12); }
  .start-btn.open { box-shadow: 0 0 0 2px rgba(210,105,30,0.5) inset; filter: brightness(1.12); }
  .start-btn .icon { font-size: 18px; line-height: 1; }

  .tb-sep { width: 1px; height: 28px; background: #2a3040; margin: 0 6px; }

  /* Open-app buttons (only present while the app is open) */
  .task-apps { display: flex; align-items: center; gap: 2px; }
  .task-app {
    position: relative;
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px 6px 12px; height: 38px;
    border-radius: 8px; cursor: pointer; user-select: none;
    font-size: 14px; color: #8a9aaa;
    border: 1px solid transparent;
    border-bottom: 2px solid transparent;
  }
  .task-app:hover { background: rgba(255,255,255,0.06); color: #c0d0e0; }
  .task-app.active { color: #fff; background: rgba(255,255,255,0.08); }
  /* drag-to-reorder: the dragged button is dimmed while it's being moved */
  .task-app.dragging { opacity: 0.4; }
  .task-app .icon { font-size: 17px; line-height: 1; }
  .task-app .close {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; margin-left: 2px; border-radius: 4px;
    font-size: 14px; line-height: 1; color: #5a6a7a;
  }
  .task-app .close:hover { background: #aa3333; color: #fff; }
  /* per-app accent on the active underline */
  .task-app.active[data-id="home"]     { border-bottom-color: #d2691e; }
  .task-app.active[data-id="terminal"] { border-bottom-color: #33aa55; }
  .task-app.active[data-id="browser"]  { border-bottom-color: #3a7adb; }
  .task-app.active[data-id="files"]    { border-bottom-color: #8a4adb; }
  .task-app.active[data-id="office"]   { border-bottom-color: #d2691e; }
  .task-app.active[data-id="notes"]    { border-bottom-color: #1ab3a6; }
  .task-app.active[data-id="monitor"]  { border-bottom-color: #d2902a; }
  .task-app.active[data-id="upload"]   { border-bottom-color: #3ab36a; }
  .task-app.active[data-id="update"]   { border-bottom-color: #8a8a9a; }

  .tb-spacer { flex: 1; }

  /* Each row: [label] [num] [%] [num] [°]  [label] [num/num] [G]
     Numeric columns use fixed `ch` widths so labels don't shift sideways as
     values change digit-count (e.g. "0.3%" → "0%"). column-gap is 0 so
     digits/units touch ("0.6%", "48°", "13/60G"); spacing is added
     explicitly only between groups. tabular-nums keeps digit widths
     uniform. */
  .tb-stats {
    display: grid;
    grid-template-columns:
      auto         /* CPU/GPU label */
      3ch  auto    /* %  number + unit (integer 0..100) */
      2ch  auto    /* °  number + unit (CPU/GPU temps are 2 digits) */
      auto         /* MEM/VRAM label */
      5ch  auto;   /* used/total + G */
    column-gap: 0; row-gap: 1px; align-content: center;
    font-size: 12px; line-height: 1.35;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-variant-numeric: tabular-nums;
    color: #6a7a8a; white-space: nowrap;
  }
  .tb-stats .label { color: #556; padding-right: 4px; }
  .tb-stats .n     { color: #9ab; text-align: right; }
  .tb-stats .u     { color: #9ab; text-align: left; }
  /* Gap between util % and the temperature on the CPU/GPU block. */
  .tb-stats .u:nth-child(8n+3) { padding-right: 6px; }
  /* Gap between ° and the MEM/VRAM label */
  .tb-stats .u:nth-child(8n+5) { padding-right: 12px; }

  .tb-logout {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px;
    font-size: 18px; color: #aa4444; cursor: pointer;
    text-decoration: none; margin-left: 8px;
    border: 1px solid rgba(255,60,60,0.15);
  }
  .tb-logout:hover { background: rgba(255,60,60,0.2); color: #ff6666; border-color: rgba(255,60,60,0.3); }

  /* === Start menu === */
  .startmenu {
    position: absolute; bottom: calc(var(--tb) + 8px); left: 8px;
    width: 280px; max-height: calc(100svh - var(--tb) - 26px); overflow-y: auto;
    background: #11161d; border: 1px solid #2a3040; border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    z-index: 110; padding: 7px;
    display: none;
  }
  .startmenu.open { display: block; }
  .startmenu .sm-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: #556; padding: 2px 8px 4px;
  }
  .sm-item {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 9px; border-radius: 8px; cursor: pointer; user-select: none;
    color: #c0d0e0; border: 1px solid transparent;
  }
  .sm-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); }
  .sm-item .sm-icon {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px; font-size: 16px; flex-shrink: 0;
  }
  .sm-item[data-id="home"]     .sm-icon { background: #6b3510; }
  .sm-item[data-id="terminal"] .sm-icon { background: #1a5c2a; }
  .sm-item[data-id="browser"]  .sm-icon { background: #1a3a6b; }
  .sm-item[data-id="files"]    .sm-icon { background: #3a1a6b; }
  .sm-item[data-id="office"]   .sm-icon { background: #6b2a10; }
  .sm-item[data-id="notes"]    .sm-icon { background: #0a4a44; }
  .sm-item[data-id="monitor"]  .sm-icon { background: #4a3010; }
  .sm-item[data-id="upload"]   .sm-icon { background: #0f5c2e; }
  .sm-item[data-id="update"]   .sm-icon { background: #3a3a4a; }
  /* "System" subheading sits apart from the everyday apps above it */
  .sm-title-system { margin-top: 3px; border-top: 1px solid #222a36; padding-top: 7px; }
  /* Build tag — lets you confirm whether a fresh shell loaded (vs a stale
     service-worker cache). Bump it whenever the shell changes. */
  .sm-build { text-align: center; padding: 5px 0 2px; }
  .sm-build .build-tag {
    display: inline-block; font: 600 11px ui-monospace, Menlo, monospace;
    color: #9ecbff; background: rgba(45,108,192,0.18);
    border: 1px solid rgba(80,140,220,0.45); border-radius: 999px;
    padding: 3px 11px; letter-spacing: 0.3px;
  }
  .sm-item .sm-name { font-size: 14px; color: #e6edf3; display: flex; align-items: center; }
  .sm-item .sm-desc { font-size: 11px; color: #6a7a8a; margin-top: 0; line-height: 1.25; }
  /* Green dot = an active/existing session you'd resume or join. */
  .sm-item.running .sm-name::after { content: "\25CF"; color: #34a853; font-size: 9px; margin-left: 8px; }

  /* === Frames === */
  .frames {
    flex: 1 1 auto; position: relative; min-height: 0;
    /* Soft radial glow behind the desktop wallpaper. The .wallpaper child holds
       the brand mark + name + blurb; any active app iframe is opaque and covers
       both. Pure-CSS gradient — no asset. */
    background: #0e1117 radial-gradient(130% 90% at 50% 42%, #1c2a44 0%, #121722 48%, #0c0f14 100%);
  }
  .frames iframe {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border: none; background: #1a1a2e; display: none;
  }
  .frames iframe.active { display: block; }

  /* Desktop wallpaper — the Vibetop brand mark, name, and a one-line "what it is"
     blurb. A static FIRST child of .frames, so any app iframe added after it
     (and set .active → opaque) paints over it; it shows on the empty/minimized
     desktop. Vector logo (crisp at any size) + real page-font text. */
  .wallpaper {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; gap: 15px;
    pointer-events: none; user-select: none;
  }
  .wp-logo {
    width: clamp(150px, 27vmin, 250px); height: auto;
    opacity: 0.92;   /* near-full — the calm look comes from the muted tile colors, not from fading */
    filter: drop-shadow(0 12px 40px rgba(0,0,0,0.35));
  }
  .wp-name {
    font-size: clamp(30px, 5.4vmin, 46px); font-weight: 600; letter-spacing: 0.5px;
    color: #c3ccd6; margin-top: 4px;   /* soft off-white to match the calmer mark */
  }
  .wp-desc {
    max-width: 470px; font-size: clamp(13px, 1.95vmin, 15px); line-height: 1.6; color: #7a8696;
  }
  .wp-hint { margin-top: 8px; font-size: 13px; color: #46566a; }
  .wp-hint b { color: #6b7a8d; font-weight: 600; }
  .wp-hint.hidden { display: none; }

  /* === Narrow screens: scrollable taskbar + roomy menu === */
  @media (max-width: 736px) {
    .taskbar { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .taskbar::-webkit-scrollbar { display: none; }
    .start-btn, .task-app, .tb-stats, .tb-logout { flex-shrink: 0; }
    .tb-spacer { flex: 0 0 8px; }
    .startmenu { left: 8px; right: 8px; width: auto; }
  }

  /* === Implicit keyboard ⌨ button (touch only) ===
     Browser (xpra canvas) and Terminal (xterm) take keyboard input but have no
     DOM field of their own, and live-typing into the terminal's own textarea
     breaks under iOS dictation. So a HIDDEN <input> in the top page captures all
     input and forwards it live to the active app. iOS only raises the keyboard
     when you tap a real input, so the input is styled as this small ⌨ button
     (transparent text; the glyph is a pointer-events:none overlay so taps land
     on the input). No visible compose box — text appears straight in the app. */
  #kbd-btn {
    position: fixed; right: 8px; top: 42%; z-index: 95;
    width: 50px; height: 50px; border-radius: 25px; display: none;
    background: #2d6cc0; border: 1px solid #2d6cc0; box-shadow: 0 4px 14px rgba(0,0,0,.5);
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  body.kbd-on #kbd-btn { display: block; }
  #kbd-btn.open { background: #d23a2a; border-color: #d23a2a; }
  #kbd-input {
    position: absolute; inset: 0; width: 100%; height: 100%; margin: 0; padding: 0;
    border: 0; outline: none; background: transparent; color: transparent;
    caret-color: transparent; font-size: 16px; text-align: center; cursor: pointer; z-index: 1;
  }
  #kbd-ico {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; font: 600 22px system-ui, sans-serif; color: #fff;
  }

  /* === Document viewer (read-only office preview) === */
  .docviewer {
    position: fixed; inset: 0; z-index: 200; display: none;
    flex-direction: column; background: #0e1117;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .docviewer.open { display: flex; }
  .dv-bar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: #161b22; border-bottom: 1px solid #2a3040;
  }
  .dv-title {
    font: 600 14px system-ui, sans-serif; color: #cde;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70vw;
  }
  .dv-spacer { flex: 1; }
  .dv-edit, .dv-close {
    font: 600 14px system-ui, sans-serif; cursor: pointer; border-radius: 8px; padding: 8px 16px;
  }
  .dv-edit { color: #cde; background: transparent; border: 1px solid #2a3040; margin-right: 8px; }
  .dv-edit:hover { background: #1b212b; color: #fff; }
  .dv-close { color: #fff; background: #2d6cc0; border: 1px solid #2d6cc0; }
  .dv-close:hover { background: #3a7adb; }
  .dv-body { flex: 1; position: relative; background: #333; }
  .dv-body iframe { width: 100%; height: 100%; border: 0; display: block; }
  .dv-loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #9ab; font: 14px system-ui, sans-serif;
  }
</style>
</head>
<body>
  <div class="frames" id="frames">
    <div class="wallpaper" aria-hidden="true">
      <svg class="wp-logo" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="112" height="112" rx="28" fill="#cb8a4f"/>
        <rect x="128" y="0" width="112" height="112" rx="28" fill="#54a86e"/>
        <rect x="0" y="128" width="112" height="112" rx="28" fill="#5184ce"/>
        <rect x="128" y="128" width="112" height="112" rx="28" fill="#8a64c6"/>
      </svg>
      <div class="wp-name">Vibetop</div>
      <div class="wp-desc">A self-hosted mini-OS desktop in your browser for all your vibe coding needs.</div>
      <div class="wp-hint" id="wp-hint">Click <b>&nbsp;⊞ Start&nbsp;</b> to open an app</div>
    </div>
  </div>

  <!-- Read-only document viewer (office files rendered to PDF by the manager) -->
  <div class="docviewer" id="docviewer">
    <div class="dv-bar">
      <span class="dv-title" id="dv-title">Document</span>
      <span class="dv-spacer"></span>
      <button class="dv-edit" id="dv-download" title="Download the original file">⤓ Download</button>
      <button class="dv-edit" id="dv-edit" title="Open in OnlyOffice for editing">✎ Edit</button>
      <button class="dv-close" id="dv-close">✕ Close</button>
    </div>
    <div class="dv-body" id="dv-body"><div class="dv-loading">Rendering…</div></div>
  </div>

  <div class="startmenu" id="startmenu">
    <div class="sm-title">Apps</div>
    <div id="sm-apps"></div>
    <div class="sm-title sm-title-system">System</div>
    <div id="sm-system"></div>
    <div class="sm-build"><span class="build-tag">Vibetop · v<span id="build-ver">@VERSION@</span></span></div>
  </div>

  <div class="taskbar" id="taskbar">
    <div class="start-btn" id="start-btn"><span class="icon">⊞</span> Start</div>
    <div class="tb-sep"></div>
    <div class="task-apps" id="task-apps"></div>
    <div class="tb-spacer"></div>
    <div class="tb-stats">
      <span class="label">CPU</span>
      <span class="n"  id="cpu-n">--</span><span class="u" id="cpu-u">%</span>
      <span class="n"  id="cpu-tn">--</span><span class="u" id="cpu-tu">°</span>
      <span class="label">MEM</span>
      <span class="n"  id="mem-ut">--</span><span class="u">G</span>

      <span class="label">GPU</span>
      <span class="n"  id="gpu-n">--</span><span class="u" id="gpu-u">%</span>
      <span class="n"  id="gpu-tn">--</span><span class="u" id="gpu-tu">°</span>
      <span class="label">VRAM</span>
      <span class="n"  id="vram-ut">--</span><span class="u">G</span>
    </div>
    <div class="tb-sep"></div>
    <a class="tb-logout" id="tb-logout" href="/cdn-cgi/access/logout" title="Log out (closes all apps, terminals & browser — fresh start)">⏻</a>
  </div>

  <!-- Browser keyboard button (top-level so iOS reliably raises the keyboard) -->
  <!-- Implicit keyboard (touch, Browser/Terminal): tap the ⌨ button to raise the
       keyboard, then type/dictate — input forwards live into the active app. -->
  <div id="kbd-btn" title="Keyboard"><input id="kbd-input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"><span id="kbd-ico">⌨</span></div>

<script>
(function() {
  // Single source of truth for every app: its taskbar/Start-menu icon, label,
  // Start-menu description, iframe src, and which Start-menu section it sits in.
  // The Start-menu items are generated from this (buildStartMenu) so the icon +
  // label aren't duplicated in static HTML, where they used to drift.
  var APPS = {
    home:     { label: 'Home Service', icon: '🏠', src: '/landing.html',     desc: 'Services & health' },
    terminal: { label: 'Terminal', icon: '⬛', src: '/terminals/',           desc: 'Persistent bash terminals' },
    browser:  { label: 'Browser',  icon: '🌐', src: '/browser/',             desc: 'Persistent web browser' },
    files:    { label: 'Files',    icon: '📁', src: '/files/',               desc: 'File manager' },
    office:   { label: 'Office',   icon: '📄', src: '/office-editor.html',   desc: 'Edit Office docs' },
    notes:    { label: 'Notes',    icon: '📝', src: '/notes.html',           desc: 'Persistent scratchpad' },
    monitor:  { label: 'Monitor',  icon: '📊', src: '/monitor.html',         desc: 'System monitor' },
    upload:   { label: 'Upload',   icon: '⬆',  src: '/upload.html',          desc: 'Quick upload to ~/Uploads' },
    update:   { label: 'Update',   icon: '⬇',  src: '/update.html',          desc: 'Pull latest & redeploy', section: 'system' }
  };

  // Build the Start-menu items from APPS into the Apps / System sections.
  function buildStartMenu() {
    var apps = document.getElementById('sm-apps'),
        sys  = document.getElementById('sm-system');
    if (!apps || !sys) return;
    Object.keys(APPS).forEach(function(id) {
      var a = APPS[id];
      var item = document.createElement('div');
      item.className = 'sm-item'; item.setAttribute('data-id', id);
      var ic = document.createElement('div'); ic.className = 'sm-icon'; ic.textContent = a.icon;
      var box = document.createElement('div');
      var nm = document.createElement('div'); nm.className = 'sm-name'; nm.textContent = a.label;
      var ds = document.createElement('div'); ds.className = 'sm-desc'; ds.textContent = a.desc || '';
      box.appendChild(nm); box.appendChild(ds);
      item.appendChild(ic); item.appendChild(box);
      (a.section === 'system' ? sys : apps).appendChild(item);
    });
  }

  var framesEl  = document.getElementById('frames');
  var taskAppsEl = document.getElementById('task-apps');
  var menuEl    = document.getElementById('startmenu');
  var startBtn  = document.getElementById('start-btn');
  var hintEl    = document.getElementById('wp-hint');   // "Click Start" line inside the wallpaper
  buildStartMenu();   // populate the Start-menu items from APPS

  var openApps = [];   // ids, in taskbar order
  var active   = null;

  // --- Browser keyboard relay ------------------------------------------------
  // The Browser (xpra canvas) takes keyboard input but has no DOM field of its
  // own. So a HIDDEN <input> in the top page captures input and forwards it LIVE
  // to the Browser iframe — no visible box, no Send; you type/dictate and it
  // appears. iOS only raises the keyboard when you tap a real input, so the
  // input is styled as a small ⌨ button you tap to start (the only visible UI).
  // Forwarding is a debounced value-diff that ignores iOS dictation's transient
  // empty-clear; xpra-patches.js interprets the kbd-char/kbd-key messages.
  // (The Terminal has its own in-page overlay — terminal/terminal-kbd.js.)
  var IS_TOUCH = !!(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
  (function setupKbd() {
    var btn = document.getElementById('kbd-btn');
    var input = document.getElementById('kbd-input');
    var ico = document.getElementById('kbd-ico');
    if (!btn || !input) return;
    var lastVal = '', composing = false, flushTimer = null;

    // Forward each key to the Browser iframe (xpra). Touch + Browser only — the
    // Terminal raises its own keyboard via the in-page overlay (terminal-kbd.js).
    function toApp(msg) {
      var f = document.getElementById('frame-browser');
      if (f && f.contentWindow) { try { f.contentWindow.postMessage(msg, '*'); } catch (e) {} }
    }
    function flush() {
      if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; }
      var v = input.value;
      // Ignore iOS dictation's transient clear-to-"" between revisions (would
      // otherwise emit backspaces + re-type the word: the pile-up). The
      // transcription grows by prefix-extension, so this keeps it pure-append.
      if (v === '' && lastVal !== '') return;
      // Diff by code POINT (Array.from) not UTF-16 unit, so emoji/astral input
      // isn't sent as lone surrogates and one Backspace = one char.
      var va = Array.from(v), la = Array.from(lastVal);
      var i = 0, min = Math.min(va.length, la.length);
      while (i < min && va[i] === la[i]) i++;
      for (var d = la.length - i; d > 0; d--) toApp({ type: 'kbd-key', key: 'Backspace' });
      for (var j = i; j < va.length; j++) toApp({ type: 'kbd-char', ch: va[j] });
      lastVal = v;
    }
    function reset() { if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; } input.value = ''; lastVal = ''; }
    function scheduleFlush(ms) { if (flushTimer) clearTimeout(flushTimer); flushTimer = setTimeout(function() { flushTimer = null; flush(); }, ms); }

    input.addEventListener('focus', function() { btn.classList.add('open'); ico.textContent = '✕'; });
    input.addEventListener('blur',  function() { flush(); btn.classList.remove('open'); ico.textContent = '⌨'; });
    input.addEventListener('compositionstart', function() { composing = true; });
    input.addEventListener('compositionend', function() { composing = false; scheduleFlush(60); });
    input.addEventListener('input', function(e) {
      scheduleFlush((composing || (e && e.isComposing)) ? 450 : 80);
    });
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter')        { e.preventDefault(); flush(); toApp({ type: 'kbd-key', key: 'Enter' }); reset(); }
      else if (e.key === 'Tab')     { e.preventDefault(); toApp({ type: 'kbd-key', key: 'Tab' }); }
      else if (e.key === 'Backspace' && input.value === '') { e.preventDefault(); toApp({ type: 'kbd-key', key: 'Backspace' }); }
    });
    // Tap the ⌨ button while the keyboard is up → dismiss (blur, which flushes).
    input.addEventListener('pointerdown', function(e) {
      if (document.activeElement === input) { e.preventDefault(); input.blur(); }
    });
  })();
  function updateKbdBar() {
    // Browser only: the Terminal now raises the keyboard by tapping the terminal
    // itself (the touch overlay in /tN/, see terminal/terminal-kbd.js). The
    // Browser (xpra canvas) still has no DOM input, so it keeps the ⌨ button.
    var on = IS_TOUCH && active === 'browser';
    document.body.classList.toggle('kbd-on', on);
    if (!on) { var t = document.getElementById('kbd-input'); if (t) try { t.blur(); } catch (e) {} }
  }

  // --- cross-instance state -------------------------------------------------
  // Windows are LOCAL to each instance (we never open a window because another
  // device did — that mirrors badly, e.g. the shared single-size xpra Browser
  // display). What we DO share: the Start-menu "running" dots reflect the UNION
  // of apps open across every live instance, and a logout/reset clears them all.
  // The manager keeps a per-instance registry keyed by this id (a heartbeat +
  // TTL makes the union "live"); the same id lets THIS device restore its own
  // windows on reload.
  var INSTANCE_ID;
  try {
    INSTANCE_ID = localStorage.getItem('vibetop-instance');
    if (!INSTANCE_ID) {
      INSTANCE_ID = 'i-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
      localStorage.setItem('vibetop-instance', INSTANCE_ID);
    }
  } catch (e) { INSTANCE_ID = 'i-' + Math.random().toString(36).slice(2, 10); }

  var runningGlobal = [];        // union of open apps across live instances (dots)
  var lastResetEpoch = null;     // bumped by /api/reset; a change means clear-all
  var applyingRemote = false;    // suppress persist() during a teardown

  // An app gets the green dot when it has an active/existing session you'd
  // resume or join: open here, open on another live instance, a running Terminal
  // backend, or the (always-persistent) Browser. No dot → opening is fresh.
  function isRunning(id) {
    if (openApps.indexOf(id) !== -1) return true;
    if (runningGlobal.indexOf(id) !== -1) return true;
    if (id === 'terminal') return terminalCount > 0;
    if (id === 'browser') return true;   // persistent Chromium — always resumable
    return false;
  }

  // Handle a desktop API reply (from a push or the initial load): refresh the
  // cross-instance "running" dots and, if another instance triggered a
  // logout/reset (reset_epoch advanced), tear our own desktop down too.
  function onDesktopResp(d) {
    if (!d) return;
    if (Array.isArray(d.running)) { runningGlobal = d.running; markMenuRunning(); }
    if (typeof d.reset_epoch === 'number') {
      if (lastResetEpoch === null) lastResetEpoch = d.reset_epoch;
      else if (d.reset_epoch > lastResetEpoch) { lastResetEpoch = d.reset_epoch; clearAllLocal(); }
    }
  }

  // Push our own open-set to the registry (also the heartbeat that keeps us in
  // the union) and fold the reply back in. Coalesced via debounce — setActive
  // can fire several times per click.
  var persistTimer = null;
  function persist() {
    if (applyingRemote) return;
    if (persistTimer) clearTimeout(persistTimer);
    persistTimer = setTimeout(pushDesktop, 150);
  }
  function pushDesktop() {
    if (persistTimer) { clearTimeout(persistTimer); persistTimer = null; }
    return fetch('/api/desktop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ instance: INSTANCE_ID, open: openApps, active: active })
    }).then(function(r) { return r.json(); }).then(onDesktopResp).catch(function() {});
  }

  // Local teardown when a logout/reset fired on another instance.
  function clearAllLocal() {
    openApps.slice().forEach(function(id) {
      var f = frameOf(id);
      if (f && f.parentNode) f.parentNode.removeChild(f);
    });
    openApps = [];
    applyingRemote = true;
    try { setActive(null); } finally { applyingRemote = false; }
    pushDesktop();   // report our now-empty set right away
  }

  function frameOf(id) { return document.getElementById('frame-' + id); }

  function ensureFrame(id) {
    var f = frameOf(id);
    if (!f) {
      f = document.createElement('iframe');
      f.id = 'frame-' + id;
      f.dataset.id = id;
      f.dataset.src = APPS[id].src;    // deferred — see loadIfNeeded()
      f.setAttribute('allow', 'clipboard-read; clipboard-write');
      framesEl.appendChild(f);
    }
    return f;
  }

  // Set the iframe's real src only when it first becomes active. Loading an
  // iframe while its display:none means the inner content (e.g. xterm.js's
  // FitAddon) measures a 0×0 viewport and renders truncated — the source of
  // the "Terminal history is cut off until refresh" bug. Deferring src until
  // visible guarantees correct initial dimensions.
  function loadIfNeeded(f) {
    if (f && !f.src && f.dataset && f.dataset.src) {
      // First open: the frame's document isn't ready this tick, so the
      // activation messaging (focus, resize, vibetop:active, focus-terminal)
      // would land in about:blank and be lost — the "first open doesn't focus /
      // doesn't get its active broadcast" race. Defer that to the load event.
      var id = f.dataset.id;
      f.addEventListener('load', function onload() {
        f.removeEventListener('load', onload);
        notifyActiveFrame(f, id);
      });
      f.src = f.dataset.src;
    }
  }

  // Tell a frame it's now the active app: focus it, broadcast active-state, nudge
  // a resize so it re-measures the viewport, and (Terminal, desktop only)
  // auto-focus the prompt. Guarded so a frame that finished loading AFTER the
  // user already switched away doesn't steal focus.
  function notifyActiveFrame(f, id) {
    if (!f || f.dataset.id !== active) return;
    try { f.focus(); } catch (e) {}
    if (f.contentWindow) {
      try { f.contentWindow.postMessage({ type: 'vibetop:active', active: id }, '*'); } catch (e) {}
      // iOS Safari quirk: an iframe laid out while display:none can keep stale
      // internal dimensions when shown. Forward a resize so it re-measures.
      try { f.contentWindow.dispatchEvent(new Event('resize')); } catch (e) {}
    }
    // Skip auto-focusing xterm.js on touch devices — focusing its hidden
    // textarea pops up the on-screen keyboard unexpectedly when auto-switching
    // into Terminal. The user taps the terminal to summon the keyboard.
    var isTouch = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
    if (id === 'terminal' && f.contentWindow && !isTouch) {
      try { f.contentWindow.postMessage({ type: 'focus-terminal' }, '*'); } catch (e) {}
    }
    // Home renders relayed status; refresh it the moment it becomes active.
    if (id === 'home') setTimeout(relayStatus, 300);
  }

  function renderTaskbar() {
    taskAppsEl.innerHTML = '';
    openApps.forEach(function(id) {
      var btn = document.createElement('div');
      btn.className = 'task-app' + (id === active ? ' active' : '');
      btn.dataset.id = id;
      btn.draggable = true;     // reorder via drag (desktop; ignored on touch)
      btn.innerHTML = '<span class="icon">' + APPS[id].icon + '</span>' +
                      '<span class="name">' + APPS[id].label + '</span>' +
                      '<span class="close" title="Close">&times;</span>';
      taskAppsEl.appendChild(btn);
    });
    markMenuRunning();
  }

  var terminalCount = 0;   // live terminal backends — lights Terminal's dot even with no window open

  function markMenuRunning() {
    // Green dot = active/existing session (see isRunning). No text badges.
    menuEl.querySelectorAll('.sm-item').forEach(function(it) {
      it.classList.toggle('running', isRunning(it.dataset.id));
    });
  }

  // Refresh the live terminal-backend count so Terminal's dot reflects a running
  // session even when no Terminal window is open on any device.
  function refreshTerminals() {
    fetch('/api/terminals/status').then(function(r) { return r.json(); }).then(function(d) {
      terminalCount = (d && Array.isArray(d.running)) ? d.running.length : 0;
      markMenuRunning();
    }).catch(function() {});
  }

  function setActive(id) {
    active = id;
    document.querySelectorAll('#frames iframe').forEach(function(f) {
      f.classList.toggle('active', f.dataset.id === id);
      // Let apps pause background work when they're not on top (e.g. Monitor
      // stops polling). Only message frames that have actually loaded — a frame
      // being opened for the first time gets its broadcast on load (see
      // notifyActiveFrame); messaging its about:blank now would be lost.
      if (f.src && f.contentWindow && f.dataset.id !== id) {
        try { f.contentWindow.postMessage({ type: 'vibetop:active', active: id }, '*'); } catch (e) {}
      }
    });
    // The wallpaper (logo + name + blurb) shows whenever no app covers it; only
    // the "Click Start" line is conditional — hide it once any app is open.
    if (hintEl) hintEl.classList.toggle('hidden', openApps.length > 0);
    renderTaskbar();
    persist();
    updateKbdBar();
    document.title = id ? (APPS[id].label + ' — Vibetop') : 'Vibetop';
    var f = id && frameOf(id);
    if (f) {
      if (!f.src) loadIfNeeded(f);     // notifyActiveFrame fires on load
      else notifyActiveFrame(f, id);   // already loaded → notify now
    }
  }

  function launch(id) {
    if (!APPS[id]) return;
    if (openApps.indexOf(id) === -1) { openApps.push(id); ensureFrame(id); }
    setActive(id);            // relays status itself when id === 'home'
    closeMenu();
  }

  function closeApp(id) {
    var i = openApps.indexOf(id);
    if (i === -1) return;
    // Blur whatever has focus inside the closing iframe — xpra's #pasteboard
    // textarea grabs focus on touch, which keeps iOS Safari's visual viewport
    // shifted (as if a keyboard is up) even after the iframe is gone.
    try {
      var ae = document.activeElement;
      if (ae && typeof ae.blur === 'function') ae.blur();
    } catch (e) {}
    if (document.fullscreenElement) {
      try { document.exitFullscreen(); } catch (e) {}
    }

    openApps.splice(i, 1);
    var f = frameOf(id);
    if (f) f.parentNode.removeChild(f);     // fully unload the app
    if (active === id) {
      setActive(openApps.length ? openApps[Math.max(0, i - 1)] : null);
    } else {
      renderTaskbar();
      persist();
    }

    // Force a layout pass after the iframe swap so the taskbar slot and the
    // newly-active iframe both recompute against the current viewport.
    window.scrollTo(0, 0);
    framesEl.style.display = 'none';
    void framesEl.offsetHeight;
    requestAnimationFrame(function() {
      framesEl.style.display = '';
      window.dispatchEvent(new Event('resize'));
      var nf = active && frameOf(active);
      if (nf && nf.contentWindow) {
        try { nf.contentWindow.dispatchEvent(new Event('resize')); } catch (e) {}
      }
    });
  }

  function openMenu()  { menuEl.classList.add('open'); startBtn.classList.add('open'); refreshTerminals(); }
  function closeMenu() { menuEl.classList.remove('open'); startBtn.classList.remove('open'); }
  function toggleMenu() { menuEl.classList.contains('open') ? closeMenu() : openMenu(); }

  // --- events ---
  startBtn.addEventListener('click', function(e) { e.stopPropagation(); toggleMenu(); });

  menuEl.addEventListener('click', function(e) {
    var item = e.target.closest('.sm-item');
    if (item) launch(item.dataset.id);
  });

  // Taskbar button = Windows-style window control: clicking a NON-active window
  // switches to it; clicking the ALREADY-active window MINIMIZES it (setActive
  // null → every app iframe hidden, app stays open in the taskbar); clicking it
  // again restores it. Switching is on pointerdown — same fix as the terminal
  // tabs: a focused app iframe makes the browser eat the first click moving focus
  // back to the parent, so click-based switching needed two clicks. Minimize is
  // decided on pointerup with a movement check so DRAGGING the active button to
  // reorder doesn't minimize it (dragstart also cancels the pending minimize).
  // Close + touch stay on click.
  var lastMouseTaskAt = -1e9;   // suppress the synthetic click that follows a mouse gesture
  var taskDown = null;          // mousedown on the active button → maybe minimize (decided on up)
  taskAppsEl.addEventListener('pointerdown', function(e) {
    if (e.pointerType !== 'mouse' || e.button) return;     // touch/pen handled on click
    var btn = e.target.closest('.task-app');
    if (!btn || e.target.closest('.close')) { taskDown = null; return; }  // close handled on click
    var id = btn.dataset.id;
    if (id !== active) { setActive(id); lastMouseTaskAt = e.timeStamp; taskDown = null; }
    else taskDown = { id: id, x: e.clientX, y: e.clientY };

    if (!taskDown || e.pointerType !== 'mouse') return;
    var d = taskDown; taskDown = null;
    if (Math.abs(e.clientX - d.x) + Math.abs(e.clientY - d.y) < 6 && d.id === active) {
      setActive(null);                  // a tap (not a drag) on the active window → minimize
      lastMouseTaskAt = e.timeStamp;
    }
  });
  taskAppsEl.addEventListener('click', function(e) {
    var btn = e.target.closest('.task-app');
    if (!btn) return;
    var id = btn.dataset.id;
    if (e.target.closest('.close')) { closeApp(id); return; }
    if (e.timeStamp - lastMouseTaskAt < 700) return;        // mouse already handled (pointerdown/up)
    setActive(id === active ? null : id);                  // touch / fallback: minimize active, else switch
  });

  // --- drag-to-reorder taskbar apps (desktop; HTML5 DnD is a no-op on touch,
  // so tap/scroll behaviour is unchanged there). We reorder the DOM live during
  // dragover, then read the final order back into openApps on dragend. ---
  var dragEl = null;
  taskAppsEl.addEventListener('dragstart', function(e) {
    var btn = e.target.closest('.task-app');
    if (!btn) return;
    taskDown = null;          // a real drag-reorder cancels a pending minimize
    dragEl = btn;
    btn.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', btn.dataset.id); } catch (_) {}  // Firefox needs data set
  });

    if (!dragEl) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var target = e.target.closest('.task-app');
    if (!target || target === dragEl) return;
    var rect = target.getBoundingClientRect();
    var after = e.clientX > rect.left + rect.width / 2;   // horizontal taskbar
    taskAppsEl.insertBefore(dragEl, after ? target.nextSibling : target);
  });

  taskAppsEl.addEventListener('dragend', function() {
    if (!dragEl) return;
    dragEl.classList.remove('dragging');
    dragEl = null;
    var order = [];
    taskAppsEl.querySelectorAll('.task-app').forEach(function(el) { order.push(el.dataset.id); });
    if (order.join(',') !== openApps.join(',')) {   // persist only a real change
      openApps = order;
      persist();
    }
  });

  document.addEventListener('click', function(e) {
    if (menuEl.classList.contains('open') &&
        !e.target.closest('#startmenu') && !e.target.closest('#start-btn')) {
      closeMenu();
    }
  });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenu(); });

  // Messages from app iframes (e.g. terminal opening a URL in the browser).
  // All app iframes are same-origin, so reject cross-origin messages — one
  // branch triggers POST /api/browser/open with e.data.url (defense in depth;
  // the manager also validates the URL).
  window.addEventListener('message', function(e) {
    if (e.origin !== location.origin) return;
    if (!e.data) return;
    if (e.data.type === 'switch-to-browser') { launch('browser'); }
    if (e.data.type === 'open-in-browser' && e.data.url) {
      fetch('/api/browser/open', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: e.data.url })
      });
      launch('browser');
    }
    if (e.data.type === 'office-view' && e.data.path) {
      // Read-only: the manager renders the doc to PDF; show it in the viewer.
      openDoc(e.data.path);
    }
    if (e.data.type === 'office-edit' && e.data.path) {
      editDoc(e.data.path);
    }
    if (e.data.type === 'open-files-at') {
      // Deep-link Files at a path relative to FileBrowser's root (~). We set
      // the iframe src directly so existing FB state is replaced — re-clicking
      // the button always returns the user to the requested folder.
      var rel = (e.data.path || '').replace(/^\/+/, '');
      var url = '/files/files/' + rel.split('/').map(encodeURIComponent).join('/');
      launch('files');
      var f = frameOf('files');
      if (f) f.src = url;   // overrides the lazy dataset.src on first load too
    }
  });

  // --- document viewer (read-only office preview) ---
  var dvEl = document.getElementById('docviewer');
  var dvBody = document.getElementById('dv-body');
  var dvDocPath = null;   // the doc currently shown (for the Edit button)
  function openDoc(path) {
    dvDocPath = path;
    var name = path.split('/').pop() || 'Document';
    document.getElementById('dv-title').textContent = name;
    dvBody.innerHTML = '<div class="dv-loading">Rendering…</div>';
    var iframe = document.createElement('iframe');
    // Document load (not fetch) → carries the Access cookie like the app frames.
    // #toolbar=0 hides the browser's native PDF toolbar (whose Download would
    // grab the PDF rendition) — the bar's Download button gets the real file.
    iframe.src = '/api/office/preview?path=' + encodeURIComponent(path) + '#toolbar=0';
    iframe.addEventListener('load', function() {
      var l = dvBody.querySelector('.dv-loading');
      if (l) l.remove();
    });
    dvBody.appendChild(iframe);
    dvEl.classList.add('open');
  }
  function closeDoc() {
    dvEl.classList.remove('open');
    dvBody.innerHTML = '';   // stop rendering / free the PDF
    dvDocPath = null;
  }
  // Open a doc in the OnlyOffice web editor (Office app) and switch to it.
  function editDoc(path) {
    if (openApps.indexOf('office') === -1) { openApps.push('office'); ensureFrame('office'); }
    var f = frameOf('office');
    var url = '/office-editor.html?path=' + encodeURIComponent(path);
    if (f) { f.src = url; f.dataset.src = url; }   // replace whatever was loaded
    setActive('office');
  }
  document.getElementById('dv-close').addEventListener('click', closeDoc);
  document.getElementById('dv-edit').addEventListener('click', function() {
    if (dvDocPath) { var p = dvDocPath; closeDoc(); editDoc(p); }
  });
  document.getElementById('dv-download').addEventListener('click', function() {
    if (!dvDocPath) return;
    // Download the ORIGINAL office file (not the PDF preview).
    var a = document.createElement('a');
    a.href = '/api/office/download?path=' + encodeURIComponent(dvDocPath);
    a.download = dvDocPath.split('/').pop();
    document.body.appendChild(a); a.click(); a.remove();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && dvEl.classList.contains('open')) closeDoc();
  });

  // --- status bar ---
  function updateStatus() {
    fetch('/api/system/status').then(function(r) { return r.json(); }).then(function(d) {
      var set = function(id, v, unit) {
        var el = document.getElementById(id);
        if (!el) return;
        if (v == null) {
          el.textContent = '--';
          if (unit) document.getElementById(unit).style.visibility = 'hidden';
        } else {
          el.textContent = v;
          if (unit) document.getElementById(unit).style.visibility = '';
        }
      };
      // Round util to integer for the taskbar — 3-char max keeps the grid
      // tight; the Monitor app shows the precise value when needed.
      var ri = function(v) { return v != null ? Math.round(v) : null; };
      set('cpu-n',  ri(d.cpu_percent), 'cpu-u');
      set('cpu-tn', d.cpu_temp,        'cpu-tu');
      set('gpu-n',  ri(d.gpu_percent), 'gpu-u');
      set('gpu-tn', d.gpu_temp,        'gpu-tu');
      // Combine used/total into one cell so there's no whitespace around "/".
      var mem = (d.memory_used_gb != null && d.memory_total_gb != null)
        ? (Math.round(d.memory_used_gb) + '/' + Math.round(d.memory_total_gb)) : null;
      var vram = (d.gpu_vram_used_gb != null && d.gpu_vram_total_gb != null)
        ? (Math.round(d.gpu_vram_used_gb) + '/' + Math.round(d.gpu_vram_total_gb)) : null;
      set('mem-ut',  mem);
      set('vram-ut', vram);
    }).catch(function() {});
  }
  updateStatus();
  setInterval(updateStatus, 5000);
  // Keep the Start-menu session badges (esp. Terminal's resume/fresh count) current.
  refreshTerminals();
  setInterval(refreshTerminals, 5000);

  // Relay status to the Home Service app (the only app that renders it).
  // Needed because through the Cloudflare tunnel an iframe's own fetches don't
  // carry the Access cookie, so the parent fetches and forwards. Only sent
  // while Home is open.
  function post(id, msg) {
    var f = frameOf(id);
    if (f && f.contentWindow) { try { f.contentWindow.postMessage(msg, '*'); } catch (e) {} }
  }
  function relayStatus() {
    // Only while Home is the active app — relaying to a backgrounded Home is
    // wasted work (and 3 extra fetches every 5s). setActive('home') kicks an
    // immediate relay when the user switches back.
    if (active !== 'home') return;
    fetch('/api/health').then(function(r) { return r.json(); }).then(function(data) {
      post('home', { type: 'health', data: data });
    }).catch(function() {});
    fetch('/api/terminals/status').then(function(r) { return r.json(); }).then(function(data) {
      post('home', { type: 'terminals', data: data });
    }).catch(function() {});
    fetch('/services.json').then(function(r) { return r.json(); }).then(function(data) {
      post('home', { type: 'services', data: data });
    }).catch(function() {});
  }
  setInterval(relayStatus, 5000);
  setTimeout(relayStatus, 1500);

  // Start-menu version: fetched live from the manager (which reads the root
  // VERSION file) so a VERSION bump — or a `git pull` that only touched VERSION —
  // shows up with NO shell redeploy or sw bump. The @VERSION@ stamped into this
  // page at deploy time is just the offline/initial fallback.
  fetch('/api/update').then(function(r) { return r.json(); }).then(function(d) {
    var el = document.getElementById('build-ver');
    if (el && d && d.version) el.textContent = d.version;
  }).catch(function() {});

  // --- restore THIS instance's own windows; seed the running dots ----------
  // We fetch by instance id, so each device restores only the windows IT had
  // open (no cross-instance window mirroring). `running` seeds the dots and
  // `reset_epoch` baselines the logout/reset detector.
  fetch('/api/desktop?instance=' + encodeURIComponent(INSTANCE_ID))
    .then(function(r) { return r.json(); }).then(function(state) {
    var saved = (state && Array.isArray(state.open)) ? state.open : [];
    saved.forEach(function(id) {
      if (APPS[id] && openApps.indexOf(id) === -1) { openApps.push(id); ensureFrame(id); }
    });
    runningGlobal = (state && Array.isArray(state.running)) ? state.running : [];
    lastResetEpoch = (state && typeof state.reset_epoch === 'number') ? state.reset_epoch : 0;
    var lastActive = state && state.active;
    if (!openApps.length) {
      setActive(null);
      openMenu();   // fresh desktop: show the launcher so there's an obvious next step
    } else if (lastActive === null) {
      setActive(null);   // restore a minimized desktop (apps open, none shown) — don't auto-open one
    } else {
      setActive(openApps.indexOf(lastActive) !== -1 ? lastActive : openApps[0]);
    }
    markMenuRunning();
  }).catch(function() {
    // API unreachable — boot to empty desktop instead of hanging on a spinner.
    setActive(null);
    openMenu();
  });
  // Heartbeat: keeps us in the live union, refreshes other instances' dots, and
  // catches a logout/reset that happened on another device.
  setInterval(pushDesktop, 5000);
  // Re-register the instant the tab is shown again — background tabs get their
  // timers throttled (so the 5s heartbeat stalls), and this also refreshes the
  // "running" dots immediately when you return to or switch to this machine.
  document.addEventListener('visibilitychange', function() { if (!document.hidden) pushDesktop(); });
})();

// PWA service worker — caches the shell for instant cold loads. Registered
// separately so a failure here can never affect the desktop above. When an
// updated SW takes control (e.g. after a shell change), reload once so the
// fresh shell loads immediately instead of needing a second relaunch.
if ('serviceWorker' in navigator) {
  // Only reload when an *updated* SW replaces an existing one (to pick up a new
  // shell). On a brand-new computer the first install's clients.claim() also
  // fires controllerchange (controller: null -> SW) — reloading THEN throws away
  // the first page load mid-flight and interrupts a Terminal that's still
  // connecting ("new computer, had to refresh a few times before I could type").
  // hadController is false on first install, true on a later update.
  var hadController = !!navigator.serviceWorker.controller;
  var swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (swRefreshing || !hadController) return;
    swRefreshing = true;
    window.location.reload();
  });
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function() {});
  });
}

// Logout = full reset: close all apps, stop all terminals (and their
// background processes), reset the Browser to a blank Chromium, then log out —
// so the next login starts fresh. The href is the no-JS fallback.
(function() {
  var logout = document.getElementById('tb-logout');
  if (!logout) return;
  logout.addEventListener('click', function(e) {
    e.preventDefault();
    if (!confirm('Close all apps, terminals and the browser, and log out?\nAnything running in a terminal will be stopped.')) return;
    var go = function() { window.location.href = '/cdn-cgi/access/logout'; };
    fetch('/api/reset', { method: 'POST' }).then(go, go);
  });
})();
</script>
</body>
