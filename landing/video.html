<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Video — Vibetop</title>
<style>
  html, body { height: 100%; margin: 0; background: #101018; color: #cde;
               font: 14px system-ui, -apple-system, sans-serif; }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  #bar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 8px 12px; background: #1a1a2e; border-bottom: 1px solid #2a3040;
    flex-shrink: 0;
  }
  #name { color: #cde; font-weight: 600; margin-right: auto;
          max-width: 40vw; overflow: hidden; text-overflow: ellipsis;
          white-space: nowrap; }
  .ctl { display: flex; align-items: center; gap: 6px; }
  .ctl label { color: #7f8fa3; font-size: 12px; }
  select, button.btn {
    background: #12161d; color: #cde; border: 1px solid #2a3040;
    border-radius: 8px; padding: 6px 10px; font: inherit; cursor: pointer;
  }
  select:hover, button.btn:hover { border-color: #3a4452; background: #1b212b; }
  select:disabled { opacity: .5; cursor: default; }
  button.btn { line-height: 1; }
  #stage { flex: 1 1 auto; min-height: 0; position: relative;
           display: flex; align-items: center; justify-content: center;
           background: #000; }
  video { width: 100%; height: 100%; background: #000; }
  #msg { position: absolute; inset: 0; display: none; align-items: center;
         justify-content: center; text-align: center; padding: 24px;
         color: #9ab; }
  #msg.show { display: flex; }
  #msg b { color: #cde; }
  .spin { width: 22px; height: 22px; border: 3px solid #2a3040;
          border-top-color: #6a9; border-radius: 50%;
          animation: spin 1s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <span id="name">Video</span>
    <div class="ctl" id="audio-ctl" style="display:none">
      <label for="audio-sel">Audio</label>
      <select id="audio-sel"></select>
    </div>
    <div class="ctl" id="sub-ctl" style="display:none">
      <label for="sub-sel">Subtitles</label>
      <select id="sub-sel"></select>
    </div>
    <button class="btn" id="fs-btn" title="Fullscreen">⛶ Fullscreen</button>
  </div>
  <div id="stage">
    <video id="v" controls playsinline preload="metadata"></video>
    <div id="msg" class="show"><div><div class="spin"></div>Loading…</div></div>
  </div>
</div>
<script>
(function () {
  var LANGS = {
    jpn: "日本語", zho: "中文", chi: "中文", cmn: "中文",
    eng: "English", kor: "한국어", fra: "Français", fre: "Français",
    deu: "Deutsch", ger: "Deutsch", spa: "Español", rus: "Русский",
    por: "Português", ita: "Italiano", ara: "العربية", hin: "हिन्दी",
    vie: "Tiếng Việt", tha: "ไทย", ind: "Bahasa", nld: "Nederlands"
  };
  function langName(code) {
    if (!code) return "";
    return LANGS[code.toLowerCase()] || code.toUpperCase();
  }
  function trackLabel(t, i, kind) {
    var parts = [];
    var ln = langName(t.lang);
    if (ln) parts.push(ln);
    if (t.title && t.title !== ln) parts.push(t.title);
    return parts.join(" — ") || (kind + " " + (i + 1));
  }

  var path = new URLSearchParams(location.search).get("path") || "";
  var v = document.getElementById("v");
  var msgEl = document.getElementById("msg");
  var nameEl = document.getElementById("name");
  var audioCtl = document.getElementById("audio-ctl");
  var audioSel = document.getElementById("audio-sel");
  var subCtl = document.getElementById("sub-ctl");
  var subSel = document.getElementById("sub-sel");
  var fsBtn = document.getElementById("fs-btn");
  var stage = document.getElementById("stage");

  function showMsg(html) { msgEl.innerHTML = "<div>" + html + "</div>"; msgEl.classList.add("show"); }
  function hideMsg() { msgEl.classList.remove("show"); }
  var enc = encodeURIComponent;

  function mediaUrl(aidx) {
    return "/api/video/media?path=" + enc(path) + "&audio=" + aidx;
  }

  // Swap the audio track without losing the play position.
  function setAudio(aidx) {
    var t = v.currentTime, wasPlaying = !v.paused && !v.ended;
    v.src = mediaUrl(aidx);
    v.load();
    v.addEventListener("loadedmetadata", function once() {
      v.removeEventListener("loadedmetadata", once);
      try { if (t) v.currentTime = t; } catch (e) {}
      if (wasPlaying) { var p = v.play(); if (p && p.catch) p.catch(function () {}); }
      applySub();  // re-assert the chosen subtitle after the reload
    });
  }

  // Text tracks are <track> children (lazy-fetched only when not "disabled").
  function applySub() {
    var want = subSel.value;  // "" = off, else the per-type stream index
    var tt = v.textTracks;
    for (var i = 0; i < tt.length; i++) {
      var sidx = v.querySelectorAll("track")[i];
      var id = sidx ? sidx.getAttribute("data-si") : "";
      tt[i].mode = (id === want && want !== "") ? "showing" : "disabled";
    }
  }

  function enterFullscreen() {
    var el = stage;
    if (el.requestFullscreen) el.requestFullscreen().catch(function () {});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (v.webkitEnterFullscreen) v.webkitEnterFullscreen();  // iOS
  }
  fsBtn.addEventListener("click", enterFullscreen);

  if (!path) { showMsg("No file selected. Open a video from <b>Files</b>."); return; }

  fetch("/api/video/info?path=" + enc(path))
    .then(function (r) { return r.json(); })
    .then(function (info) {
      if (!info || info.ffmpeg === false) {
        showMsg("<b>ffmpeg is not installed</b><br><br>The video player needs " +
                "ffmpeg to play this file.<br>Install it with " +
                "<code>sudo apt install ffmpeg</code>.");
        return;
      }
      if (!info.ok) { showMsg("Couldn't read this video.<br>" + (info.error || "")); return; }

      nameEl.textContent = info.name || "Video";
      document.title = (info.name || "Video") + " — Vibetop";

      // Audio picker (only when there's a choice).
      var audio = info.audio || [];
      if (audio.length > 1) {
        audio.forEach(function (a, i) {
          var o = document.createElement("option");
          o.value = a.ai; o.textContent = trackLabel(a, i, "Track");
          audioSel.appendChild(o);
        });
        audioSel.addEventListener("change", function () { setAudio(audioSel.value); });
        audioCtl.style.display = "";
      }
      var firstAi = audio.length ? audio[0].ai : 0;

      // Subtitle picker + lazy <track>s.
      var subs = info.subs || [];
      if (subs.length) {
        var off = document.createElement("option");
        off.value = ""; off.textContent = "Off"; subSel.appendChild(off);
        subs.forEach(function (s, i) {
          var o = document.createElement("option");
          o.value = s.si; o.textContent = trackLabel(s, i, "Subtitle");
          subSel.appendChild(o);
          var tr = document.createElement("track");
          tr.kind = "subtitles";
          tr.label = trackLabel(s, i, "Subtitle");
          if (s.lang) tr.srclang = s.lang;
          tr.src = "/api/video/subs?path=" + enc(path) + "&sub=" + s.si;
          tr.setAttribute("data-si", String(s.si));
          v.appendChild(tr);
        });
        subSel.addEventListener("change", applySub);
        subCtl.style.display = "";
      }

      // Preparing state: non-H.264 / MKV needs an ffmpeg pass before first bytes.
      if (info.needsPrepare) {
        showMsg('<div class="spin"></div>Preparing video…<br>' +
                '<span style="color:#6a7a8a;font-size:12px">' +
                (info.video && !info.video.compatible
                  ? "transcoding (first play only)" : "remuxing") + "</span>");
      }
      v.addEventListener("loadeddata", hideMsg, { once: true });
      v.addEventListener("error", function () {
        showMsg("Playback failed.<br><span style='color:#6a7a8a;font-size:12px'>" +
                "The file may use a codec this browser can't play.</span>");
      });
      v.src = mediaUrl(firstAi);
      v.load();
    })
    .catch(function () { showMsg("Couldn't reach the server."); });
})();
</script>
</body>
</html>
