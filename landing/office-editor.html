<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Office — Vibetop</title>
<style>
  html, body { height: 100%; margin: 0; background: #1a1a2e; }
  #editor { height: 100%; }
  #msg {
    display: flex; height: 100%; align-items: center; justify-content: center;
    color: #9ab; font: 15px system-ui, sans-serif; text-align: center; padding: 24px;
  }
  #msg b { color: #cde; }
  .newdoc-title { color: #cde; font-size: 16px; font-weight: 600; margin: 0 0 18px; }
  .newdoc-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .newdoc-btns button {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    width: 124px; padding: 20px 10px; cursor: pointer;
    background: #12161d; color: #cde; border: 1px solid #2a3040; border-radius: 12px;
    font-size: 30px; line-height: 1;
  }
  .newdoc-btns button:hover { background: #1b212b; border-color: #3a4452; }
  .newdoc-btns button:disabled { opacity: 0.5; cursor: default; }
  .newdoc-btns button span { font: 600 13px system-ui, sans-serif; color: #9ab; }
  .newdoc-hint { color: #6a7a8a; font-size: 13px; margin: 20px 0 0; }
</style>
<!-- DocsAPI loader from the Document Server (proxied at /onlyoffice/). -->
<script src="/onlyoffice/web-apps/apps/api/documents/api.js"></script>
</head>
<body>
  <div id="msg">
    <div>
      <p class="newdoc-title">Start a new document</p>
      <div class="newdoc-btns">
        <button data-new="word">📄<span>Document</span></button>
        <button data-new="cell">📊<span>Spreadsheet</span></button>
        <button data-new="slide">📽<span>Presentation</span></button>
      </div>
      <p class="newdoc-hint">…or open one from <b>Files</b> → <b>Edit</b>.</p>
    </div>
  </div>
  <div id="editor" style="display:none"></div>
<script>
(function() {
  var path = new URLSearchParams(location.search).get('path');
  var msg = document.getElementById('msg');
  var host = document.getElementById('editor');
  if (!path) {
    // No document → let the user start a new one (creates a blank file, then
    // reloads this page pointed at it).
    var btns = msg.querySelectorAll('button[data-new]');
    function setDisabled(v) { btns.forEach(function(b) { b.disabled = v; }); }
    btns.forEach(function(b) {
      b.addEventListener('click', function() {
        setDisabled(true);
        fetch('/api/office/new', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                   body: JSON.stringify({ type: b.getAttribute('data-new') }) })
          .then(function(r) { return r.json(); })
          .then(function(d) {
            if (d && d.ok && d.path) location.search = '?path=' + encodeURIComponent(d.path);
            else { alert((d && d.error) || 'Could not create the document.'); setDisabled(false); }
          })
          .catch(function() { alert('Could not reach the document service.'); setDisabled(false); });
      });
    });
    return;
  }
  msg.style.display = 'none';
  host.style.display = 'block';

  function fail(t) { host.style.display = 'none'; msg.style.display = 'flex'; msg.innerHTML = t; }
  if (!window.DocsAPI) { fail('Office editor service is unavailable.'); return; }

  // Autosave: OnlyOffice only writes back to the real file on a forcesave or
  // session end, so we force a save periodically while the doc is modified,
  // whenever the user leaves the Office app, and as the page unloads.
  var modified = false, saving = false;
  function forcesave(useBeacon) {
    if (!modified || saving) return;
    saving = true; modified = false;
    var body = JSON.stringify({ path: path });
    var done = function() { saving = false; };
    if (useBeacon && navigator.sendBeacon) {
      navigator.sendBeacon('/api/office/forcesave', new Blob([body], { type: 'application/json' }));
      done();
    } else {
      fetch('/api/office/forcesave', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body })
        .then(done, done);
    }
  }

  // Register the save-on-leave listeners SYNCHRONOUSLY (not after the async
  // config fetch resolves) — otherwise a switch-away or close during a slow
  // OnlyOffice cold-start is missed and that edit window never autosaves.
  // forcesave() is a no-op until the doc is actually modified, so registering
  // these before the editor exists is safe.
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'vibetop:active' && e.data.active !== 'office') forcesave(false);
  });
  window.addEventListener('pagehide', function() { forcesave(true); });   // app closed

  fetch('/api/office/config?path=' + encodeURIComponent(path))
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
      if (cfg.error) { fail(cfg.error); return; }
      cfg.width = '100%';
      cfg.height = '100%';
      cfg.type = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) ? 'mobile' : 'desktop';
      var saveTimer = null;
      cfg.events = cfg.events || {};
      cfg.events.onDocumentStateChange = function(e) {
        // e.data: true = modified, false = the server just saved it.
        if (e && e.data) {
          modified = true;
          clearTimeout(saveTimer);
          saveTimer = setTimeout(function() { forcesave(false); }, 2500);  // autosave after a pause
        }
      };
      new DocsAPI.DocEditor('editor', cfg);

      setInterval(function() { forcesave(false); }, 30000);   // safety net
    })
    .catch(function() { fail('Could not load the document.'); });
})();
</script>
</body>
</html>
