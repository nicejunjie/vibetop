<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Update — myhost</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; background: #1a1a2e; color: #d4d8de; font-family: system-ui, sans-serif; }
  .bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: #161b22; border-bottom: 1px solid #2a3040; flex-shrink: 0;
  }
  .bar .title { font-size: 14px; font-weight: 600; color: #9ab; }
  .bar .spacer { flex: 1; }
  button {
    font: 600 14px system-ui, sans-serif; cursor: pointer;
    border-radius: 8px; padding: 9px 18px; border: 1px solid #2d6cc0;
    background: #2d6cc0; color: #fff;
  }
  button:hover { background: #3a7adb; }
  button:disabled { opacity: 0.5; cursor: default; }
  .body { flex: 1; overflow-y: auto; padding: 16px; }
  .version {
    background: #12161d; border: 1px solid #20262f; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 14px;
  }
  .version .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #556; }
  .version .commit {
    font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; color: #6cf; margin-top: 4px;
  }
  .version .subject { font-size: 14px; color: #cde; margin-top: 6px; }
  .version .date { font-size: 12px; color: #6a7a8a; margin-top: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .hint { font-size: 12px; color: #6a7a8a; margin-bottom: 14px; line-height: 1.5; }
  .status { font-size: 13px; margin-bottom: 12px; min-height: 18px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .status.ok { color: #4a8; } .status.err { color: #d56; } .status.run { color: #6cf; }
  .log { display: flex; flex-direction: column; gap: 8px; }
  .step {
    background: #0e1117; border: 1px solid #20262f; border-radius: 8px; overflow: hidden;
  }
  .step .head {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .step .head .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .step.ok .dot { background: #34a853; } .step.err .dot { background: #d56; }
  .step.ok .head { color: #bcd; } .step.err .head { color: #f99; }
  .step pre {
    margin: 0; padding: 0 12px 10px 28px; white-space: pre-wrap; word-break: break-word;
    font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; color: #8a9aaa; max-height: 220px; overflow-y: auto;
  }
  .step pre:empty { display: none; }
</style>
</head>
<body>
  <div class="bar">
    <span class="title">⬇ Update</span>
    <span class="spacer"></span>
    <button id="update-btn">Update now</button>
  </div>
  <div class="body">
    <div class="version" id="version">
      <div class="lbl">Installed version</div>
      <div class="commit" id="v-commit">loading…</div>
      <div class="subject" id="v-subject"></div>
      <div class="date" id="v-date"></div>
    </div>
    <div class="hint">Pulls the latest commit from GitHub and redeploys whatever changed
      (desktop, browser, terminal/nginx). The API restarts itself only if its own code changed.</div>
    <div class="status" id="status"></div>
    <div class="log" id="log"></div>
  </div>
<script>
(function() {
  var btn = document.getElementById('update-btn');
  var statusEl = document.getElementById('status');
  var logEl = document.getElementById('log');

  function setStatus(msg, cls) { statusEl.textContent = msg || ''; statusEl.className = 'status ' + (cls || ''); }

  function loadVersion() {
    fetch('/api/update').then(function(r) { return r.json(); }).then(function(d) {
      document.getElementById('v-commit').textContent = d.commit ? ('#' + d.commit) : (d.error || 'unknown');
      document.getElementById('v-subject').textContent = d.subject || '';
      document.getElementById('v-date').textContent = d.date || '';
    }).catch(function() {
      document.getElementById('v-commit').textContent = 'could not read version';
    });
  }

  function renderLog(steps) {
    logEl.innerHTML = '';
    (steps || []).forEach(function(s) {
      var div = document.createElement('div');
      div.className = 'step ' + (s.ok ? 'ok' : 'err');
      var head = document.createElement('div');
      head.className = 'head';
      head.innerHTML = '<span class="dot"></span>';
      head.appendChild(document.createTextNode(s.name + (s.ok ? '' : '  — failed')));
      var pre = document.createElement('pre');
      pre.textContent = s.output || '';
      div.appendChild(head); div.appendChild(pre);
      logEl.appendChild(div);
    });
  }

  btn.addEventListener('click', function() {
    if (!confirm('Pull the latest from GitHub and redeploy?')) return;
    btn.disabled = true;
    setStatus('Updating… (pulling + redeploying, ~10–30s)', 'run');
    logEl.innerHTML = '';
    fetch('/api/update', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(d) {
      renderLog(d.log);
      setStatus(d.message || (d.ok ? 'Done.' : 'Update failed.'), d.ok ? 'ok' : 'err');
      btn.disabled = false;
      if (d.ok) {
        loadVersion();
        // If the API is restarting, re-poll the version once it's back.
        if (d.restart) {
          setStatus(d.message + ' (reconnecting…)', 'run');
          setTimeout(loadVersion, 6000);
          setTimeout(function() { setStatus('Updated. API restarted.', 'ok'); }, 6500);
        }
      }
    }).catch(function() {
      setStatus('Request failed — the API may be restarting. Try reopening this app.', 'err');
      btn.disabled = false;
    });
  });

  loadVersion();
})();
</script>
</body>
</html>
