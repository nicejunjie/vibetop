<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Files — Vibetop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; background: #0e1117; font-family: system-ui, sans-serif; color: #d4d8de; }
  /* Tab bar — one tab per open folder. position:relative + z-index keeps it
     clickable above the iframes (a positioned element otherwise paints over a
     static bar and eats clicks — same fix as the terminal tabs). */
  .tabbar {
    display: flex; align-items: stretch; flex-shrink: 0; min-height: 40px;
    background: #161b22; border-bottom: 1px solid #2a3040;
    position: relative; z-index: 2; overflow-x: auto;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .tabbar::-webkit-scrollbar { display: none; }
  .tabs { display: flex; align-items: stretch; }
  .tab {
    display: flex; align-items: center; gap: 8px; padding: 0 9px 0 13px;
    border-right: 1px solid #222a38; cursor: pointer; max-width: 200px;
    color: #aab4c5; font-size: 13px; white-space: nowrap; user-select: none;
    border-bottom: 2px solid transparent;
  }
  .tab:hover { background: #1b2330; color: #e6edf3; }
  .tab.active { background: #1f2937; color: #fff; border-bottom-color: #8a4adb; }
  .tab .ic { font-size: 13px; flex-shrink: 0; opacity: .8; }
  .tab .lbl { overflow: hidden; text-overflow: ellipsis; }
  .tab .x {
    flex: 0 0 auto; width: 18px; height: 18px; line-height: 16px; text-align: center;
    border-radius: 4px; color: #6b7488; font-size: 14px;
  }
  .tab .x:hover { background: #3a2024; color: #f1b3b3; }
  .add {
    flex: 0 0 auto; width: 40px; background: transparent; border: 0;
    border-right: 1px solid #222a38; color: #8a6fc0; font-size: 22px;
    cursor: pointer; line-height: 1;
  }
  .add:hover { background: #221a30; color: #b79be8; }
  .frames { position: relative; flex: 1; min-height: 0; }
  .frames iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: none; }
  .frames iframe.active { display: block; }
</style>
</head>
<body>
  <div class="tabbar" id="tabbar">
    <div class="tabs" id="tabs"></div>
    <button class="add" id="add" title="New folder tab">+</button>
  </div>
  <div class="frames" id="frames"></div>
<script>
(function() {
  // Default folder = the user's home. FileBrowser's root is "/", so "/" stays
  // reachable by navigating up or typing it in the path bar — but the app OPENS
  // at home, not the filesystem root. The home path is stamped at deploy in the
  // single-user build (@APP_HOME@ -> /home/you); in the MULTI-USER build it's
  // stamped empty (the logged-in user is unknown at deploy) and resolved at
  // runtime from /api/me (see resolveHome below), so each user opens at THEIR ~.
  var HOME_PATH = '@APP_HOME@';                 // '' in multi-user until resolved
  var HOME = '/files/files' + HOME_PATH + '/';
  // Resolve the real home once (multi-user) before the initial tab load, so the
  // first tab opens at ~ rather than the filesystem root.
  function resolveHome(done) {
    if (HOME_PATH) { done(); return; }          // single-user: known at deploy
    fetch('/api/me').then(function(r) { return r.json(); }).then(function(d) {
      if (d && d.home) { HOME_PATH = d.home; HOME = '/files/files' + d.home + '/'; }
    }).catch(function() {}).then(done);
  }
  var tabsEl = document.getElementById('tabs');
  var framesEl = document.getElementById('frames');
  var addBtn = document.getElementById('add');
  var tabs = [];          // {id, frame, path}
  var active = null;
  var seq = 0;
  var lastMouseAt = -1e9;
  // The tab set is shared across devices (server-side via /api/files/tabs):
  // loaded when the app opens, saved on change. _loaded gates saving until the
  // initial load is in; _lastSaved dedupes so we only POST real changes.
  var _loaded = false;
  var _lastSaved = null;
  var _suppress = false;       // true while reconciling to the server (don't echo back)

  // Current path of a tab's FileBrowser iframe (same-origin, so readable).
  function curPath(t) {
    try {
      var p = t.frame.contentWindow.location.pathname;
      if (/\/files\/files(\/|$)/.test(p)) return p;
    } catch (e) {}
    return null;
  }
  // Normalize a browse URL (drop query/hash + trailing slash) so the two devices
  // produce identical strings regardless of FileBrowser's slash canonicalization
  // — otherwise a slash mismatch would ping-pong reconciles between them.
  function norm(p) { return (p || '').split('?')[0].split('#')[0].replace(/\/+$/, '') || '/files/files'; }
  function labelFor(path) {
    var rest = (path || '').split('/files/files')[1] || '';
    rest = rest.split('?')[0].split('#')[0].replace(/\/+$/, '');
    if (!rest) return 'Home';                 // filesystem root "/"
    // The user's home folder is labelled "Home", not its basename.
    if (HOME_PATH && rest.replace(/\/+$/, '') === HOME_PATH.replace(/\/+$/, '')) return 'Home';
    var seg = rest.split('/').pop();
    try { seg = decodeURIComponent(seg); } catch (e) {}
    return seg || 'Home';
  }

  function stateStr() {
    return JSON.stringify({
      paths: tabs.map(function(t) { return norm(curPath(t) || t.path); }),
      active: Math.max(0, tabs.indexOf(active))
    });
  }
  // Push the local tab set to the server now (deduped; suppressed while we're
  // reconciling TO the server so we don't echo a change back).
  function persist() {
    if (_suppress || !_loaded) return;
    var s = stateStr();
    if (s === _lastSaved) return;
    _lastSaved = s;
    fetch('/api/files/tabs', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: s }).catch(function() {});
  }

  function renderTabs() {
    tabsEl.innerHTML = '';
    tabs.forEach(function(t) {
      var path = curPath(t) || t.path; t.path = path;
      var el = document.createElement('div');
      el.className = 'tab' + (t === active ? ' active' : '');
      el.dataset.id = t.id;
      var ic = document.createElement('span'); ic.className = 'ic'; ic.textContent = '📁';
      var lbl = document.createElement('span'); lbl.className = 'lbl';
      lbl.textContent = labelFor(path); el.title = labelFor(path);
      var x = document.createElement('span'); x.className = 'x'; x.textContent = '×'; x.title = 'Close tab';
      el.appendChild(ic); el.appendChild(lbl); el.appendChild(x);
      tabsEl.appendChild(el);
    });
  }

  function makeTab(path) {
    var f = document.createElement('iframe');
    f.name = 'fbtab';                          // tells filebrowser-patches.js to skip its location-memory
    f.setAttribute('allow', 'clipboard-read; clipboard-write');
    f.src = path || HOME;
    framesEl.appendChild(f);
    return { id: ++seq, frame: f, path: path || HOME };
  }

  // Self-heal the "NFS folder shows empty until you refresh" issue. It shows up
  // after a folder tab has been inactive a while — switched to another desktop app,
  // backgrounded, or just idle: on a slow NFS mount FileBrowser's listing ends up
  // empty and never settles. A refresh fixes it, so one always-on watcher does that
  // automatically. It acts ONLY on the visible tab of a VISIBLE Files app (our iframe
  // has window.innerHeight===0 while hidden behind another app), and ONLY after the
  // listing is empty — no items AND no empty-folder message — for ~6s straight (long
  // enough not to interrupt a genuinely slow load). The heal count resets once the
  // folder renders, so a later re-stick heals again, but it can't loop on a folder
  // that just won't render (capped at 3 tries until it next renders). An actually-
  // empty folder (its "lonely" .message) is left alone.
  var _healStuck = 0, _healCount = {};
  setInterval(function() {
    var t = active;
    if (!t || document.hidden || window.innerHeight === 0) { _healStuck = 0; return; }   // Files not visible
    var f = t.frame, win, d, path;
    if (!f.classList.contains('active')) { _healStuck = 0; return; }
    try { win = f.contentWindow; d = win.document; path = win.location.pathname; } catch (e) { _healStuck = 0; return; }
    if (path.indexOf('/files/files') !== 0) { _healStuck = 0; return; }   // editor/preview, not a listing
    var listing = d.getElementById('listing');
    if ((listing && listing.querySelector('.item')) || d.querySelector('.message')) {
      _healStuck = 0; _healCount[t.id] = 0; return;                        // rendered (items) or empty-state
    }
    if (++_healStuck >= 3) {                                               // ~6s continuously empty → reload
      _healStuck = 0;
      if ((_healCount[t.id] || 0) < 3) { _healCount[t.id] = (_healCount[t.id] || 0) + 1; try { win.location.reload(); } catch (e) {} }
    }
  }, 2000);

  function show(t) {
    if (!t) return;
    tabs.forEach(function(o) { o.frame.classList.toggle('active', o === t); });
    active = t;
    renderTabs();
    persist();
  }

  function createTab(path, activate) {
    var t = makeTab(path);
    tabs.push(t);
    renderTabs();
    if (activate) show(t); else persist();
    return t;
  }

  function closeTab(t) {
    var i = tabs.indexOf(t);
    if (i === -1) return;
    tabs.splice(i, 1);
    if (t.frame.parentNode) t.frame.parentNode.removeChild(t.frame);
    if (!tabs.length) { createTab(HOME, true); return; }   // never zero tabs
    if (active === t) show(tabs[Math.max(0, i - 1)]);
    else { renderTabs(); persist(); }
  }

  // Reconcile local tabs to the server's shared set (another device changed it).
  // Reuse iframes whose folder already matches so only genuinely new/changed tabs
  // reload; then mirror order + active. Suppressed so it doesn't echo back.
  function reconcile(server) {
    var pool = {};
    tabs.forEach(function(t) { var p = norm(curPath(t) || t.path); (pool[p] = pool[p] || []).push(t); });
    var next = [];
    (server.paths || []).forEach(function(p) {
      var arr = pool[norm(p)];
      next.push(arr && arr.length ? arr.shift() : makeTab(p));
    });
    if (!next.length) next.push(makeTab(HOME));
    var keep = {}; next.forEach(function(t) { keep[t.id] = true; });
    tabs.forEach(function(t) { if (!keep[t.id] && t.frame.parentNode) t.frame.parentNode.removeChild(t.frame); });
    tabs = next;
    var ai = Math.min(Math.max(0, server.active | 0), tabs.length - 1);
    _suppress = true;
    show(tabs[ai]);
    _suppress = false;
    _lastSaved = stateStr();
  }

  function tabFromEvent(e) {
    var el = e.target.closest('.tab');
    if (!el) return null;
    return tabs.filter(function(t) { return String(t.id) === el.dataset.id; })[0] || null;
  }

  // Switch on pointerdown for mouse (a focused iframe eats the first click moving
  // focus to the parent — same two-click trap as the terminal tabs); close (×)
  // and touch stay on click.
  tabsEl.addEventListener('pointerdown', function(e) {
    if (e.pointerType !== 'mouse' || e.button) return;
    if (e.target.closest('.x')) return;
    var t = tabFromEvent(e);
    if (t && t !== active) { show(t); lastMouseAt = e.timeStamp; }
  });
  tabsEl.addEventListener('click', function(e) {
    var t = tabFromEvent(e);
    if (!t) return;
    if (e.target.closest('.x')) { closeTab(t); return; }
    if (e.timeStamp - lastMouseAt < 700) return;   // mouse already handled it
    show(t);
  });
  addBtn.addEventListener('click', function() { createTab(HOME, true); });

  // Deep-link from the desktop (Upload app's "Open in Files"): open a tab at a
  // path relative to ~. The desktop posts a few times to beat the first-load
  // race, so dedupe repeats of the same path within a short window.
  function openAt(rel) {
    rel = (rel || '').replace(/^\/+/, '');
    createTab(HOME + rel.split('/').map(encodeURIComponent).join('/'), true);
  }
  var _lastOpen = { path: null, t: 0 };
  window.addEventListener('message', function(e) {
    if (e.origin !== location.origin) return;
    if (!e.data || e.data.type !== 'files-open-tab') return;
    var rel = e.data.path || '';
    var now = Date.now();
    if (rel === _lastOpen.path && now - _lastOpen.t < 2500) return;   // dedupe retries
    _lastOpen = { path: rel, t: now };
    openAt(rel);
  });

  // Live sync (~2s): push our changes (incl. in-tab navigation, detected via the
  // live folder paths), else pull the other device's changes and reconcile. Local
  // changes win their round so we never get reverted mid-action.
  function tick() {
    renderTabs();                     // refresh labels from live folder paths
    if (!_loaded) return;
    var local = stateStr();
    if (local !== _lastSaved) { persist(); return; }   // we changed something → push
    fetch('/api/files/tabs').then(function(r) { return r.json(); }).then(function(s) {
      if (!s || !Array.isArray(s.paths)) return;
      var serverStr = JSON.stringify({ paths: s.paths.map(norm), active: (typeof s.active === 'number' ? s.active : 0) });
      if (serverStr !== stateStr()) reconcile(s);       // another device changed it
    }).catch(function() {});
  }
  setInterval(tick, 2000);

  // Initial load of the shared tab set, then live sync takes over. Gated on
  // resolveHome so HOME points at the logged-in user's real home before the
  // fallback "open a Home tab" path can fire.
  resolveHome(function() {
    fetch('/api/files/tabs').then(function(r) { return r.json(); }).then(function(s) {
      if (s && Array.isArray(s.paths) && s.paths.length) {
        s.paths.forEach(function(p) { createTab(p, false); });
        show(tabs[Math.min(Math.max(0, s.active | 0), tabs.length - 1)]);
      } else {
        createTab(HOME, true);
      }
    }).catch(function() {
      if (!tabs.length) createTab(HOME, true);
    }).then(function() {
      _lastSaved = stateStr();   // don't immediately re-POST the just-loaded state
      _loaded = true;
    });
  });
})();
</script>
</body>
</html>
