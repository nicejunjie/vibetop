<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>myhost — services</title>
<style>
  :root {
    --bg: #0f1115;
    --fg: #e6e8eb;
    --muted: #9aa4af;
    --card: #171a21;
    --border: #242934;
    --accent: #5ea1ff;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f7f8fa;
      --fg: #0f1115;
      --muted: #5f6b78;
      --card: #ffffff;
      --border: #e4e7ec;
      --accent: #2563eb;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2rem 1rem;
    background: var(--bg); color: var(--fg);
    font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
  }
  header { margin-bottom: 2rem; text-align: center; }
  header h1 { margin: 0; font-size: 1.75rem; letter-spacing: -0.02em; }
  header p { margin: 0.25rem 0 0; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.95rem; }
  main { width: 100%; max-width: 960px; }
  section { margin-bottom: 2rem; }
  section h2 {
    margin: 0 0 0.75rem;
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
  }
  section.terminals .grid {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }
  .term-chips {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.6rem;
  }
  .term-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; font-size: 0.8rem; color: var(--muted);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; text-decoration: none;
    transition: border-color 0.12s;
  }
  .term-chip:hover { border-color: var(--accent); color: var(--fg); }
  a.card {
    display: block;
    padding: 1rem 1.1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--fg); text-decoration: none;
    transition: transform .08s ease, border-color .12s ease;
  }
  a.card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .name { font-weight: 600; font-size: 1.05rem; display: flex; align-items: center; gap: 6px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.up { background: #22c55e; }
  .dot.down { background: #ef4444; }
  .desc { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; }
  .port { color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; margin-top: 0.4rem; }
  footer { margin-top: 2.5rem; color: var(--muted); font-size: 0.85rem; text-align: center; }
  footer code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
</style>
</head>
<body>
  <header>
    <h1>myhost</h1>
    <p>192.168.1.10</p>
  </header>
  <main>
    <section class="terminals">
      <h2>terminal-in-browser</h2>
      <div class="grid">
        <a class="card" href="/terminals/" target="_blank" data-health="terminals">
          <div class="name"><span class="dot"></span>Terminals</div>
          <div class="desc">Tabbed persistent bash sessions</div>
          <div class="port">/terminals/</div>
        </a>
      </div>
      <div class="term-chips" id="term-chips"></div>
    </section>

    <section>
      <h2>browser-in-browser</h2>
      <div class="grid">
        <a class="card" href="/browser/" target="_blank" data-health="browser">
          <div class="name"><span class="dot"></span>Browser</div>
          <div class="desc">Persistent Chromium via xpra</div>
          <div class="port">/browser/</div>
        </a>
      </div>
    </section>

    <!-- Populated at runtime from services.json (a host-local, gitignored file).
         See services.example.json for the format. -->
    <section id="services-section" hidden>
      <h2>services-in-browser</h2>
      <div class="grid" id="services-grid"></div>
    </section>

  </main>
  <footer>
    Add your services in <code>~/claude-web-www/services.json</code> (see <code>services.example.json</code>).
  </footer>
<script>
// Dynamic terminal chips
function loadTerminals(data) {
  var chips = document.getElementById('term-chips');
  var running = (data && data.running) || [];
  chips.innerHTML = '';
  running.forEach(n => {
    var a = document.createElement('a');
    a.className = 'term-chip';
    a.href = '/t' + n + '/';
    a.target = '_blank';
    a.innerHTML = '<span class="dot up" style="width:6px;height:6px"></span>T' + n;
    chips.appendChild(a);
  });
}
fetch('/api/terminals/status').then(r => r.json()).then(loadTerminals).catch(() => {});
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'terminals') loadTerminals(e.data.data);
});

var lastHealth = null;
function applyHealth(data) {
  lastHealth = data;
  document.querySelectorAll('a.card[data-health]').forEach(card => {
    const dot = card.querySelector('.dot');
    const key = card.dataset.health;
    if (dot && key in data) { dot.classList.remove('up','down'); dot.classList.add(data[key] ? 'up' : 'down'); }
  });
}

// Host-local service cards, defined in services.json (gitignored). Rendered from
// either a direct fetch (LAN) or a postMessage relay from the parent (Cloudflare,
// where iframe fetches don't carry the Access cookie).
function renderServices(list) {
  var sec = document.getElementById('services-section');
  var grid = document.getElementById('services-grid');
  if (!Array.isArray(list) || !list.length) { sec.hidden = true; return; }
  grid.innerHTML = '';
  list.forEach(function(s) {
    var a = document.createElement('a');
    a.className = 'card';
    a.href = s.url || '#';
    a.target = '_blank';
    if (s.key) a.dataset.health = s.key;
    a.innerHTML = '<div class="name"><span class="dot"></span>' + (s.name || '') + '</div>' +
                  '<div class="desc">' + (s.desc || '') + '</div>' +
                  '<div class="port">' + (s.port || '') + '</div>';
    grid.appendChild(a);
  });
  sec.hidden = false;
  if (lastHealth) applyHealth(lastHealth);   // colour the dots we just created
}

// Try fetching directly (works on LAN/standalone); the parent also relays these
// via postMessage (works through the Cloudflare tunnel).
fetch('/api/health').then(r => r.json()).then(applyHealth).catch(() => {});
fetch('/services.json').then(r => r.json()).then(renderServices).catch(() => {});
window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'health')   applyHealth(e.data.data);
  if (e.data.type === 'services') renderServices(e.data.data);
});
</script>
</body>
</html>
