<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vibetop — services</title>
<style>
  :root {
    --bg: #0f1115; --fg: #e6e8eb; --muted: #9aa4af;
    --card: #171a21; --border: #242934; --accent: #5ea1ff;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f7f8fa; --fg: #0f1115; --muted: #5f6b78;
            --card: #ffffff; --border: #e4e7ec; --accent: #2563eb; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 1.75rem 1rem 3rem;
    background: var(--bg); color: var(--fg);
    font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
  }
  header { margin-bottom: 1.5rem; text-align: center; }
  header h1 { margin: 0; font-size: 1.6rem; letter-spacing: -0.02em; }
  header p { margin: 0.25rem 0 0; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9rem; }
  main { width: 100%; max-width: 960px; }
  .bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; gap: 1rem; }
  .bar h2 { margin: 0; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .refresh { background: var(--card); color: var(--muted); border: 1px solid var(--border); border-radius: 8px;
             padding: 5px 12px; font-size: 0.82rem; cursor: pointer; transition: border-color .12s, color .12s; }
  .refresh:hover { border-color: var(--accent); color: var(--fg); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }   /* phone: single column */
  .card {
    position: relative; display: block; padding: 1rem 1.1rem;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    color: var(--fg); text-decoration: none; cursor: pointer;
    transition: transform .08s ease, border-color .12s ease;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .name { font-weight: 600; font-size: 1.05rem; display: flex; align-items: center; gap: 7px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .dot.up { background: #22c55e; }
  .dot.down { background: #ef4444; }
  .desc { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; min-height: 1.35em; }
  .row { display: flex; align-items: center; justify-content: space-between; margin-top: 0.55rem; }
  .port { color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; }
  .ext { color: var(--muted); font-size: 0.78rem; font-family: inherit; line-height: 1.4;
         background: none; border: 1px solid var(--border); cursor: pointer; padding: 2px 8px; border-radius: 6px; }
  .ext:hover { color: var(--fg); border-color: var(--accent); }
  .empty { color: var(--muted); text-align: center; padding: 2.5rem 1rem; font-size: 0.95rem; }
  footer { margin-top: 2.5rem; color: var(--muted); font-size: 0.82rem; text-align: center; max-width: 640px; }
  footer code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
</style>
</head>
<body>
  <header>
    <h1>Services</h1>
    <p id="host">this host</p>
  </header>
  <main>
    <div class="bar">
      <h2>Network services</h2>
      <button class="refresh" id="refresh" type="button">↻ Refresh</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>No network services detected.</div>
  </main>
  <footer>
    Auto-discovered from services listening on a network address (<code>ss -tlnp</code>).
    Tap a card to open the service in a new tab; use <strong>⧉ Browser</strong> to open it in the embedded Browser (for remote/tunnel access).
  </footer>
<script>
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
// Only http(s) — never a javascript: URL slipped in via a service name/cmdline.
function safeUrl(u) { u = String(u || ''); return /^https?:\/\//i.test(u) ? u : ''; }

// Open a service. Prefer the embedded Browser (Chromium runs ON this host, so it
// reaches the LAN service whether you're on the LAN or coming through the tunnel);
// fall back to a direct call when this page is standalone (no parent shell).
function openInBrowser(url) {
  var safe = safeUrl(url);
  if (!safe) return;
  var direct = function () {
    fetch('/api/browser/open', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: safe }) }).catch(function () {});
  };
  try {
    if (window.top && window.top !== window) window.top.postMessage({ type: 'open-in-browser', url: safe }, '*');
    else direct();
  } catch (e) { direct(); }
}

function render(model) {
  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');
  var list = (model && Array.isArray(model.services)) ? model.services : [];
  if (model && model.lan_ip) document.getElementById('host').textContent = model.lan_ip;
  if (!list.length) { grid.innerHTML = ''; empty.hidden = false; return; }
  empty.hidden = true;
  grid.innerHTML = '';
  list.forEach(function (s) {
    var url = safeUrl(s.url);
    var up = s.health === 'up';
    // The whole card opens the service in a NEW TAB — your real browser, which is
    // the right way to reach a service on your own LAN (full-featured, no xpra
    // latency). The secondary "⧉ Browser" button opens it in the embedded
    // Browser instead, for when you're remote / on the tunnel and can't reach the
    // LAN address directly (Chromium runs on the host, so it can).
    var card = document.createElement(url ? 'a' : 'div');
    card.className = 'card';
    if (url) { card.href = url; card.target = '_blank'; card.rel = 'noopener'; }
    card.innerHTML =
      '<div class="name"><span class="dot ' + (up ? 'up' : 'down') + '"></span>' + esc(s.name) + '</div>' +
      '<div class="desc">' + esc(s.desc || '') + '</div>' +
      '<div class="row"><span class="port">' + esc(s.port) + '</span>' +
      (url ? '<button class="ext" type="button" title="Open in the embedded Browser">⧉ Browser</button>' : '') +
      '</div>';
    var btn = card.querySelector('.ext');
    if (btn) btn.addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation();   // don't also fire the card's new-tab nav
      openInBrowser(url);
    });
    grid.appendChild(card);
  });
}

// Fetch directly (works on LAN / standalone); the parent shell also relays this
// via postMessage (needed through the Cloudflare tunnel, where an iframe's own
// fetch doesn't carry the Access cookie).
function load() {
  fetch('/api/services/discover').then(function (r) { return r.json(); }).then(render).catch(function () {});
}
window.addEventListener('message', function (e) {
  if (e.data && e.data.type === 'services') render(e.data.data);
});
document.getElementById('refresh').addEventListener('click', load);
load();
setInterval(load, 5000);
</script>
</body>
</html>
