<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notes — Vibetop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; background: #1a1a2e; font-family: system-ui, sans-serif; color: #d4d8de; }
  /* Tab bar — one tab per note. Double-click a tab to rename; drag to reorder. */
  .tabbar {
    display: flex; align-items: stretch; flex-shrink: 0; min-height: 38px;
    background: #161b22; border-bottom: 1px solid #2a3040;
    position: relative; z-index: 2;
  }
  .tabs { display: flex; align-items: stretch; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    display: flex; align-items: center; gap: 7px; padding: 0 8px 0 13px;
    border-right: 1px solid #222a38; cursor: pointer; max-width: 200px;
    color: #aab4c5; font-size: 13px; white-space: nowrap; user-select: none;
    border-bottom: 2px solid transparent;
  }
  .tab:hover { background: #1b2330; color: #e6edf3; }
  .tab.active { background: #1f2937; color: #fff; border-bottom-color: #1ab3a6; }
  .tab .lbl { overflow: hidden; text-overflow: ellipsis; outline: none; }
  .tab .lbl[contenteditable="true"] { background: #0e1117; padding: 1px 4px; border-radius: 3px; cursor: text; min-width: 30px; }
  .tab .x { flex: 0 0 auto; width: 18px; height: 18px; line-height: 16px; text-align: center; border-radius: 4px; color: #6b7488; font-size: 14px; }
  .tab .x:hover { background: #3a2024; color: #f1b3b3; }
  .add { flex: 0 0 auto; width: 38px; background: transparent; border: 0; border-right: 1px solid #222a38; color: #2e9e92; font-size: 22px; cursor: pointer; line-height: 1; }
  .add:hover { background: #0c2b28; color: #4fd0c2; }
  .status { margin-left: auto; align-self: center; padding: 0 14px; font-size: 12px; color: #556; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: nowrap; }
  .status.saved { color: #4a8; }
  .status.err { color: #d66; }
  /* Link bar: tappable chips for every URL in the active note. */
  .links { display: none; align-items: center; gap: 6px; flex-wrap: nowrap; overflow-x: auto; padding: 6px 14px; flex-shrink: 0; background: #12161d; border-bottom: 1px solid #20262f; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .links::-webkit-scrollbar { display: none; }
  .links.on { display: flex; }
  .link-chip { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 5px; max-width: 240px; padding: 4px 10px 4px 9px; border-radius: 14px; background: #1a3a6b; color: #cfe0f5; border: 1px solid #2d6cc0; font: 12px system-ui, sans-serif; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none; }
  .link-chip:hover { background: #245089; color: #fff; }
  .link-chip .lbl { overflow: hidden; text-overflow: ellipsis; }
  textarea { flex: 1; width: 100%; resize: none; background: #0e1117; color: #d4d8de; border: none; outline: none; padding: 16px 20px; font: 14px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace; tab-size: 4; }
  textarea::placeholder { color: #3a4050; }
  textarea:disabled { color: #46506a; }
</style>
  <script src="/vibe-modal.js"></script>
</head>
<body>
  <div class="tabbar">
    <div class="tabs" id="tabs"></div>
    <button class="add" id="add" title="New note">+</button>
    <span class="status" id="status"></span>
  </div>
  <div class="links" id="links"></div>
  <textarea id="editor" placeholder="Type anything here. Auto-saves as you type." spellcheck="false" disabled></textarea>
<script>
(function() {
  var tabsEl = document.getElementById('tabs');
  var addBtn = document.getElementById('add');
  var statusEl = document.getElementById('status');
  var linksEl = document.getElementById('links');
  var editor = document.getElementById('editor');

  var tabs = [];               // [{id, name}]
  var active = null;           // active id
  var cache = {};              // id -> content (loaded)
  var ready = false;           // active note's content is loaded → safe to autosave
  var saveTimer = null, scanTimer = null;
  var savingInFlight = false;  // a save POST is in flight — treat as "busy" like a pending edit
  var unsaved = false;         // local edits not yet CONFIRMED saved (stays true if a save fails)
  var initDone = false;        // don't live-sync before the first load lands
  var _lastTabsSig = null;     // last tab set (ids+names+order) known to match the server

  function api(path, body) {
    return fetch(path, body ? {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    } : undefined);
  }
  function genId() { return 'n-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function setStatus(msg, cls) { statusEl.textContent = msg || ''; statusEl.className = 'status' + (cls ? ' ' + cls : ''); }

  // Signature of the SHARED tab state (ids + names + order). `active` is NOT in it:
  // which tab is focused stays device-local (Notes is a live editor — syncing
  // active would yank the other device's editor away mid-type).
  function tabsSig() { return JSON.stringify(tabs.map(function(t) { return [t.id, t.name]; })); }

  function persistTabs() {
    _lastTabsSig = tabsSig();
    api('/api/notes/tabs', { tabs: tabs, active: active }).catch(function() {});
  }

  function renderTabs() {
    tabsEl.innerHTML = '';
    tabs.forEach(function(t) {
      var el = document.createElement('div');
      el.className = 'tab' + (t.id === active ? ' active' : '');
      el.dataset.id = t.id; el.draggable = true;
      var lbl = document.createElement('span'); lbl.className = 'lbl'; lbl.textContent = t.name || 'Note'; el.title = t.name || 'Note';
      var x = document.createElement('span'); x.className = 'x'; x.textContent = '×'; x.title = 'Close note';
      el.appendChild(lbl); el.appendChild(x);
      tabsEl.appendChild(el);
    });
  }

  function loadContent(id) {
    // Returns a promise resolving when cache[id] is populated.
    if (cache.hasOwnProperty(id)) return Promise.resolve();
    return api('/api/notes?id=' + encodeURIComponent(id))
      .then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
      .then(function(d) { cache[id] = d.content || ''; });
  }

  function switchTo(id) {
    if (id === active && ready) return;
    flushSave();
    active = id;
    ready = false;
    unsaved = false;             // fresh note starts clean (don't inherit prior dirty state)
    editor.disabled = true; editor.value = '';
    setStatus('loading…');
    renderTabs();
    loadContent(id).then(function() {
      if (active !== id) return;            // user switched again meanwhile
      editor.value = cache[id]; editor.disabled = false; ready = true;
      setStatus('');
      scanLinks();
      editor.focus();
    }).catch(function() {
      if (active !== id) return;
      setStatus('load failed — reload', 'err');
      editor.placeholder = 'Could not load this note. Reload before editing (your saved note is intact).';
    });
    persistTabs();                           // remember active
  }

  function flushSave() {
    if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
    if (ready && active != null) doSave(active, editor.value);
  }
  function doSave(id, content) {
    cache[id] = content;
    savingInFlight = true;
    setStatus('saving…');
    api('/api/notes', { id: id, content: content })
      .then(function() {
        // Only a CONFIRMED save clears `unsaved` — and only if the editor still
        // holds exactly what we saved (the user may have typed more meanwhile).
        if (active === id && editor.value === content) unsaved = false;
        if (active === id) setStatus('saved', 'saved');
      })
      .catch(function() {
        if (active === id) setStatus('save failed — retrying', 'err');
        // Keep `unsaved` true (guards syncContent from clobbering the user's text)
        // and re-arm the autosave so a transient network blip self-heals instead
        // of silently losing the edit on the next background sync.
        if (active === id && saveTimer === null) {
          saveTimer = setTimeout(function() { saveTimer = null; doSave(active, editor.value); }, 3000);
        }
      })
      .then(function() { savingInFlight = false; });   // clear busy either way (no .finally on old Safari)
  }

  function addNote() {
    flushSave();
    var id = genId();
    tabs.push({ id: id, name: 'Note ' + (tabs.length + 1) });
    cache[id] = '';
    renderTabs();
    persistTabs();
    switchTo(id);
  }

  function closeNote(id) {
    function doClose() {
      var i = tabs.findIndex(function(t) { return t.id === id; });
      if (i === -1) return;
      tabs.splice(i, 1);
      delete cache[id];
      if (!tabs.length) {                         // never zero notes
        var nid = genId(); tabs.push({ id: nid, name: 'Notes' }); cache[nid] = '';
      }
      renderTabs();
      persistTabs();                              // server deletes the closed note's file
      if (active === id) { active = null; switchTo(tabs[Math.max(0, i - 1)].id); }
    }
    function decide(content) {
      if ((content || '').trim()) {
        vibeConfirm('Delete this note? This can’t be undone.', { okText: 'Delete', danger: true }).then(function(ok) { if (ok) doClose(); });
      } else { doClose(); }
    }
    var content = cache[id];
    if (content !== undefined) { decide(content); return; }
    // Not loaded THIS session — tabs are shared across devices, so many tabs were
    // never opened here. Fetch the body before deciding, so we never silently
    // delete a note that actually has content (the old code treated unknown as
    // empty and skipped the confirmation). If the fetch fails, confirm to be safe.
    api('/api/notes?id=' + encodeURIComponent(id))
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(d) { decide(d ? (d.content || '') : ''); })
      .catch(function() {
        vibeConfirm('Delete this note? This can’t be undone.', { okText: 'Delete', danger: true }).then(function(ok) { if (ok) doClose(); });
      });
  }

  function renameTab(el, id) {
    var lbl = el.querySelector('.lbl');
    lbl.contentEditable = 'true'; lbl.focus();
    var range = document.createRange(); range.selectNodeContents(lbl);
    var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    function commit(save) {
      lbl.contentEditable = 'false';
      var t = tabs.filter(function(x) { return x.id === id; })[0];
      if (t && save) {
        var name = (lbl.textContent || '').trim().slice(0, 64) || t.name;
        if (name !== t.name) { t.name = name; persistTabs(); }
      }
      lbl.textContent = (t ? t.name : lbl.textContent);
      lbl.onblur = null; lbl.onkeydown = null;
    }
    lbl.onblur = function() { commit(true); };
    lbl.onkeydown = function(e) {
      if (e.key === 'Enter') { e.preventDefault(); commit(true); }
      else if (e.key === 'Escape') { e.preventDefault(); commit(false); }
    };
  }

  // --- tab events: click=switch, dblclick=rename, ×=close, drag=reorder ---
  tabsEl.addEventListener('click', function(e) {
    var el = e.target.closest('.tab'); if (!el) return;
    var id = el.dataset.id;
    if (e.target.closest('.x')) { closeNote(id); return; }
    if (e.target.closest('.lbl') && e.target.isContentEditable) return;  // editing
    switchTo(id);
  });
  tabsEl.addEventListener('dblclick', function(e) {
    var el = e.target.closest('.tab'); if (!el) return;
    if (e.target.closest('.x')) return;
    renameTab(el, el.dataset.id);
  });
  addBtn.addEventListener('click', addNote);

  // Drag-reorder (HTML5 DnD; a no-op on touch, so tap/scroll are unaffected).
  var dragId = null;
  tabsEl.addEventListener('dragstart', function(e) {
    var el = e.target.closest('.tab'); if (!el) return;
    dragId = el.dataset.id; try { e.dataTransfer.effectAllowed = 'move'; } catch (_) {}
  });
  tabsEl.addEventListener('dragover', function(e) {
    if (dragId == null) return;
    e.preventDefault();
    var over = e.target.closest('.tab'); if (!over || over.dataset.id === dragId) return;
    var dragged = tabsEl.querySelector('.tab[data-id="' + CSS.escape(dragId) + '"]');
    if (!dragged) return;
    var r = over.getBoundingClientRect();
    over.parentNode.insertBefore(dragged, (e.clientX < r.left + r.width / 2) ? over : over.nextSibling);
  });
  tabsEl.addEventListener('dragend', function() {
    if (dragId == null) return;
    dragId = null;
    var order = Array.prototype.map.call(tabsEl.querySelectorAll('.tab'), function(el) { return el.dataset.id; });
    tabs.sort(function(a, b) { return order.indexOf(a.id) - order.indexOf(b.id); });
    persistTabs();
  });

  // --- editor autosave ---
  editor.addEventListener('input', function() {
    if (!ready) return;
    unsaved = true;              // dirty until a save confirms
    clearTimeout(saveTimer); setStatus('editing…');
    saveTimer = setTimeout(function() { saveTimer = null; doSave(active, editor.value); }, 800);
    clearTimeout(scanTimer); scanTimer = setTimeout(scanLinks, 300);
  });
  editor.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); flushSave(); }
    if (e.key === 'Tab') {
      e.preventDefault();
      var s = this.selectionStart;
      this.value = this.value.substring(0, s) + '\t' + this.value.substring(this.selectionEnd);
      this.selectionStart = this.selectionEnd = s + 1;
    }
  });

  // --- URL chips (per active note) ---
  var URL_RE = /https?:\/\/[^\s<>"'`]+/gi;
  function openUrl(url) {
    var safe = url.replace(/[()'"`$;]/g, function(c) { return '%' + c.charCodeAt(0).toString(16).toUpperCase(); });
    var direct = function() { fetch('/api/browser/open', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: safe }) }).catch(function() {}); };
    try { if (window.top && window.top !== window) window.top.postMessage({ type: 'open-in-browser', url: safe }, '*'); else direct(); }
    catch (e) { direct(); }
  }
  function labelFor(url) {
    try { var u = new URL(url); var s = u.hostname.replace(/^www\./, ''); if (u.pathname && u.pathname !== '/') s += u.pathname; return s.length > 34 ? s.slice(0, 33) + '…' : s; }
    catch (e) { return url.length > 34 ? url.slice(0, 33) + '…' : url; }
  }
  function scanLinks() {
    var seen = {}, urls = [], m; URL_RE.lastIndex = 0;
    while ((m = URL_RE.exec(editor.value)) !== null) {
      var u = m[0].replace(/[.,;:!?'"\]]+$/, '');   // trailing punctuation, except ')'
      // Strip a trailing ')' only when it's UNBALANCED (sentence punctuation), so a
      // URL whose own path has parens — e.g. wikipedia .../Foo_(bar) — keeps it.
      while (u.charAt(u.length - 1) === ')' &&
             (u.split(')').length - 1) > (u.split('(').length - 1)) {
        u = u.slice(0, -1);
      }
      if (u && !seen[u]) { seen[u] = 1; urls.push(u); }
    }
    linksEl.innerHTML = '';
    if (!urls.length) { linksEl.classList.remove('on'); return; }
    urls.forEach(function(u) {
      var chip = document.createElement('span'); chip.className = 'link-chip'; chip.title = u;
      chip.innerHTML = '<span class="ic">🔗</span><span class="lbl"></span>';
      chip.querySelector('.lbl').textContent = labelFor(u);
      chip.addEventListener('click', function() { openUrl(u); });
      linksEl.appendChild(chip);
    });
    linksEl.classList.add('on');
  }

  // Flush a pending save when the app is backgrounded / page hidden.
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) flushSave(); else tick();   // re-sync tabs when we come back
  });
  window.addEventListener('pagehide', flushSave);
  window.addEventListener('focus', tick);

  // --- live tab sync (~2s) ------------------------------------------------
  // The tab SET (ids/names/order) is shared server-side; add/close/rename/reorder
  // on one device should appear on the others without a reload. Adopt the server
  // set when it differs from ours, but keep OUR active tab (only jump if it was
  // closed elsewhere) so the editor isn't yanked away while typing.
  function reconcile(idx) {
    tabs = idx.tabs.map(function(t) { return { id: t.id, name: t.name }; });
    var keep = {}; tabs.forEach(function(t) { keep[t.id] = true; });
    Object.keys(cache).forEach(function(id) { if (!keep[id]) delete cache[id]; });
    _lastTabsSig = tabsSig();
    if (keep[active]) { renderTabs(); }               // our note survives → stay put
    else {                                            // it was closed elsewhere → move
      var act = (idx.active && keep[idx.active]) ? idx.active : (tabs[0] && tabs[0].id);
      active = null; renderTabs();
      if (act) switchTo(act);
    }
  }
  // Live-sync the OPEN note's body: pull the active note and apply a remote change
  // (edited on another device) into the editor — but only while WE aren't mid-edit
  // (pending debounce or a save in flight), so our own typing always wins and is
  // never clobbered. Same last-writer-wins model as the autosave. Caret is kept
  // best-effort so a background refresh doesn't jump the cursor.
  function syncContent() {
    if (!ready || active == null) return;
    if (unsaved || saveTimer !== null || savingInFlight) return;  // local edit unsaved/in progress → skip
    var id = active;
    api('/api/notes?id=' + encodeURIComponent(id))
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(d) {
        if (!d || active !== id) return;                   // switched away while awaiting
        if (unsaved || saveTimer !== null || savingInFlight) return;  // started editing while awaiting
        var remote = d.content || '';
        cache[id] = remote;
        if (remote === editor.value) return;               // already in sync
        var s = editor.selectionStart, e = editor.selectionEnd;
        editor.value = remote;
        try { editor.selectionStart = Math.min(s, remote.length); editor.selectionEnd = Math.min(e, remote.length); } catch (_) {}
        scanLinks();
        setStatus('synced', 'saved');
      }).catch(function() {});
  }

  function tick() {
    if (!initDone) return;
    syncContent();                                         // refresh the open note's body
    // Don't clobber an in-progress rename or drag.
    if (dragId != null || tabsEl.querySelector('.lbl[contenteditable="true"]')) return;
    if (tabsSig() !== _lastTabsSig) { persistTabs(); return; }   // we changed it → push, win this round
    api('/api/notes').then(function(r) { return r.json(); }).then(function(idx) {
      if (!idx || !Array.isArray(idx.tabs) || !idx.tabs.length) return;
      var ssig = JSON.stringify(idx.tabs.map(function(t) { return [t.id, t.name]; }));
      if (ssig !== _lastTabsSig) reconcile(idx);
    }).catch(function() {});
  }
  setInterval(tick, 2000);

  // --- init ---
  api('/api/notes').then(function(r) { return r.json(); }).then(function(idx) {
    tabs = (idx && Array.isArray(idx.tabs) && idx.tabs.length) ? idx.tabs : [{ id: '1', name: 'Notes' }];
    var act = (idx && idx.active && tabs.some(function(t) { return t.id === idx.active; })) ? idx.active : tabs[0].id;
    _lastTabsSig = tabsSig();
    initDone = true;
    renderTabs();
    switchTo(act);
  }).catch(function() {
    setStatus('load failed — reload', 'err');
    editor.placeholder = 'Could not load notes. Reload before editing (your saved notes are intact).';
  });
})();
</script>
</body>
</html>
