# FileBrowser at /files/ -> 127.0.0.1:8085
# SPA entry point — fix Content-Type (FileBrowser sends text/plain for HTML)
location = /files/ {
    proxy_pass http://127.0.0.1:8085;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    proxy_buffering off;
    proxy_hide_header Content-Type;
    proxy_hide_header X-Content-Type-Options;
    add_header Content-Type "text/html; charset=utf-8" always;
    add_header Cache-Control "no-cache, no-store" always;

    sub_filter '</body>' '<script src="/filebrowser-patches.js?v=2"></script></body>';
    sub_filter_types *;
    sub_filter_once on;
}

# All other /files/* requests (static assets, API, SPA sub-routes)
location /files/ {
    proxy_pass http://127.0.0.1:8085;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    proxy_buffering off;
    client_max_body_size 1G;

    sub_filter '</body>' '<script src="/filebrowser-patches.js?v=2"></script></body>';
    sub_filter_types text/html;
    sub_filter_once on;
}

# Serve raw files for the embedded browser to open
location /fileview/ {
    alias /home/myuser/;
    autoindex off;
    add_header Cache-Control 'no-cache' always;
}
