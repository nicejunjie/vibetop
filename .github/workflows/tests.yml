name: tests

# Run the hermetic regression suite on every push and PR. No services/root
# needed: the Python tests load terminal-manager.py / the claude-usage proxy
# in-process (external processes are stubbed) and the JS tests use node's
# built-in runner with no deps. `./run-tests.sh` drives all tiers.
on:
  push:
  pull_request:

# Least privilege: the suites only read the checkout — drop the default
# read/write GITHUB_TOKEN so a compromised dependency can't push or open PRs.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure shellcheck is available
        run: shellcheck --version || { sudo apt-get update && sudo apt-get install -y shellcheck; }

      - name: Run the regression suite
        run: ./run-tests.sh
