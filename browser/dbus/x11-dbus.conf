<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!-- Private, per-user D-Bus SESSION bus for GUI apps launched onto the X11 display
     (evince/eog/…). Started on demand, one per user, as a dbus-daemon (nofork,
     nopidfile) with this config-file and address unix:path=/run/user/<uid>/vibetop-x11-bus.
     NOTE: XML comments must not contain a double-hyphen — expat rejects the whole
     file and the bus silently never starts (see test_static xml-well-formed guard).

     The whole point is the DELIBERATE ABSENCE of <servicedir>: with no
     service-activation directories, a GNOME/GTK app that asks the bus to start
     org.freedesktop.portal.Desktop or org.a11y.Bus gets an immediate
     ServiceUnknown error instead of BLOCKING ~25s waiting for an activation that
     can never happen in this sessionless desktop. Apps that respect the failure
     then start in ~0.2s. Snap apps (Firefox/Chromium) do NOT use this bus — they
     need the real user session bus for confinement — so this bus only ever carries
     ordinary GTK/GNOME chatter, hence the permissive single-tenant policy. -->
<busconfig>
  <type>session</type>

  <keep_umask/>

  <policy context="default">
    <allow send_destination="*" eavesdrop="true"/>
    <allow eavesdrop="true"/>
    <allow own="*"/>
  </policy>

  <limit name="max_incoming_bytes">1000000000</limit>
  <limit name="max_message_size">1000000000</limit>
  <limit name="service_start_timeout">5000</limit>
</busconfig>
