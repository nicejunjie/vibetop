<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN" "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!-- Private session bus for vibetop's X11 Launcher apps (xpra display :98).
     Rendered by browser/install.sh (@APP_UID@ -> the app user's uid).

     The whole point: it has NO <servicedir>, so D-Bus service activation is
     DISABLED. GNOME session services (xdg-desktop-portal, at-spi, …) are
     installed and activatable on the user's normal bus, but they HANG ~25s on
     activation in this minimal (non-GNOME) session — so GTK/GNOME apps like eog
     and evince block for ~33s on startup waiting out those timeouts. On this bus
     such calls return ServiceUnknown instantly, so those apps start in ~0.2s.

     Scoped to launcher apps only (the manager points /api/x/launch here);
     terminal shells keep the real user bus so per-user systemctl/gsettings work.
     Kept entirely separate from the user's real session bus -> nothing else is
     affected. -->
<busconfig>
  <type>session</type>
  <listen>unix:path=/run/user/@APP_UID@/vibetop-apps-bus</listen>
  <policy context="default">
    <!-- Apps may own any name and call any service on this private bus, and they
         implicitly receive messages addressed to them. Eavesdropping (snooping
         OTHER clients' traffic) is not needed for normal operation, so it's not
         granted — every client here is the same user's own app anyway. -->
    <allow send_destination="*"/>
    <allow own="*"/>
  </policy>
</busconfig>
