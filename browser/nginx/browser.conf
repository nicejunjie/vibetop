# claude-browser: xpra HTML5 client at /browser/ -> 127.0.0.1:@XPRA_PORT@
# Drops in via the include in /etc/nginx/sites-available/claude-web.

location = /browser  { return 301 /browser/; }

# xpra's background wallpaper is a 4.2MB jpeg that sits behind the canvas —
# invisible under our pinned #screen overlay, but downloaded on every open
# (it falls outside the cached-asset regex below). Short-circuit it entirely;
# this regex must come before the asset regex (first regex match wins).
location ~ ^/browser/background\.(?:jpe?g|png)$ { return 204; }

# xpra-patches.js is served from the web root, outside /browser/, so it misses
# the asset caching below. The sub_filter injects it with a ?vN cache-buster —
# bump the version there whenever the file changes.
location = /xpra-patches.js {
    add_header Cache-Control "public, max-age=86400" always;
}

# Static xpra client assets: cache + compress. xpra serves these uncompressed
# with "no-store", so a fresh open re-downloads ~2MB of JS/wasm every time —
# the dominant cause of slow first loads over the tunnel. Override to cache
# (xpra's assets are immutable per release) and let nginx gzip the text ones.
# Regex location takes precedence over the /browser/ prefix below; the
# WebSocket path has no file extension and falls through to /browser/.
location ~ ^/browser/(.+\.(?:js|css|wasm|woff2?|ttf|otf|eot|png|jpe?g|webp|svg|gif|ico|json|map|txt))$ {
    proxy_pass http://127.0.0.1:@XPRA_PORT@/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Accept-Encoding "";
    proxy_hide_header Cache-Control;
    proxy_hide_header Pragma;
    proxy_hide_header Expires;
    add_header Cache-Control "public, max-age=86400" always;
    gzip on;
    gzip_proxied any;
    gzip_types text/javascript application/javascript application/x-javascript text/css application/json application/wasm image/svg+xml;
    gzip_min_length 256;
}

location /browser/ {
    proxy_pass http://127.0.0.1:@XPRA_PORT@/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;

    # Inject CSS (hide xpra UI, pin canvas to viewport) and load patches JS.
    # xpra-patches.js is served from the web root (~/claude-web-www/).
    # Patches are wrapped in try/catch so they degrade gracefully if xpra updates.
    sub_filter_once on;
    sub_filter '</head>' '<style>#screen{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:10!important}#float_menu,#login-overlay,#progress,.windowhead,.window-head,.window-title,.windowtitle,.title-bar{display:none!important}</style><script src="/xpra-patches.js?v2"></script></head>';
    proxy_set_header Accept-Encoding "";

    # gzip the sub_filtered HTML/JS/CSS output to the client (initial page load only;
    # WebSocket frames are not affected by nginx gzip).
    gzip on;
    gzip_proxied any;
    gzip_types text/html text/javascript application/javascript application/x-javascript text/css application/json;
    gzip_min_length 256;
}
