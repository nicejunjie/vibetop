# claude-browser: xpra HTML5 client at /browser/ -> 127.0.0.1:@XPRA_PORT@
# Drops in via the include in /etc/nginx/sites-available/claude-web.

location = /browser  { return 301 /browser/; }

location /browser/ {
    proxy_pass http://127.0.0.1:@XPRA_PORT@/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;

    # Inject CSS (hide xpra UI, pin canvas to viewport) and load patches JS.
    # xpra-patches.js is served from the web root (~/claude-web-www/).
    # Patches are wrapped in try/catch so they degrade gracefully if xpra updates.
    sub_filter_once on;
    sub_filter '</head>' '<style>#screen{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:10!important}#float_menu,#login-overlay,#progress{display:none!important}</style><script src="/xpra-patches.js"></script></head>';
    proxy_set_header Accept-Encoding "";

    # gzip the sub_filtered HTML/JS/CSS output to the client (initial page load only;
    # WebSocket frames are not affected by nginx gzip).
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 256;
}
