# vibetop-browser: per-user xpra HTML5 client at /browser/ + /x11-display/.
# Each is routed to the requesting user's own xpra port (authcheck -> X-App-Port).
# Drops in via the include in /etc/nginx/sites-available/vibetop.

location = /browser  { return 301 /browser/; }

# xpra's background wallpaper is a 4.2MB jpeg that sits behind the canvas —
# invisible under our pinned #screen overlay, but downloaded on every open
# (it falls outside the cached-asset regex below). Short-circuit it entirely;
# this regex must come before the asset regex (first regex match wins).
location ~ ^/browser/background\.(?:jpe?g|png)$ { return 204; }

# xpra-patches.js is served from the web root, outside /browser/, so it misses
# the asset caching below. The sub_filter injects it with a ?vN cache-buster —
# bump the version there whenever the file changes.
location = /xpra-patches.js {
    add_header Cache-Control "public, max-age=86400" always;
}

# Static xpra client assets: cache + compress. xpra serves these uncompressed
# with "no-store", so a fresh open re-downloads ~2MB of JS/wasm every time —
# the dominant cause of slow first loads over the tunnel. Override to cache
# (xpra's assets are immutable per release) and let nginx gzip the text ones.
# Regex location takes precedence over the /browser/ prefix below; the
# WebSocket path has no file extension and falls through to /browser/.
location ~ ^/browser/(.+\.(?:js|css|wasm|woff2?|ttf|otf|eot|png|jpe?g|webp|svg|gif|ico|json|map|txt))$ {
    # Per-user: assets come from THIS user's Browser xpra (authcheck -> X-App-Port).
    auth_request /internal/authcheck;
    auth_request_set $bport $upstream_http_x_app_port;
    proxy_pass http://127.0.0.1:$bport/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Accept-Encoding "";
    proxy_hide_header Cache-Control;
    proxy_hide_header Pragma;
    proxy_hide_header Expires;
    add_header Cache-Control "public, max-age=86400" always;
    gzip on;
    gzip_proxied any;
    gzip_types text/javascript application/javascript application/x-javascript text/css application/json application/wasm image/svg+xml;
    gzip_min_length 256;
}

location /browser/ {
    # Gate on a valid Linux session AND route to THIS user's own Browser xpra
    # display (run as them). authcheck returns their port in X-App-Port; it also
    # starts the display on demand. auth_request/@login are in the main site.
    auth_request /internal/authcheck;
    auth_request_set $bport $upstream_http_x_app_port;
    error_page 401 = @login;
    proxy_pass http://127.0.0.1:$bport/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;

    # Inject CSS (hide xpra UI, pin canvas to viewport) and load patches JS.
    # xpra-patches.js is served from the web root (~/vibetop-www/).
    # Patches are wrapped in try/catch so they degrade gracefully if xpra updates.
    sub_filter_once on;
    sub_filter '</head>' '<style>#screen{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:10!important}#float_menu,#login-overlay,#progress,#about,.windowhead,.window-head,.window-title,.windowtitle,.title-bar{display:none!important}</style><script src="/xpra-patches.js?v=@PATCH_VER@"></script></head>';
    # Rename xpra's own tab title ("xpra websockets client") to our app name.
    sub_filter '<title>xpra websockets client</title>' '<title>Browser</title>';
    proxy_set_header Accept-Encoding "";

    # gzip the sub_filtered HTML/JS/CSS output to the client (initial page load only;
    # WebSocket frames are not affected by nginx gzip).
    gzip on;
    gzip_proxied any;
    gzip_types text/html text/javascript application/javascript application/x-javascript text/css application/json;
    gzip_min_length 256;
}

# ---- X11 desktop: a SECOND per-user xpra display just for GUI apps launched
# from the X11 Launcher tab / a terminal. Kept separate from /browser/ so Chromium
# stays its own app — one xpra display can only show one canvas. Same treatment as
# /browser/ above (background short-circuit, asset cache, patches), routed per-user.
location = /x11-display { return 301 /x11-display/; }
location ~ ^/x11-display/background\.(?:jpe?g|png)$ { return 204; }

location ~ ^/x11-display/(.+\.(?:js|css|wasm|woff2?|ttf|otf|eot|png|jpe?g|webp|svg|gif|ico|json|map|txt))$ {
    auth_request /internal/authcheck;
    auth_request_set $xport $upstream_http_x_app_port;
    proxy_pass http://127.0.0.1:$xport/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Accept-Encoding "";
    proxy_hide_header Cache-Control;
    proxy_hide_header Pragma;
    proxy_hide_header Expires;
    add_header Cache-Control "public, max-age=86400" always;
    gzip on;
    gzip_proxied any;
    gzip_types text/javascript application/javascript application/x-javascript text/css application/json application/wasm image/svg+xml;
    gzip_min_length 256;
}

location /x11-display/ {
    auth_request /internal/authcheck;
    auth_request_set $xport $upstream_http_x_app_port;
    error_page 401 = @login;
    proxy_pass http://127.0.0.1:$xport/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;

    sub_filter_once on;
    sub_filter '</head>' '<style>#screen{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:10!important}#float_menu,#login-overlay,#progress,#about,.windowhead,.window-head,.window-title,.windowtitle,.title-bar{display:none!important}</style><script src="/xpra-patches.js?v=@PATCH_VER@"></script></head>';
    sub_filter '<title>xpra websockets client</title>' '<title>X11</title>';
    proxy_set_header Accept-Encoding "";

    gzip on;
    gzip_proxied any;
    gzip_types text/html text/javascript application/javascript application/x-javascript text/css application/json;
    gzip_min_length 256;
}
