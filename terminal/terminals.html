<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terminals — Vibetop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; background: #1a1a2e; font-family: system-ui, sans-serif; }

  .tabs {
    display: flex; gap: 2px; padding: 4px 8px 0;
    background: #1a1a2e; flex-shrink: 0;
    align-items: flex-end;
    /* The terminal iframe below is position:absolute (a positioned element),
       which paints ABOVE this static-positioned bar and was capturing clicks on
       the bottom edge of the tabs (so only the upper part of a tab responded).
       Make the bar positioned with a higher stacking order so the whole tab is
       always clickable. */
    position: relative; z-index: 2;
    /* Scroll horizontally when the tabs overflow the screen (mobile especially)
       instead of running off-screen unreachably. */
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .frames { z-index: 1; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    position: relative; flex-shrink: 0;
    display: flex; align-items: center;
    padding: 10px 30px; cursor: grab; user-select: none;
    min-width: 120px;
    font-size: 14px; color: #c0dcc0; background: #2a4a35;
    border: 1px solid #3a6a48; border-bottom: none;
    border-radius: 6px 6px 0 0;
    transition: background 0.1s, color 0.1s;
  }
  .tab.dragging { opacity: 0.4; cursor: grabbing; }
  .tab.drag-over-left { box-shadow: -2px 0 0 #4b7; }
  .tab.drag-over-right { box-shadow: 2px 0 0 #4b7; }
  .tab:hover { color: #fff; background: #356045; }
  .tab.active { color: #fff; background: #33aa55; border-color: #44bb77; }
  .tab.starting { color: #eee; background: #6a5a30; border-color: #887740; }
  .tab .close {
    position: absolute; top: 2px; right: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 3px;
    font-size: 12px; line-height: 1; color: #666;
    transition: background 0.1s, color 0.1s;
  }
  .tab .close:hover { background: #ff4444; color: #fff; }
  .tab-add {
    align-self: stretch; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 0 14px; cursor: pointer; user-select: none;
    font-size: 16px; color: #555; background: transparent;
    border: 1px dashed #2a2a4a; border-bottom: none;
    border-radius: 6px 6px 0 0;
    transition: color 0.1s, border-color 0.1s;
  }
  .tab-add:hover { color: #aaa; border-color: #4a4a6a; }

  .frames { flex: 1; position: relative; }
  .frames iframe {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border: none; background: #2b2b2b;
    display: none;
  }
  .frames iframe.active { display: block; }
</style>
</head>
<body>
  <div class="tabs" id="tabs"><div class="tab-add" id="add-btn">+</div></div>
  <div class="frames" id="frames"></div>
<!-- Pure tab-set reconciliation (unit-tested in terminal/lib/tab-sync.test.js).
     Content-hash ?v= is sed'd in by terminal/install.sh, like terminal-kbd.js. -->
<script src="/tab-sync.js?v=@SYNC_VER@"></script>
<script>
(function() {
  // tab-sync.js (the <script src> above) provides the pure reconcile/nextAvailable
  // logic. It loads on the same page fetch as this HTML — and terminals.html is
  // network-only (sw BYPASS), so if the network is up enough to deliver this page
  // it delivers the module too. This fallback is pure defense-in-depth: should the
  // module ever be missing/blocked, the terminal degrades to "just mirror the
  // running set" instead of a white screen (the tested logic stays the source of
  // truth — this is a deliberately dumb safety net, not a second implementation).
  var TabSync = window.TabSync || {
    reconcile: function (running, pending, closing) {
      return { desired: (running || []).slice().sort(function (a, b) { return a - b; }),
               pending: pending || {}, closing: closing || {} };
    },
    nextAvailable: function (used, running, max) {
      var u = {};
      (used || []).concat(running || []).forEach(function (n) { u[n] = true; });
      for (var i = 1; i <= max; i++) { if (!u[i]) return i; }
      return 0;
    }
  };

  var MAX = 50;
  var NAMES_KEY = 'terminal-tab-names';
  var tabs = document.getElementById('tabs');
  var addBtn = document.getElementById('add-btn');
  var frames = document.getElementById('frames');
  var loaded = {};
  var active = null;
  var inited = false;        // gate the status reconcile until the first build is done
  // Live-sync of the tab SET against the shared backend running-terminals set:
  // `pending` = opened here, awaiting backend-running confirmation; `closing` =
  // closed here, awaiting backend-stopped confirmation. They cover the races
  // where THIS client just changed a tab and the next status poll hasn't caught up
  // (so the reconcile neither drops a just-opened tab nor re-adds a just-closed one).
  var pending = {};
  var closing = {};
  var lastRunning = [];      // most recent backend running set (for picking a free N)

  function api(method, path, body) {
    var opts = { method: method };
    if (body !== undefined) {
      opts.headers = { 'Content-Type': 'application/json' };
      opts.body = JSON.stringify(body);
    }
    return fetch('/api/terminals' + path, opts).then(function(r) { return r.json(); });
  }

  // The start endpoint returns as soon as systemd is told to launch the
  // units (systemctl --no-block) — ttyd may not be listening yet. Loading
  // the iframe at that point captures nginx's 502 page and never recovers,
  // so poll /tN/ until nginx can actually reach ttyd before activating.
  function waitReady(n) {
    return new Promise(function(resolve) {
      var deadline = Date.now() + 20000;
      (function ping() {
        fetch('/t' + n + '/', { cache: 'no-store' }).then(function(r) {
          if (r.ok || Date.now() > deadline) resolve();
          else setTimeout(ping, 300);
        }).catch(function() {
          if (Date.now() > deadline) resolve();
          else setTimeout(ping, 300);
        });
      })();
    });
  }

  // Tab names live server-side (so a rename shows up in every session/device —
  // terminal N is the same shared session everywhere), with localStorage as an
  // instant-load offline cache. tabNames is the live in-memory copy used for
  // synchronous label rendering.
  var tabNames = {};
  try { tabNames = JSON.parse(localStorage.getItem(NAMES_KEY)) || {}; } catch (e) { tabNames = {}; }
  function tabLabel(n) { return tabNames[n] || ('T' + n); }
  function saveTabName(n, name) {
    if (name) tabNames[n] = name; else delete tabNames[n];
    try { localStorage.setItem(NAMES_KEY, JSON.stringify(tabNames)); } catch (e) {}
    api('POST', '/names', { n: +n, name: name || null }).catch(function () {});
  }
  function applyTabLabels() {
    tabs.querySelectorAll('.tab').forEach(function (t) {
      var lbl = t.querySelector('.label');               // null while a tab is mid-rename — skip
      if (lbl) lbl.textContent = tabLabel(+t.dataset.n);
    });
    if (active) document.title = tabLabel(active) + ' — Vibetop';
  }
  function loadTabNames() {
    return api('GET', '/names').then(function (d) {
      if (d && d.names) {
        tabNames = d.names;
        try { localStorage.setItem(NAMES_KEY, JSON.stringify(tabNames)); } catch (e) {}
        applyTabLabels();
      }
    }).catch(function () {});
  }
  // A brand-new terminal (a fresh session started here via "+" / cold-start) must
  // not inherit a name a prior session left in this device's cache — the server
  // clears it on a fresh start (abnormal-close safety); mirror that locally so the
  // new tab shows 'TN' immediately, not the stale name, before the next names poll.
  // NOT called from the reconcile path, where a number opened on another device
  // legitimately keeps its shared name.
  function forgetLocalName(n) {
    if (tabNames[n] == null) return;
    delete tabNames[n];
    try { localStorage.setItem(NAMES_KEY, JSON.stringify(tabNames)); } catch (e) {}
    applyTabLabels();
  }

  function getTabOrder() {
    var open = [];
    tabs.querySelectorAll('.tab').forEach(function(t) { open.push(+t.dataset.n); });
    return open;
  }
  function saveTabOrder() {
    try { localStorage.setItem('terminal-tabs', JSON.stringify(getTabOrder())); } catch (e) {}
  }

  function addTab(n, starting) {
    if (tabs.querySelector('.tab[data-n="' + n + '"]')) return;
    var tab = document.createElement('div');
    tab.className = 'tab' + (starting ? ' starting' : '');
    tab.draggable = true;
    tab.dataset.n = n;
    var _lbl = document.createElement('span'); _lbl.className = 'label'; _lbl.textContent = tabLabel(n);
    var _cls = document.createElement('span'); _cls.className = 'close'; _cls.textContent = '×';
    tab.appendChild(_lbl); tab.appendChild(_cls);
    tabs.insertBefore(tab, addBtn);

    var iframe = document.createElement('iframe');
    iframe.id = 'frame-' + n;
    iframe.dataset.n = n;
    iframe.allow = 'clipboard-read; clipboard-write';
    frames.appendChild(iframe);
    saveTabOrder();
  }

  // Remove a tab's DOM + iframe (UI only, no backend stop). Returns whether it
  // was the active tab so the caller can re-activate a neighbour.
  function detachTab(n) {
    var tabEl = tabs.querySelector('.tab[data-n="' + n + '"]');
    if (!tabEl) return false;
    var frameEl = document.getElementById('frame-' + n);
    var wasActive = tabEl.classList.contains('active');
    tabEl.remove();
    if (frameEl) frameEl.remove();
    delete loaded[n];
    saveTabOrder();
    return wasActive;
  }
  function reactivateAfter(wasActive) {
    if (!wasActive) return;
    var first = tabs.querySelector('.tab');
    if (first) activate(+first.dataset.n);
  }

  // User closed this tab → stop the shared session (kills it for every client)
  // and forget its name. Tracked in `closing` so a status poll that still lists
  // the not-yet-stopped unit doesn't make the reconcile re-add the tab.
  function removeTab(n) {
    if (!tabs.querySelector('.tab[data-n="' + n + '"]')) return;
    if (tabs.querySelectorAll('.tab').length <= 1) return;   // never zero tabs
    closing[n] = true; delete pending[n];
    var wasActive = detachTab(n);
    saveTabName(n, null);   // closing kills the terminal → forget its custom name
    api('POST', '/' + n + '/stop');
    reactivateAfter(wasActive);
  }

  // Another client closed this terminal (backend reports it gone) → drop our tab
  // WITHOUT stopping again. Unlike the user-close path this MAY drop the last tab
  // (its session is dead — keeping it would just show a 502); the reconcile then
  // cold-starts a fresh terminal so the UI is never left empty or on a dead tab.
  function dropTabExternal(n) {
    reactivateAfter(detachTab(n));
  }

  // Start a fresh terminal and show it (used at cold load and when a reconcile
  // emptied the tab bar because every terminal was closed elsewhere).
  function coldStart() {
    var n = nextAvailable(lastRunning) || 1;
    pending[n] = true;
    forgetLocalName(n);            // fresh session -> no inherited name
    api('POST', '/' + n + '/start').then(function() {
      addTab(n, true);
      return waitReady(n);
    }).then(function() {
      var tab = tabs.querySelector('.tab[data-n="' + n + '"]');
      if (tab) tab.classList.remove('starting');
      activate(n);
    }).catch(function() { delete pending[n]; });
  }

  // Reconcile the local tab SET with the shared backend running set, so a tab
  // opened/closed on another client/device appears/disappears here too (order +
  // active stay device-local; only set membership syncs).
  function reconcileTabs(running) {
    lastRunning = running;
    // Pure decision (TabSync.reconcile): desired set + drained pending/closing.
    var r = TabSync.reconcile(running, pending, closing);
    pending = r.pending; closing = r.closing;
    var desired = {};
    r.desired.forEach(function(n) { desired[n] = true; });

    r.desired.forEach(function(n) {                    // opened elsewhere → add here
      if (!tabs.querySelector('.tab[data-n="' + n + '"]')) addTab(n);
    });
    tabs.querySelectorAll('.tab').forEach(function(t) {  // closed elsewhere → drop here
      var n = +t.dataset.n;
      if (!desired[n]) dropTabExternal(n);
    });
    if (!tabs.querySelector('.tab') && !Object.keys(pending).length) coldStart();  // everything closed elsewhere
    applyTabLabels();
  }
  function syncStatus() {
    if (!inited) return;
    api('GET', '/status').then(function(d) { reconcileTabs(d.running || []); }).catch(function() {});
  }

  function activate(n) {
    active = n;
    tabs.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', +t.dataset.n === n);
    });
    frames.querySelectorAll('iframe').forEach(function(f) {
      f.classList.toggle('active', +f.dataset.n === n);
    });
    if (!loaded[n]) {
      document.getElementById('frame-' + n).src = '/t' + n + '/';
      loaded[n] = true;
    }
    try { localStorage.setItem('active-terminal', n); } catch (e) {}
    document.title = tabLabel(n) + ' — Vibetop';
    focusTerminal(n);
  }

  // Auto-focusing the xterm textarea pops up the on-screen keyboard on mobile.
  // The design is keyboard-hidden-until-tap on touch, so skip the textarea
  // focus there (the user taps the terminal to summon it). ttyd also focuses
  // on WebSocket-connect — that path is suppressed by the touch guard injected
  // into the /tN/ page itself (see terminal/install.sh sub_filter).
  var isTouch = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  // Set while a tab is being renamed so focusTerminal's delayed focus doesn't
  // steal focus from the rename input (which blurred it and cancelled the edit).
  var renaming = false;
  function focusTerminal(n) {
    if (isTouch) return;
    var iframe = document.getElementById('frame-' + n);
    if (!iframe) return;
    iframe.focus();
    setTimeout(function() {
      if (renaming) return;
      try {
        var ta = iframe.contentDocument.querySelector('.xterm-helper-textarea');
        if (ta) ta.focus();
      } catch(e) {}
    }, 100);
  }

  function nextAvailable(running) {
    var used = [];
    tabs.querySelectorAll('.tab').forEach(function(t) { used.push(+t.dataset.n); });
    return TabSync.nextAvailable(used, running, MAX);
  }

  // Activate on pointerdown for MOUSE: when the terminal iframe has focus (you
  // were typing), the browser spends the first click moving focus back to the
  // parent window, swallowing it — so a click-based switch needed a second
  // click. pointerdown fires on the first press, before that focus transition.
  // (Touch keeps the click path so a horizontal scroll-drag of the tab bar
  // doesn't activate whatever tab the finger landed on. Close stays on click.)
  tabs.addEventListener('pointerdown', function(e) {
    if (e.pointerType !== 'mouse' || e.button) return;   // primary mouse button only
    if (e.target.closest('.close')) return;              // close is handled on click
    var tab = e.target.closest('.tab');
    if (tab && +tab.dataset.n !== active) activate(+tab.dataset.n);
  });
  tabs.addEventListener('click', function(e) {
    if (e.target.closest('.close')) {
      var tab = e.target.closest('.tab');
      if (tab) removeTab(+tab.dataset.n);
      return;
    }
    var tab = e.target.closest('.tab');     // touch / fallback activation
    if (tab && +tab.dataset.n !== active) activate(+tab.dataset.n);
  });

  tabs.addEventListener('dblclick', function(e) {
    var tab = e.target.closest('.tab');
    if (!tab || e.target.closest('.close')) return;
    var n = +tab.dataset.n;
    var label = tab.querySelector('.label');
    var current = label.textContent;
    var input = document.createElement('input');
    input.type = 'text';
    input.value = current;
    input.style.cssText = 'width:80px;font:inherit;background:#111;color:#fff;border:1px solid #4b7;border-radius:3px;padding:0 4px;outline:none;';
    renaming = true;
    label.replaceWith(input);
    input.focus();
    input.select();
    var finished = false;
    function finish() {
      if (finished) return;   // Enter→blur and a real blur can both fire; commit once
      finished = true;
      renaming = false;
      var val = input.value.trim() || 'T' + n;
      saveTabName(n, val === 'T' + n ? null : val);
      var span = document.createElement('span');
      span.className = 'label';
      span.textContent = val;
      input.replaceWith(span);
    }
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter') input.blur();
      if (ev.key === 'Escape') { input.value = current; input.blur(); }
    });
  });

  // -- drag and drop reorder --
  var dragTab = null;

  tabs.addEventListener('dragstart', function(e) {
    var tab = e.target.closest('.tab');
    if (!tab) return;
    dragTab = tab;
    tab.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
  });

  tabs.addEventListener('dragend', function(e) {
    if (dragTab) dragTab.classList.remove('dragging');
    tabs.querySelectorAll('.tab').forEach(function(t) {
      t.classList.remove('drag-over-left', 'drag-over-right');
    });
    dragTab = null;
    saveTabOrder();
  });

  tabs.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var target = e.target.closest('.tab');
    if (!target || target === dragTab) return;
    tabs.querySelectorAll('.tab').forEach(function(t) {
      t.classList.remove('drag-over-left', 'drag-over-right');
    });
    var rect = target.getBoundingClientRect();
    var mid = rect.left + rect.width / 2;
    target.classList.add(e.clientX < mid ? 'drag-over-left' : 'drag-over-right');
  });

  tabs.addEventListener('dragleave', function(e) {
    var target = e.target.closest('.tab');
    if (target) target.classList.remove('drag-over-left', 'drag-over-right');
  });

  tabs.addEventListener('drop', function(e) {
    e.preventDefault();
    var target = e.target.closest('.tab');
    if (!target || !dragTab || target === dragTab) return;
    var rect = target.getBoundingClientRect();
    var before = e.clientX < rect.left + rect.width / 2;
    if (before) {
      tabs.insertBefore(dragTab, target);
    } else {
      tabs.insertBefore(dragTab, target.nextSibling);
    }
  });

  addBtn.addEventListener('click', function() {
    // Consider the last-known backend running set too, so we don't pick a number
    // another client just started (terminal N is shared) before the reconcile
    // adds it here.
    var n = nextAvailable(lastRunning);
    if (n === 0) return;
    pending[n] = true;        // opened here; reconcile keeps it until status confirms
    forgetLocalName(n);       // fresh session -> no inherited name
    addTab(n, true);
    api('POST', '/' + n + '/start').then(function() {
      return waitReady(n);
    }).then(function() {
      var tab = tabs.querySelector('.tab[data-n="' + n + '"]');
      if (tab) tab.classList.remove('starting');
      activate(n);
    }).catch(function() {
      // Start/wait failed (manager briefly down/saturated). Without this, pending[n]
      // stayed true forever — reconcile (running ∪ pending) then forced the dead
      // number into `desired` on every poll, so the tab sat yellow permanently and
      // nextAvailable skipped n for good. Drop the half-created tab + iframe.
      delete pending[n];
      reactivateAfter(detachTab(n));
    });
  });

  window.addEventListener('message', function(e) {
    if (e.origin !== location.origin) return;
    if (!e.data) return;
    if (e.data.type === 'focus-terminal') {
      syncStatus();                 // app just activated → reconcile the set now
      if (active) focusTerminal(active);
    }
    // Relay the desktop's system key bar (arrows/Esc/Tab/^C) DOWN to the active
    // terminal's /tN/ iframe, where terminal-kbd.js turns it into PTY bytes.
    if (e.data.type === 'kbd-key' && active) {
      var kf = document.getElementById('frame-' + active);
      if (kf && kf.contentWindow) { try { kf.contentWindow.postMessage(e.data, '*'); } catch (_) {} }
    }
    // Relay a /tN/ keyboard show/hide request UP to the desktop (it shows the bar).
    if (e.data.type === 'kbd-bar') {
      try { window.parent.postMessage(e.data, '*'); } catch (_) {}
    }
  });

  // When the desktop shell switches into Terminal after the app was hidden,
  // xterm.js inside the active ttyd iframe has stale layout — the history
  // appears truncated until the browser is reloaded. The desktop dispatches
  // a `resize` on our window after the iframe becomes visible; forward it
  // down to the active ttyd iframe after the next paint so its fit-addon
  // re-measures against the now-correct viewport.
  function nudgeActiveFrame() {
    if (!active) return;
    var f = document.getElementById('frame-' + active);
    if (!f) return;
    // Force a real geometry change so the inner window fires its own resize
    // event — synthetic dispatch alone misses ResizeObserver-based listeners
    // (ttyd/xterm.js fit-addon uses one). The 1px nudge is briefly visible
    // but indistinguishable from a normal redraw to the eye.
    var origW = f.style.width;
    f.style.width = 'calc(100% - 1px)';
    requestAnimationFrame(function() {
      f.style.width = origW || '';
      if (f.contentWindow) {
        try { f.contentWindow.dispatchEvent(new Event('resize')); } catch (e) {}
      }
    });
  }
  window.addEventListener('resize', nudgeActiveFrame);

  // Pull server-side tab names + reconcile the tab set on load, and again when
  // this tab regains focus, so a rename / open / close done in another
  // session/device shows up here. A 2s interval keeps it live while open.
  loadTabNames();
  function refreshShared() { loadTabNames(); syncStatus(); }
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) refreshShared();
  });
  window.addEventListener('focus', refreshShared);
  setInterval(syncStatus, 2000);

  // On load: fetch running terminals from API, open tabs for them
  function initTabs() {
  api('GET', '/status').then(function(data) {
    var running = data.running || [];
    lastRunning = running;
    if (running.length === 0) {
      // Start terminal 1 if nothing is running
      pending[1] = true;
      api('POST', '/1/start').then(function() {
        addTab(1, true);
        return waitReady(1);
      }).then(function() {
        var tab = tabs.querySelector('.tab[data-n="1"]');
        if (tab) tab.classList.remove('starting');
        activate(1);
        inited = true;
      }).catch(function() {
        // Start failed (API down at cold load) — drop the half-created tab and
        // retry the whole init shortly, rather than leaving a stuck UI.
        delete pending[1];
        var t = tabs.querySelector('.tab[data-n="1"]'); if (t) t.remove();
        var f = document.getElementById('frame-1'); if (f) f.remove();
        setTimeout(initTabs, 2000);
      });
      return;
    }
    // Restore tab order from localStorage if possible
    var savedOrder = [];
    try { savedOrder = JSON.parse(localStorage.getItem('terminal-tabs')) || []; } catch(e) {}
    var runSet = {};
    running.forEach(function(n) { runSet[n] = true; });
    // Add saved tabs that are still running (preserves order)
    var added = {};
    savedOrder.forEach(function(n) {
      if (runSet[n]) { addTab(n); added[n] = true; }
    });
    // Add any running tabs not in saved order
    running.forEach(function(n) {
      if (!added[n]) addTab(n);
    });
    var lastActive = +(localStorage.getItem('active-terminal') || running[0]);
    if (!tabs.querySelector('.tab[data-n="' + lastActive + '"]')) lastActive = running[0];
    activate(lastActive);
    inited = true;
  }).catch(function() {
    // /status fetch failed at load (API briefly down) — retry so we don't sit
    // with an empty tab bar that only a manual reload fixes.
    setTimeout(initTabs, 2000);
  });
  }
  initTabs();
})();
</script>
</body>
</html>
